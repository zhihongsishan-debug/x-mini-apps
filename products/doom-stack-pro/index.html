<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no,maximum-scale=1" />
<meta name="theme-color" content="#06020f" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="mobile-web-app-capable" content="yes" />
<title>DOOM STACK PRO — Phase 1 Core</title>
<style>
  /* ===========================================================================
     DOOM STACK PRO — premium minimal redesign
     Quiet luxury. Black / graphite / soft gray. One restrained accent.
     ========================================================================= */
  :root{
    --bg-0:#0a0a0c;
    --bg-1:#101014;
    --bg-2:#16161c;
    --surface-1:rgba(255,255,255,.034);
    --surface-2:rgba(255,255,255,.058);
    --surface-3:rgba(255,255,255,.085);
    --ink:#ececef;
    --ink-2:#d8d8de;
    --sub:#9b9fa8;
    --mute:#6a6e78;
    --line:rgba(255,255,255,.07);
    --line-2:rgba(255,255,255,.12);
    --accent:#e8e8ea;
    --accent-on:#0a0a0c;
    --hi:#e3534b;          /* refined red — only HIGH/DOOM */
    --hi-bg:rgba(227,83,75,.08);
    --hi-line:rgba(227,83,75,.45);
    --mid:#caa66f;         /* warm amber-graphite */
    --mid-bg:rgba(202,166,111,.08);
    --mid-line:rgba(202,166,111,.32);
    --lo:#7f8a99;          /* soft slate */
    --lo-bg:rgba(127,138,153,.10);
    --lo-line:rgba(127,138,153,.35);
    --warn:#d6864a;        /* HEAVY tier */
    /* Category accents stay quiet — small dot/stroke only */
    --cat-work:#a8b4c4;
    --cat-life:#a4b8a8;
    --cat-health:#9bb4ad;
    --cat-idea:#b3a8c0;
    --cat-errand:#c4ad84;
    --cat-deadline:#d99a92;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;-webkit-user-select:none;user-select:none;touch-action:manipulation;}
  html,body{margin:0;padding:0;height:100%;overscroll-behavior:none;}
  body{
    font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text","Segoe UI",Inter,"Hiragino Sans","Noto Sans JP","Yu Gothic UI",system-ui,sans-serif;
    color:var(--ink);
    background:linear-gradient(180deg, var(--bg-0) 0%, var(--bg-1) 60%, var(--bg-2) 100%);
    background-attachment:fixed;
    height:100dvh;width:100%;
    overflow:hidden;
    position:fixed;
    -webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale;
    font-feature-settings:"ss01","cv11";
  }
  /* extremely subtle ambient noise — barely visible, kills banding only */
  body::before{
    content:"";position:fixed;inset:0;pointer-events:none;z-index:0;
    background-image:
      radial-gradient(1200px 600px at 50% -10%, rgba(255,255,255,.025), transparent 60%);
  }
  input, textarea, [contenteditable], .selectable{user-select:text;-webkit-user-select:text;}

  .app{
    position:relative;z-index:1;
    height:100dvh;
    display:flex;flex-direction:column;
    padding:max(14px,env(safe-area-inset-top)) 16px max(12px,env(safe-area-inset-bottom));
    gap:14px;
    max-width:680px;margin:0 auto;
  }

  /* ===== TOP BAR ===== */
  .topbar{
    flex:0 0 auto;display:flex;align-items:flex-start;justify-content:space-between;gap:14px;
  }
  .brand{display:flex;flex-direction:column;line-height:1.1;gap:4px;}
  .brand-name{
    font-size:18px;font-weight:600;letter-spacing:.04em;color:var(--ink);
  }
  .brand-tag{
    font-size:11px;font-weight:400;letter-spacing:.01em;color:var(--sub);
  }
  .brand-pro{font-size:9px;letter-spacing:.20em;color:var(--mute);font-weight:600;text-transform:uppercase;}
  .brand-pro b{color:var(--ink-2);font-weight:700;letter-spacing:.20em;}
  .top-stat{
    display:flex;flex-direction:column;align-items:flex-end;gap:6px;line-height:1;
    font-feature-settings:"tnum";
  }
  .top-stat .ts-pct{
    font-size:22px;font-weight:500;color:var(--ink);letter-spacing:-0.01em;
    font-feature-settings:"tnum";
  }
  .top-stat .ts-tier{
    font-size:9px;letter-spacing:.18em;font-weight:600;text-transform:uppercase;
    padding:3px 8px;border-radius:4px;
    background:transparent;border:1px solid var(--line-2);color:var(--sub);
  }
  .top-stat .ts-tier[data-tier="LIGHT"] {color:var(--sub);border-color:var(--line-2);}
  .top-stat .ts-tier[data-tier="BUSY"]  {color:var(--mid);border-color:var(--mid-line);}
  .top-stat .ts-tier[data-tier="HEAVY"] {color:var(--warn);border-color:rgba(214,134,74,.45);}
  .top-stat .ts-tier[data-tier="DOOM"]  {color:var(--hi);border-color:var(--hi-line);background:var(--hi-bg);}

  /* ===== ML BAR ===== */
  .ml-bar{
    flex:0 0 auto;
    height:4px;border-radius:99px;overflow:hidden;
    background:var(--surface-1);
    border:0;
  }
  .ml-fill{
    height:100%;width:0%;
    background:linear-gradient(90deg, var(--sub) 0%, var(--mid) 55%, var(--warn) 78%, var(--hi) 100%);
    transition:width .45s cubic-bezier(.2,.8,.2,1);
  }

  /* ===== STACK PREVIEW (calm monochrome) ===== */
  .stack-preview{
    flex:0 0 auto;
    display:flex;align-items:flex-end;gap:3px;
    height:30px;padding:0 2px;
    overflow:hidden;
  }
  .sp-bar{
    flex:1 1 0;min-width:2px;
    border-radius:1.5px;
    background:rgba(255,255,255,.10);
    transition:height .35s cubic-bezier(.2,.8,.2,1), background .25s ease, opacity .25s ease;
  }
  .sp-bar[data-pri="HIGH"]{background:rgba(227,83,75,.78);}
  .sp-bar[data-pri="MID"] {background:rgba(202,166,111,.62);}
  .sp-bar[data-pri="LOW"] {background:rgba(127,138,153,.50);}
  .sp-bar[data-completed="true"]{opacity:.18;}
  .stack-preview.empty .sp-empty{
    flex:1 1 auto;font-size:10px;color:var(--mute);letter-spacing:.18em;
    text-transform:uppercase;display:flex;align-items:flex-end;
  }

  /* ===== FILTER CHIPS ===== */
  .filters{
    flex:0 0 auto;
    display:flex;gap:6px;
    overflow-x:auto;
    -webkit-overflow-scrolling:touch;
    scrollbar-width:none;
  }
  .filters::-webkit-scrollbar{display:none;}
  .chip{
    appearance:none;border:1px solid var(--line);cursor:pointer;
    flex:0 0 auto;
    padding:7px 14px;border-radius:99px;
    font-family:inherit;font-size:11px;font-weight:500;letter-spacing:.06em;
    color:var(--sub);
    background:transparent;
    transition:color .15s ease, border-color .15s ease, background .15s ease;
  }
  .chip:hover{color:var(--ink-2);border-color:var(--line-2);}
  .chip[aria-pressed="true"]{
    color:var(--accent-on);
    background:var(--accent);
    border-color:var(--accent);
    font-weight:600;
  }
  .chip-date{
    appearance:none;border:1px solid var(--line);cursor:pointer;
    padding:7px 12px;border-radius:99px;
    font-family:inherit;font-size:11px;font-weight:500;letter-spacing:.04em;
    color:var(--sub);background:transparent;
    flex:0 0 auto;
    display:flex;align-items:center;gap:6px;
  }
  .chip-date::before{
    content:"";width:10px;height:10px;border-radius:2px;
    border:1px solid currentColor;opacity:.7;flex:0 0 auto;
  }
  .chip-date input{
    background:transparent;border:0;outline:none;color:inherit;font:inherit;
    width:108px;
  }
  .chip-date input::-webkit-calendar-picker-indicator{filter:invert(.7);opacity:.5;}

  /* ===== TASK LIST ===== */
  .list-wrap{
    flex:1 1 auto;
    overflow-y:auto;
    -webkit-overflow-scrolling:touch;
    border-radius:14px;
    background:transparent;
    border:0;
    padding:0 2px 2px;
    min-height:0;
  }
  .list-wrap::-webkit-scrollbar{width:6px;}
  .list-wrap::-webkit-scrollbar-thumb{background:var(--line-2);border-radius:99px;}
  .list-empty{
    padding:60px 24px;text-align:center;color:var(--mute);
    font-size:12px;letter-spacing:.02em;line-height:1.7;font-weight:400;
  }
  .list-empty b{
    display:block;font-size:13px;letter-spacing:.10em;color:var(--sub);
    font-weight:500;margin-bottom:8px;text-transform:uppercase;
  }

  .task{
    position:relative;
    border-radius:12px;padding:14px 14px 14px 18px;margin:0 0 8px;
    background:var(--surface-1);
    border:1px solid var(--line);
    transition:background .15s ease, border-color .15s ease, opacity .25s ease;
  }
  .task:hover{background:var(--surface-2);border-color:var(--line-2);}
  .task[data-completed="true"]{
    opacity:.45;
  }
  .task[data-completed="true"] .t-title{
    text-decoration:line-through;
    text-decoration-color:rgba(255,255,255,.35);
    text-decoration-thickness:1px;
    color:var(--mute);
  }
  /* priority side bar — quiet */
  .task::before{
    content:"";position:absolute;left:0;top:14px;bottom:14px;width:2px;border-radius:2px;
    background:var(--lo);
    opacity:.85;
  }
  .task[data-pri="HIGH"]::before{background:var(--hi);}
  .task[data-pri="MID"]::before {background:var(--mid);}
  .task[data-pri="LOW"]::before {background:var(--lo);}
  .t-row{
    display:flex;align-items:flex-start;gap:12px;
  }
  .t-check{
    flex:0 0 auto;
    width:20px;height:20px;border-radius:50%;
    border:1.5px solid var(--line-2);
    background:transparent;
    cursor:pointer;
    margin-top:1px;
    display:flex;align-items:center;justify-content:center;
    transition:all .15s ease;
  }
  .t-check:hover, .t-check:active{border-color:var(--ink-2);}
  .task[data-completed="true"] .t-check{
    background:var(--accent);
    border-color:var(--accent);
  }
  .t-check::after{
    content:"";width:8px;height:5px;border-left:1.6px solid var(--accent-on);border-bottom:1.6px solid var(--accent-on);
    transform:rotate(-45deg) translate(0,-1px);
    opacity:0;transition:opacity .15s ease;
  }
  .task[data-completed="true"] .t-check::after{opacity:1;}
  .t-main{flex:1 1 auto;min-width:0;}
  .t-title{
    font-size:14.5px;font-weight:500;color:var(--ink);line-height:1.4;letter-spacing:-0.005em;
    word-break:break-word;
    user-select:text;-webkit-user-select:text;
  }
  .t-meta{
    margin-top:8px;display:flex;flex-wrap:wrap;gap:6px;align-items:center;
    font-size:10.5px;letter-spacing:.02em;font-weight:500;line-height:1;
  }
  .t-cat, .t-due, .t-rep, .t-sub{
    padding:3px 8px;border-radius:4px;
    background:transparent;border:1px solid var(--line);
    color:var(--sub);
    display:inline-flex;align-items:center;gap:5px;
  }
  /* category gets a tiny color dot — minimal accent */
  .t-cat::before{
    content:"";width:5px;height:5px;border-radius:50%;
    background:currentColor;opacity:.85;flex:0 0 auto;
  }
  .t-cat[data-cat="WORK"]    {color:var(--cat-work);}
  .t-cat[data-cat="LIFE"]    {color:var(--cat-life);}
  .t-cat[data-cat="HEALTH"]  {color:var(--cat-health);}
  .t-cat[data-cat="IDEA"]    {color:var(--cat-idea);}
  .t-cat[data-cat="ERRAND"]  {color:var(--cat-errand);}
  .t-cat[data-cat="DEADLINE"]{color:var(--cat-deadline);border-color:rgba(217,154,146,.30);}
  .t-due.overdue{color:var(--hi);border-color:var(--hi-line);background:var(--hi-bg);}
  .t-due.today  {color:var(--ink);border-color:var(--line-2);background:var(--surface-2);font-weight:600;}
  .t-rep::before{content:"↻";opacity:.7;font-size:11px;}
  .t-sub::before{content:"☰";opacity:.6;font-size:9px;}
  .t-tools{
    flex:0 0 auto;display:flex;gap:4px;align-items:flex-start;
  }
  .icon-btn{
    appearance:none;border:1px solid transparent;cursor:pointer;
    width:30px;height:30px;border-radius:6px;
    background:transparent;color:var(--mute);
    display:flex;align-items:center;justify-content:center;
    transition:all .15s ease;
    font-size:14px;line-height:1;
  }
  .icon-btn:hover{color:var(--ink);background:var(--surface-2);}
  .icon-btn.del:hover{color:var(--hi);background:var(--hi-bg);}

  /* expanded task body */
  .t-body{
    margin-top:12px;padding-top:12px;border-top:1px solid var(--line);
    display:none;
    user-select:text;-webkit-user-select:text;
  }
  .task[data-expanded="true"] .t-body{display:block;}
  .t-notes-display{
    font-size:13px;line-height:1.55;color:var(--ink-2);
    white-space:pre-wrap;word-break:break-word;
    padding:0 0 8px 0;
  }
  .t-notes-display:empty::before{
    content:"No notes";color:var(--mute);font-style:normal;letter-spacing:.02em;
    font-size:12px;
  }
  .sub-list{margin-top:6px;}
  .sub-row{
    display:flex;align-items:center;gap:10px;
    padding:7px 0;font-size:13px;letter-spacing:0;
    user-select:text;-webkit-user-select:text;
  }
  .sub-row .s-check{
    width:16px;height:16px;border-radius:50%;border:1.5px solid var(--line-2);
    background:transparent;cursor:pointer;flex:0 0 auto;
    display:flex;align-items:center;justify-content:center;
    transition:all .15s ease;
  }
  .sub-row .s-check:hover{border-color:var(--ink-2);}
  .sub-row[data-completed="true"] .s-check{
    background:var(--accent);border-color:var(--accent);
  }
  .sub-row[data-completed="true"] .s-check::after{
    content:"";width:6px;height:3.5px;border-left:1.4px solid var(--accent-on);border-bottom:1.4px solid var(--accent-on);
    transform:rotate(-45deg) translate(0,-1px);
  }
  .sub-row[data-completed="true"] .s-title{text-decoration:line-through;color:var(--mute);}
  .sub-row .s-title{flex:1 1 auto;color:var(--ink-2);min-width:0;word-break:break-word;font-weight:400;}
  .sub-row .s-del{
    appearance:none;border:0;background:transparent;cursor:pointer;
    color:var(--mute);font-size:14px;line-height:1;padding:4px 8px;border-radius:4px;
    transition:all .15s ease;
  }
  .sub-row .s-del:hover{color:var(--hi);background:var(--hi-bg);}
  .sub-add{
    margin-top:10px;display:flex;gap:8px;
  }
  .sub-add input{
    flex:1 1 auto;
    appearance:none;border:1px solid var(--line);
    background:transparent;color:var(--ink);
    border-radius:8px;padding:8px 12px;font-size:13px;
    outline:none;
    user-select:text;-webkit-user-select:text;
    transition:border-color .15s ease;
  }
  .sub-add input:focus{border-color:var(--line-2);}
  .sub-add input::placeholder{color:var(--mute);}
  .sub-add button{
    appearance:none;border:1px solid var(--line-2);cursor:pointer;
    padding:6px 14px;border-radius:8px;
    font:inherit;font-size:12px;font-weight:500;letter-spacing:.02em;color:var(--ink);
    background:transparent;
    transition:all .15s ease;
  }
  .sub-add button:hover{background:var(--surface-2);border-color:var(--accent);color:var(--ink);}

  /* ===== ADD ROW ===== */
  .add-row{
    flex:0 0 auto;
    display:grid;grid-template-columns:1fr auto;gap:8px;
  }
  .add-wrap{
    position:relative;
    border-radius:12px;
    background:var(--surface-1);
    border:1px solid var(--line);
    transition:border-color .15s ease, background .15s ease;
  }
  .add-wrap:focus-within{border-color:var(--line-2);background:var(--surface-2);}
  input#addInput{
    appearance:none;width:100%;padding:13px 14px 36px 16px;
    background:transparent;border:0;outline:none;
    color:var(--ink);font-family:inherit;font-size:14.5px;letter-spacing:-0.005em;
    caret-color:var(--accent);
    font-weight:500;
  }
  input#addInput::placeholder{color:var(--mute);font-weight:400;}
  .add-pri{position:absolute;left:10px;bottom:8px;display:flex;gap:5px;}
  .add-pri .pri{
    appearance:none;border:1px solid var(--line);cursor:pointer;
    padding:3px 10px;border-radius:99px;
    font-family:inherit;font-size:10px;font-weight:500;letter-spacing:.04em;
    background:transparent;color:var(--sub);
    transition:all .15s ease;
  }
  .add-pri .pri:hover{color:var(--ink-2);border-color:var(--line-2);}
  .add-pri .pri[data-pri="HIGH"]{color:var(--hi);}
  .add-pri .pri[data-pri="HIGH"][aria-pressed="true"]{background:var(--hi-bg);border-color:var(--hi-line);color:var(--hi);font-weight:600;}
  .add-pri .pri[data-pri="MID"]{color:var(--mid);}
  .add-pri .pri[data-pri="MID"][aria-pressed="true"]{background:var(--mid-bg);border-color:var(--mid-line);color:var(--mid);font-weight:600;}
  .add-pri .pri[data-pri="LOW"]{color:var(--lo);}
  .add-pri .pri[data-pri="LOW"][aria-pressed="true"]{background:var(--lo-bg);border-color:var(--lo-line);color:var(--lo);font-weight:600;}
  .add{
    appearance:none;border:1px solid var(--accent);cursor:pointer;
    padding:0 20px;border-radius:12px;
    font-family:inherit;font-weight:600;font-size:13px;letter-spacing:.04em;
    color:var(--accent-on);
    background:var(--accent);
    min-width:72px;
    transition:transform .08s ease, opacity .15s ease;
  }
  .add:hover{opacity:.92;}
  .add:active{transform:translateY(1px);opacity:.85;}

  /* ===== EDIT MODAL — settings panel feel ===== */
  .modal{
    position:fixed;inset:0;z-index:60;
    display:none;align-items:flex-end;justify-content:center;
    background:rgba(8,8,10,.78);
    backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);
  }
  .modal.on{display:flex;animation:mFade .22s ease both;}
  @keyframes mFade{from{opacity:0;}to{opacity:1;}}
  .m-card{
    position:relative;
    width:100%;max-width:520px;
    border-radius:16px 16px 0 0;
    padding:18px 22px max(22px,env(safe-area-inset-bottom));
    background:linear-gradient(180deg, #18181d 0%, #131318 100%);
    border:1px solid var(--line-2);
    border-bottom:0;
    box-shadow:0 -16px 60px rgba(0,0,0,.55), 0 -2px 0 0 rgba(255,255,255,.04);
    max-height:calc(100dvh - 30px);
    overflow-y:auto;
    -webkit-overflow-scrolling:touch;
    animation:mSlide .25s cubic-bezier(.2,.9,.2,1);
  }
  @keyframes mSlide{from{transform:translateY(40px);} to{transform:translateY(0);}}
  @media (min-width:600px){
    .modal{align-items:center;padding:20px;}
    .m-card{border-radius:14px;max-height:calc(100dvh - 60px);border:1px solid var(--line-2);}
  }
  .m-grab{
    width:40px;height:4px;border-radius:99px;
    background:var(--line-2);
    margin:-8px auto 16px;
  }
  .m-h{
    font-size:11px;font-weight:600;letter-spacing:.18em;color:var(--sub);
    text-transform:uppercase;
    margin-bottom:18px;
    padding-bottom:14px;
    border-bottom:1px solid var(--line);
  }
  .m-field{margin-bottom:18px;}
  .m-lbl{
    display:block;font-size:11px;letter-spacing:.04em;font-weight:500;color:var(--sub);
    margin-bottom:8px;
  }
  .m-input, .m-select, .m-area{
    width:100%;
    appearance:none;border:1px solid var(--line);
    background:var(--surface-1);color:var(--ink);
    border-radius:8px;padding:11px 12px;
    font:inherit;font-size:14px;letter-spacing:-0.005em;outline:none;
    user-select:text;-webkit-user-select:text;
    transition:border-color .15s ease, background .15s ease;
  }
  .m-input:focus, .m-select:focus, .m-area:focus{
    border-color:var(--line-2);
    background:var(--surface-2);
  }
  .m-area{min-height:96px;resize:vertical;font-family:inherit;line-height:1.55;}
  .m-select{
    cursor:pointer;
    background-image:linear-gradient(45deg, transparent 50%, var(--sub) 50%), linear-gradient(135deg, var(--sub) 50%, transparent 50%);
    background-position: calc(100% - 16px) 50%, calc(100% - 11px) 50%;
    background-size:5px 5px, 5px 5px;
    background-repeat:no-repeat;
    padding-right:32px;
  }
  .m-pris, .m-cats{
    display:flex;flex-wrap:wrap;gap:6px;
  }
  .m-pris .pri, .m-cats .cat{
    appearance:none;border:1px solid var(--line);cursor:pointer;
    padding:7px 12px;border-radius:8px;
    font:inherit;font-size:11px;font-weight:500;letter-spacing:.04em;color:var(--sub);
    background:transparent;
    transition:all .15s ease;
    display:inline-flex;align-items:center;gap:6px;
  }
  .m-pris .pri:hover, .m-cats .cat:hover{color:var(--ink-2);border-color:var(--line-2);}
  .m-pris .pri[data-pri="HIGH"]{color:var(--hi);}
  .m-pris .pri[data-pri="MID"]{color:var(--mid);}
  .m-pris .pri[data-pri="LOW"]{color:var(--lo);}
  .m-pris .pri[data-pri="HIGH"][aria-pressed="true"]{background:var(--hi-bg);border-color:var(--hi-line);font-weight:600;}
  .m-pris .pri[data-pri="MID"][aria-pressed="true"] {background:var(--mid-bg);border-color:var(--mid-line);font-weight:600;}
  .m-pris .pri[data-pri="LOW"][aria-pressed="true"] {background:var(--lo-bg);border-color:var(--lo-line);font-weight:600;}
  .m-cats .cat::before{
    content:"";width:6px;height:6px;border-radius:50%;
    background:currentColor;opacity:.85;flex:0 0 auto;
  }
  .m-cats .cat[data-cat="WORK"]    {color:var(--cat-work);}
  .m-cats .cat[data-cat="LIFE"]    {color:var(--cat-life);}
  .m-cats .cat[data-cat="HEALTH"]  {color:var(--cat-health);}
  .m-cats .cat[data-cat="IDEA"]    {color:var(--cat-idea);}
  .m-cats .cat[data-cat="ERRAND"]  {color:var(--cat-errand);}
  .m-cats .cat[data-cat="DEADLINE"]{color:var(--cat-deadline);}
  .m-cats .cat[aria-pressed="true"]{
    background:var(--surface-2);border-color:currentColor;font-weight:600;
  }
  .m-actions{
    display:flex;gap:10px;margin-top:18px;padding-top:14px;border-top:1px solid var(--line);
  }
  .m-save{
    flex:1 1 auto;
    appearance:none;border:1px solid var(--accent);cursor:pointer;
    padding:13px;border-radius:10px;
    font:inherit;font-weight:600;font-size:13px;letter-spacing:.04em;
    color:var(--accent-on);
    background:var(--accent);
    transition:opacity .15s ease;
  }
  .m-save:hover{opacity:.92;}
  .m-save:active{opacity:.85;}
  .m-cancel{
    flex:0 0 auto;
    appearance:none;border:1px solid var(--line-2);cursor:pointer;
    padding:13px 22px;border-radius:10px;
    font:inherit;font-weight:500;font-size:12px;letter-spacing:.04em;color:var(--sub);
    background:transparent;
    transition:all .15s ease;
  }
  .m-cancel:hover{color:var(--ink);border-color:var(--ink-2);}

  /* ===== UNDO TOAST ===== */
  .toast{
    position:fixed;left:50%;bottom:max(20px,env(safe-area-inset-bottom));
    transform:translateX(-50%);
    z-index:70;
    padding:10px 14px;border-radius:10px;
    background:#1a1a1f;
    border:1px solid var(--line-2);
    box-shadow:0 8px 30px rgba(0,0,0,.55), 0 0 0 1px rgba(0,0,0,.4);
    display:none;align-items:center;gap:14px;
    font-size:13px;letter-spacing:0;color:var(--ink-2);font-weight:500;
  }
  .toast.on{display:flex;animation:tFade .25s ease;}
  @keyframes tFade{from{opacity:0;transform:translate(-50%,8px);}to{opacity:1;transform:translate(-50%,0);}}
  .toast .t-undo{
    appearance:none;border:1px solid var(--line-2);cursor:pointer;
    padding:5px 12px;border-radius:6px;
    font:inherit;font-weight:600;font-size:12px;letter-spacing:.02em;color:var(--ink);
    background:transparent;
    transition:all .15s ease;
  }
  .toast .t-undo:hover{background:var(--surface-3);}

  @media (max-height:700px){
    .brand-name{font-size:16px;}
    .brand-tag{font-size:10px;}
    .top-stat .ts-pct{font-size:18px;}
    input#addInput{padding:11px 12px 32px 14px;}
    .stack-preview{height:24px;}
  }
  @media (max-width:380px){
    .app{padding-left:12px;padding-right:12px;}
    .brand-name{font-size:16px;}
  }
</style>
</head>
<body>

<div class="app">
  <header class="topbar">
    <div class="brand">
      <div class="brand-name">DOOM STACK PRO</div>
      <div class="brand-tag">Your tasks have weight.</div>
      <div class="brand-pro"><b>PRO</b> · PRIVATE BUILD</div>
    </div>
    <div class="top-stat">
      <span class="ts-pct" id="tsPct">0%</span>
      <span class="ts-tier" id="tsTier" data-tier="LIGHT">LIGHT</span>
    </div>
  </header>

  <div class="ml-bar"><div class="ml-fill" id="mlFill"></div></div>

  <div class="stack-preview" id="stackPreview" aria-label="Visual weight"></div>

  <section class="filters" id="filters" aria-label="フィルタ">
    <button class="chip" data-filter="TODAY" aria-pressed="true">Today</button>
    <button class="chip" data-filter="TOMORROW">Tomorrow</button>
    <button class="chip" data-filter="THIS_WEEK">This week</button>
    <button class="chip" data-filter="NEXT_WEEK">Next week</button>
    <button class="chip" data-filter="ALL">All</button>
    <button class="chip" data-filter="DONE">Done</button>
    <label class="chip-date" aria-label="特定日">
      <input type="date" id="dateFilter" />
    </label>
  </section>

  <section class="list-wrap" id="listWrap">
    <div class="list-empty" id="listEmpty">
      <b>Nothing on the stack</b>
      下から追加して、<br/>頭の重さを管理する。
    </div>
    <div id="taskList"></div>
  </section>

  <section class="add-row">
    <div class="add-wrap">
      <input id="addInput" type="text" maxlength="80"
        placeholder="タスクを入力（例: 月曜の会議資料）"
        autocomplete="off" autocapitalize="off" autocorrect="off" spellcheck="false" />
      <div class="add-pri" role="group" aria-label="優先度">
        <button class="pri" data-pri="HIGH" type="button" aria-pressed="false">HIGH</button>
        <button class="pri" data-pri="MID"  type="button" aria-pressed="true">MID</button>
        <button class="pri" data-pri="LOW"  type="button" aria-pressed="false">LOW</button>
      </div>
    </div>
    <button class="add" id="addBtn" type="button">Add</button>
  </section>
</div>

<!-- Edit modal -->
<div class="modal" id="editModal" aria-hidden="true">
  <div class="m-card" role="dialog" aria-modal="true" aria-label="タスク編集">
    <div class="m-grab" aria-hidden="true"></div>
    <div class="m-h">Edit task</div>
    <div class="m-field">
      <label class="m-lbl" for="eTitle">Title</label>
      <input class="m-input" id="eTitle" type="text" maxlength="120" />
    </div>
    <div class="m-field">
      <span class="m-lbl">Priority</span>
      <div class="m-pris" id="ePris">
        <button class="pri" data-pri="HIGH" type="button" aria-pressed="false">HIGH</button>
        <button class="pri" data-pri="MID"  type="button" aria-pressed="true">MID</button>
        <button class="pri" data-pri="LOW"  type="button" aria-pressed="false">LOW</button>
      </div>
    </div>
    <div class="m-field">
      <span class="m-lbl">Category</span>
      <div class="m-cats" id="eCats">
        <button class="cat" data-cat="WORK"     type="button">Work</button>
        <button class="cat" data-cat="LIFE"     type="button">Life</button>
        <button class="cat" data-cat="HEALTH"   type="button">Health</button>
        <button class="cat" data-cat="IDEA"     type="button">Idea</button>
        <button class="cat" data-cat="ERRAND"   type="button">Errand</button>
        <button class="cat" data-cat="DEADLINE" type="button">Deadline</button>
      </div>
    </div>
    <div class="m-field">
      <label class="m-lbl" for="eDue">Due date</label>
      <input class="m-input" id="eDue" type="date" />
    </div>
    <div class="m-field">
      <label class="m-lbl" for="eRepeat">Repeat</label>
      <select class="m-select" id="eRepeat">
        <option value="NONE">NONE</option>
        <option value="DAILY">DAILY</option>
        <option value="WEEKDAYS">WEEKDAYS</option>
        <option value="WEEKLY">WEEKLY</option>
        <option value="MONTHLY">MONTHLY</option>
        <option value="CUSTOM">CUSTOM…</option>
      </select>
    </div>
    <div class="m-field">
      <label class="m-lbl" for="eNotes">NOTES</label>
      <textarea class="m-area" id="eNotes" maxlength="2000" placeholder="メモ…"></textarea>
    </div>
    <div class="m-actions">
      <button class="m-cancel" id="eCancel" type="button">Cancel</button>
      <button class="m-save"   id="eSave"   type="button">Save</button>
    </div>
  </div>
</div>

<!-- Undo toast -->
<div class="toast" id="undoToast" role="status">
  <span id="undoText">削除しました</span>
  <button class="t-undo" id="undoBtn" type="button">Undo</button>
</div>

<script>
(() => {
  const $ = id => document.getElementById(id);

  /* ============== STORAGE ============== */
  const LS_KEY = 'doomStackPro:v1';
  function load(){
    try {
      const raw = localStorage.getItem(LS_KEY);
      if (!raw) return null;
      return JSON.parse(raw);
    } catch(_) { return null; }
  }
  function save(){
    try {
      const data = { version: 1, tasks: state.tasks, ui: { activeFilter: state.activeFilter, selectedDate: state.selectedDate } };
      localStorage.setItem(LS_KEY, JSON.stringify(data));
    } catch(_) {}
  }

  /* ============== STATE ============== */
  const state = {
    tasks: [],
    activeFilter: 'TODAY',
    selectedDate: null,   // YYYY-MM-DD when DATE filter is active
    selectedPri: 'MID',
    editingId: null,
    editingPri: 'MID',
    editingCat: 'WORK',
    pendingUndo: null,    // { type, payload, timer }
  };

  /* ============== UTILS ============== */
  function uid(){ return 't_' + Date.now().toString(36) + Math.random().toString(36).slice(2, 8); }
  function nowIso(){ return new Date().toISOString(); }
  function ymd(d){
    const y = d.getFullYear();
    const m = String(d.getMonth() + 1).padStart(2, '0');
    const day = String(d.getDate()).padStart(2, '0');
    return y + '-' + m + '-' + day;
  }
  function todayKey(){ return ymd(new Date()); }
  function addDaysKey(n){
    const d = new Date();
    d.setDate(d.getDate() + n);
    return ymd(d);
  }
  function dueComparable(s){ // 'YYYY-MM-DD' → number for sorting
    if (!s) return Infinity;
    return parseInt(s.replace(/-/g, ''), 10);
  }

  /* ============== TASK API ============== */
  function makeTask(opts){
    const t = nowIso();
    return Object.assign({
      id: uid(),
      title: '',
      priority: 'MID',
      category: 'WORK',
      due: null,
      repeat: 'NONE',
      notes: '',
      subtasks: [],
      completed: false,
      completedAt: null,
      createdAt: t,
      updatedAt: t,
    }, opts || {});
  }
  function addTask(opts){
    const title = (opts.title || '').trim();
    if (!title) return null;
    const task = makeTask(Object.assign({}, opts, { title }));
    state.tasks.unshift(task);
    save();
    render();
    return task;
  }
  function findTask(id){ return state.tasks.find(t => t.id === id); }
  function updateTask(id, patch){
    const t = findTask(id);
    if (!t) return null;
    Object.assign(t, patch, { updatedAt: nowIso() });
    save();
    render();
    return t;
  }
  function deleteTask(id){
    const idx = state.tasks.findIndex(t => t.id === id);
    if (idx < 0) return null;
    const [removed] = state.tasks.splice(idx, 1);
    queueUndo({ type: 'delete', payload: { task: removed, idx } }, '削除しました');
    save();
    render();
    return removed;
  }
  function toggleComplete(id){
    const t = findTask(id);
    if (!t) return;
    if (!t.completed){
      const wasIncomplete = true;
      t.completed = true;
      t.completedAt = nowIso();
      t.updatedAt = t.completedAt;
      // Repeat handling: when a recurring task is completed, schedule next instance.
      if (t.repeat && t.repeat !== 'NONE' && t.due){
        const next = nextDueDate(t.due, t.repeat);
        if (next){
          state.tasks.unshift(makeTask({
            title: t.title,
            priority: t.priority,
            category: t.category,
            due: next,
            repeat: t.repeat,
            notes: t.notes,
            subtasks: t.subtasks.map(s => ({ id: uid(), title: s.title, completed: false })),
          }));
        }
      }
      queueUndo({ type: 'complete', payload: { id } }, '完了にしました');
    } else {
      t.completed = false;
      t.completedAt = null;
      t.updatedAt = nowIso();
    }
    save();
    render();
  }
  function nextDueDate(currentYmd, repeat){
    const [y, m, d] = currentYmd.split('-').map(n => parseInt(n, 10));
    const dt = new Date(y, m - 1, d);
    if (repeat === 'DAILY')    dt.setDate(dt.getDate() + 1);
    else if (repeat === 'WEEKDAYS'){
      do { dt.setDate(dt.getDate() + 1); } while (dt.getDay() === 0 || dt.getDay() === 6);
    }
    else if (repeat === 'WEEKLY')  dt.setDate(dt.getDate() + 7);
    else if (repeat === 'MONTHLY') dt.setMonth(dt.getMonth() + 1);
    else return null; // CUSTOM placeholder — no automatic schedule
    return ymd(dt);
  }

  /* ============== SUBTASKS ============== */
  function addSubtask(taskId, title){
    const t = findTask(taskId);
    if (!t) return;
    title = (title || '').trim();
    if (!title) return;
    t.subtasks.push({ id: uid(), title, completed: false });
    t.updatedAt = nowIso();
    save();
    render();
  }
  function toggleSubtask(taskId, subId){
    const t = findTask(taskId);
    if (!t) return;
    const s = t.subtasks.find(s => s.id === subId);
    if (!s) return;
    s.completed = !s.completed;
    t.updatedAt = nowIso();
    save();
    render();
  }
  function deleteSubtask(taskId, subId){
    const t = findTask(taskId);
    if (!t) return;
    t.subtasks = t.subtasks.filter(s => s.id !== subId);
    t.updatedAt = nowIso();
    save();
    render();
  }

  /* ============== UNDO ============== */
  function queueUndo(action, msg){
    if (state.pendingUndo && state.pendingUndo.timer){
      clearTimeout(state.pendingUndo.timer);
    }
    const toast = $('undoToast');
    $('undoText').textContent = msg || '元に戻せます';
    toast.classList.add('on');
    const timer = setTimeout(() => {
      toast.classList.remove('on');
      state.pendingUndo = null;
    }, 6000);
    state.pendingUndo = { action, timer };
  }
  function undoLast(){
    if (!state.pendingUndo) return;
    const { action } = state.pendingUndo;
    if (action.type === 'delete'){
      const { task, idx } = action.payload;
      state.tasks.splice(Math.max(0, Math.min(state.tasks.length, idx)), 0, task);
    } else if (action.type === 'complete'){
      const { id } = action.payload;
      const t = findTask(id);
      if (t){ t.completed = false; t.completedAt = null; t.updatedAt = nowIso(); }
    }
    if (state.pendingUndo.timer) clearTimeout(state.pendingUndo.timer);
    state.pendingUndo = null;
    $('undoToast').classList.remove('on');
    save();
    render();
  }

  /* ============== FILTERING ============== */
  function isDueInRange(due, fromKey, toKey){
    if (!due) return false;
    return due >= fromKey && due <= toKey;
  }
  function passesFilter(t){
    const f = state.activeFilter;
    const tk = todayKey();
    if (f === 'DONE') return !!t.completed;
    if (t.completed) return false;
    if (f === 'ALL') return true;
    if (f === 'TODAY')      return !t.due || t.due <= tk;
    if (f === 'TOMORROW')   return t.due === addDaysKey(1);
    if (f === 'THIS_WEEK')  return !!t.due && isDueInRange(t.due, tk, addDaysKey(6));
    if (f === 'NEXT_WEEK')  return !!t.due && isDueInRange(t.due, addDaysKey(7), addDaysKey(13));
    if (f === 'DATE')       return state.selectedDate ? t.due === state.selectedDate : true;
    return true;
  }
  function filteredTasks(){
    const list = state.tasks.filter(passesFilter);
    // sort: incomplete first → due ascending → priority desc → createdAt desc
    const priRank = { HIGH: 3, MID: 2, LOW: 1 };
    return list.sort((a, b) => {
      if (a.completed !== b.completed) return a.completed ? 1 : -1;
      const ad = dueComparable(a.due), bd = dueComparable(b.due);
      if (ad !== bd) return ad - bd;
      const pr = (priRank[b.priority] || 2) - (priRank[a.priority] || 2);
      if (pr !== 0) return pr;
      return (b.createdAt || '').localeCompare(a.createdAt || '');
    });
  }

  /* ============== MENTAL LOAD ============== */
  const ML_MAX = 30;
  function recomputeML(){
    let weight = 0;
    for (const t of state.tasks){
      if (t.completed) continue;
      const w = t.priority === 'HIGH' ? 3 : t.priority === 'LOW' ? 1 : 2;
      weight += w;
    }
    const pct = Math.min(100, Math.round((weight / ML_MAX) * 100));
    const tier = pct >= 75 ? 'DOOM' : pct >= 50 ? 'HEAVY' : pct >= 25 ? 'BUSY' : 'LIGHT';
    $('tsPct').textContent = pct + '%';
    $('tsTier').textContent = tier;
    $('tsTier').setAttribute('data-tier', tier);
    $('mlFill').style.width = pct + '%';
  }

  /* ============== RENDER ============== */
  function escapeHtml(s){
    return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
  }
  function dueLabel(due){
    if (!due) return '';
    const tk = todayKey(), tomorrow = addDaysKey(1);
    if (due === tk) return { txt: 'TODAY', cls: 'today' };
    if (due === tomorrow) return { txt: 'TOMORROW', cls: '' };
    if (due < tk) return { txt: due, cls: 'overdue' };
    return { txt: due, cls: '' };
  }
  function render(){
    const list = filteredTasks();
    const wrap = $('taskList');
    const empty = $('listEmpty');
    if (list.length === 0){
      empty.style.display = '';
      wrap.innerHTML = '';
    } else {
      empty.style.display = 'none';
      wrap.innerHTML = list.map(t => taskHtml(t)).join('');
      bindTaskEvents();
    }
    recomputeML();
    renderStackPreview(list);
  }
  function renderStackPreview(list){
    const sp = $('stackPreview');
    if (!sp) return;
    if (!list || list.length === 0){
      sp.classList.add('empty');
      sp.innerHTML = '<span class="sp-empty">empty</span>';
      return;
    }
    sp.classList.remove('empty');
    // Heaviest at the front; shows up to 24 bars to keep the preview calm
    const priWeight = { HIGH: 1.00, MID: 0.62, LOW: 0.38 };
    const sorted = list.slice().sort((a, b) => (priWeight[b.priority]||.5) - (priWeight[a.priority]||.5));
    const bars = sorted.slice(0, 24).map(t => {
      const w = priWeight[t.priority] || 0.5;
      const pct = Math.round(w * 100);
      const completed = t.completed ? 'true' : 'false';
      return '<span class="sp-bar" data-pri="'+ t.priority +'" data-completed="'+ completed +'" style="height:'+ pct +'%"></span>';
    }).join('');
    sp.innerHTML = bars;
  }
  function taskHtml(t){
    const due = t.due ? dueLabel(t.due) : null;
    const subDone = t.subtasks.filter(s => s.completed).length;
    const subTotal = t.subtasks.length;
    return '' +
      '<div class="task" data-id="'+ t.id +'" data-pri="'+ t.priority +'" data-completed="'+ (t.completed ? 'true' : 'false') +'">' +
        '<div class="t-row">' +
          '<button class="t-check" data-act="toggle" aria-label="完了切替"></button>' +
          '<div class="t-main">' +
            '<div class="t-title selectable">'+ escapeHtml(t.title) +'</div>' +
            '<div class="t-meta">' +
              '<span class="t-cat" data-cat="'+ t.category +'">'+ t.category +'</span>' +
              (due ? '<span class="t-due '+ due.cls +'">'+ escapeHtml(due.txt) +'</span>' : '') +
              (t.repeat && t.repeat !== 'NONE' ? '<span class="t-rep">⟳ '+ t.repeat +'</span>' : '') +
              (subTotal > 0 ? '<span class="t-sub">SUB '+ subDone +'/'+ subTotal +'</span>' : '') +
            '</div>' +
          '</div>' +
          '<div class="t-tools">' +
            '<button class="icon-btn" data-act="expand" aria-label="展開">▾</button>' +
            '<button class="icon-btn" data-act="edit"   aria-label="編集">✎</button>' +
            '<button class="icon-btn del" data-act="delete" aria-label="削除">×</button>' +
          '</div>' +
        '</div>' +
        '<div class="t-body">' +
          '<div class="t-notes-display">'+ escapeHtml(t.notes || '') +'</div>' +
          '<div class="sub-list">'+
            t.subtasks.map(s => (
              '<div class="sub-row" data-sid="'+ s.id +'" data-completed="'+ (s.completed ? 'true' : 'false') +'">' +
                '<button class="s-check" data-act="sub-toggle" aria-label="サブ完了切替"></button>' +
                '<span class="s-title selectable">'+ escapeHtml(s.title) +'</span>' +
                '<button class="s-del" data-act="sub-del" aria-label="サブ削除">×</button>' +
              '</div>'
            )).join('') +
          '</div>' +
          '<div class="sub-add">' +
            '<input type="text" placeholder="サブタスク追加" data-sub-add maxlength="80" />' +
            '<button data-act="sub-add" type="button">+</button>' +
          '</div>' +
        '</div>' +
      '</div>';
  }
  function bindTaskEvents(){
    document.querySelectorAll('.task').forEach(taskEl => {
      const id = taskEl.dataset.id;
      taskEl.addEventListener('click', (e) => {
        const t = e.target.closest('[data-act]');
        if (!t) return;
        const act = t.dataset.act;
        if (act === 'toggle') toggleComplete(id);
        else if (act === 'expand') {
          const open = taskEl.dataset.expanded === 'true';
          taskEl.dataset.expanded = open ? 'false' : 'true';
          t.textContent = open ? '▾' : '▴';
        }
        else if (act === 'edit')   openEdit(id);
        else if (act === 'delete') deleteTask(id);
        else if (act === 'sub-toggle'){
          const subRow = t.closest('.sub-row');
          if (subRow) toggleSubtask(id, subRow.dataset.sid);
        }
        else if (act === 'sub-del'){
          const subRow = t.closest('.sub-row');
          if (subRow) deleteSubtask(id, subRow.dataset.sid);
        }
        else if (act === 'sub-add'){
          const inp = taskEl.querySelector('[data-sub-add]');
          if (inp){ addSubtask(id, inp.value); inp.value = ''; }
        }
      });
      const subInput = taskEl.querySelector('[data-sub-add]');
      if (subInput){
        subInput.addEventListener('keydown', (e) => {
          if (e.key === 'Enter'){
            e.preventDefault();
            addSubtask(id, subInput.value);
            subInput.value = '';
          }
        });
      }
    });
  }

  /* ============== EDIT MODAL ============== */
  function openEdit(id){
    const t = findTask(id);
    if (!t) return;
    state.editingId = id;
    state.editingPri = t.priority;
    state.editingCat = t.category;
    $('eTitle').value = t.title;
    $('eDue').value = t.due || '';
    $('eRepeat').value = t.repeat || 'NONE';
    $('eNotes').value = t.notes || '';
    document.querySelectorAll('#ePris .pri').forEach(b => b.setAttribute('aria-pressed', String(b.dataset.pri === t.priority)));
    document.querySelectorAll('#eCats .cat').forEach(b => b.setAttribute('aria-pressed', String(b.dataset.cat === t.category)));
    $('editModal').classList.add('on');
    $('editModal').setAttribute('aria-hidden', 'false');
  }
  function closeEdit(){
    $('editModal').classList.remove('on');
    $('editModal').setAttribute('aria-hidden', 'true');
    state.editingId = null;
  }
  function saveEdit(){
    if (!state.editingId) return;
    updateTask(state.editingId, {
      title: ($('eTitle').value || '').trim() || '無題',
      priority: state.editingPri,
      category: state.editingCat,
      due: $('eDue').value || null,
      repeat: $('eRepeat').value || 'NONE',
      notes: $('eNotes').value || '',
    });
    closeEdit();
  }
  $('eCancel').addEventListener('click', closeEdit);
  $('eSave').addEventListener('click', saveEdit);
  $('editModal').addEventListener('click', (e) => {
    if (e.target === $('editModal')) closeEdit();
  });
  document.querySelectorAll('#ePris .pri').forEach(b => {
    b.addEventListener('click', () => {
      state.editingPri = b.dataset.pri;
      document.querySelectorAll('#ePris .pri').forEach(x => x.setAttribute('aria-pressed', String(x === b)));
    });
  });
  document.querySelectorAll('#eCats .cat').forEach(b => {
    b.addEventListener('click', () => {
      state.editingCat = b.dataset.cat;
      document.querySelectorAll('#eCats .cat').forEach(x => x.setAttribute('aria-pressed', String(x === b)));
    });
  });

  /* ============== ADD ROW INPUT ============== */
  document.querySelectorAll('.add-pri .pri').forEach(b => {
    b.addEventListener('click', () => {
      state.selectedPri = b.dataset.pri;
      document.querySelectorAll('.add-pri .pri').forEach(x => x.setAttribute('aria-pressed', String(x.dataset.pri === state.selectedPri)));
    });
  });
  function onAdd(){
    const text = $('addInput').value;
    if (addTask({ title: text, priority: state.selectedPri })){
      $('addInput').value = '';
    }
  }
  $('addBtn').addEventListener('click', onAdd);
  $('addInput').addEventListener('keydown', (e) => {
    if (e.key === 'Enter'){ e.preventDefault(); onAdd(); }
  });

  /* ============== FILTERS ============== */
  document.querySelectorAll('.chip').forEach(c => {
    c.addEventListener('click', () => {
      state.activeFilter = c.dataset.filter;
      state.selectedDate = null;
      document.querySelectorAll('.chip').forEach(x => x.setAttribute('aria-pressed', String(x === c)));
      $('dateFilter').value = '';
      save(); render();
    });
  });
  $('dateFilter').addEventListener('change', (e) => {
    if (e.target.value){
      state.activeFilter = 'DATE';
      state.selectedDate = e.target.value;
      document.querySelectorAll('.chip').forEach(x => x.setAttribute('aria-pressed', 'false'));
      save(); render();
    }
  });

  /* ============== UNDO ============== */
  $('undoBtn').addEventListener('click', undoLast);

  /* ============== INIT ============== */
  function init(){
    const saved = load();
    if (saved && Array.isArray(saved.tasks)){
      state.tasks = saved.tasks.map(t => Object.assign(makeTask(), t));
      if (saved.ui && saved.ui.activeFilter){
        state.activeFilter = saved.ui.activeFilter;
        document.querySelectorAll('.chip').forEach(x => x.setAttribute('aria-pressed', String(x.dataset.filter === state.activeFilter)));
      }
      if (saved.ui && saved.ui.selectedDate){
        state.selectedDate = saved.ui.selectedDate;
        $('dateFilter').value = saved.ui.selectedDate;
      }
    }
    document.querySelectorAll('.add-pri .pri').forEach(x => x.setAttribute('aria-pressed', String(x.dataset.pri === state.selectedPri)));
    render();
  }
  init();

  // double-tap zoom guard for older Safari (only outside inputs)
  let lastTouchEnd = 0;
  document.addEventListener('touchend', e => {
    const now = Date.now();
    if (now - lastTouchEnd < 320 && !e.target.closest('input, textarea, select, [contenteditable]')){ e.preventDefault(); }
    lastTouchEnd = now;
  }, { passive: false });

  /* ============== TEST SURFACE ============== */
  window.__doomStackPro = {
    state,
    addTask: (opts) => addTask(opts),
    updateTask, deleteTask, toggleComplete,
    addSubtask, toggleSubtask, deleteSubtask,
    undoLast,
    setFilter: (f, date) => {
      state.activeFilter = f;
      state.selectedDate = date || null;
      save(); render();
    },
    findTask,
    filteredTasks,
    todayKey,
    addDaysKey,
    nextDueDate,
    save, load,
    storageKey: () => LS_KEY,
    audit: () => ({
      storageOk:    !!window.localStorage,
      hasState:     Array.isArray(state.tasks),
      filterReady:  ['TODAY','TOMORROW','THIS_WEEK','NEXT_WEEK','ALL','DONE','DATE'].includes(state.activeFilter),
      mobileReady:  document.documentElement.scrollWidth <= document.documentElement.clientWidth + 1,
      externalDeps: !document.querySelector('link[href^="http"]') && !document.querySelector('script[src]'),
    }),
  };
})();
</script>
</body>
</html>
