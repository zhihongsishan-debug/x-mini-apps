<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no,maximum-scale=1" />
<meta name="theme-color" content="#040108" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="mobile-web-app-capable" content="yes" />
<title>CHAIN FEVER: TOXIC</title>
<style>
  :root{
    --bg-0:#040108;
    --bg-1:#08021a;
    --bg-2:#10052a;
    --ink:#eaffea;
    --sub:#7d9d8a;
    --line:rgba(182,255,26,.14);
    --cyan:#1cf4ff;
    --pink:#ff2bb5;
    --hot:#ff5ad0;
    --violet:#a366ff;
    --lime:#b6ff1a;
    --acid:#e8ff3a;
    --gold:#e8ff3a;
    --toxic-glow:rgba(182,255,26,.55);
    --venom:rgba(255,43,181,.55);
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;user-select:none;-webkit-user-select:none;touch-action:manipulation;}
  html,body{margin:0;padding:0;height:100%;overscroll-behavior:none;}
  body{
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Hiragino Sans","Noto Sans JP","Yu Gothic UI",system-ui,sans-serif;
    color:var(--ink);
    background:
      radial-gradient(40% 28% at 16% 10%, rgba(182,255,26,.20), transparent 65%),
      radial-gradient(45% 30% at 92% 18%, rgba(255,43,181,.22), transparent 65%),
      radial-gradient(55% 50% at 50% 112%, rgba(163,102,255,.30), transparent 60%),
      radial-gradient(80% 60% at 50% 50%, rgba(8,2,26,.0), rgba(0,0,0,.55) 90%),
      linear-gradient(180deg, #050010 0%, #07021c 50%, #0c0420 100%);
    background-attachment:fixed;
    height:100dvh;width:100%;
    overflow:hidden;
    position:fixed;
  }
  /* scanlines + chemical dust grid */
  body::before{
    content:"";position:fixed;inset:0;pointer-events:none;z-index:0;
    background-image:
      repeating-linear-gradient(0deg, rgba(182,255,26,.045) 0 1px, transparent 1px 3px),
      linear-gradient(rgba(255,255,255,.022) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,.022) 1px, transparent 1px),
      radial-gradient(rgba(182,255,26,.05) 1px, transparent 1.2px);
    background-size:100% 3px, 56px 56px, 56px 56px, 6px 6px;
    -webkit-mask-image:radial-gradient(ellipse 95% 85% at 50% 50%, #000 30%, rgba(0,0,0,.4) 78%, transparent 100%);
            mask-image:radial-gradient(ellipse 95% 85% at 50% 50%, #000 30%, rgba(0,0,0,.4) 78%, transparent 100%);
    mix-blend-mode:screen;
    opacity:.85;
  }
  /* drifting toxic smoke + neon vapor */
  body::after{
    content:"";position:fixed;inset:-10%;pointer-events:none;z-index:0;
    background:
      radial-gradient(20% 16% at 22% 36%, rgba(182,255,26,.30), transparent 75%),
      radial-gradient(18% 16% at 76% 60%, rgba(255,43,181,.28), transparent 75%),
      radial-gradient(16% 14% at 50% 12%, rgba(28,244,255,.20), transparent 80%),
      radial-gradient(22% 20% at 50% 90%, rgba(163,102,255,.30), transparent 80%);
    filter:blur(26px) saturate(1.15);
    animation:bgDrift 18s ease-in-out infinite alternate;
    mix-blend-mode:screen;
  }
  @keyframes bgDrift{
    from{transform:translate(0,0) rotate(0);}
    to{transform:translate(18px,-22px) rotate(2deg);}
  }
  /* vignette */
  body > .vignette{
    content:"";position:fixed;inset:0;pointer-events:none;z-index:1;
    background:radial-gradient(ellipse 75% 70% at 50% 50%, transparent 50%, rgba(0,0,0,.55) 92%, rgba(0,0,0,.85));
  }
  /* drifting chemical particles */
  .vapor{
    position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden;
  }
  .vapor span{
    position:absolute;display:block;
    width:3px;height:3px;border-radius:50%;
    background:var(--lime);
    box-shadow:0 0 8px var(--lime),0 0 14px rgba(182,255,26,.35);
    opacity:.55;
    animation:vaporRise linear infinite;
  }
  .vapor span:nth-child(2n){background:var(--pink);box-shadow:0 0 8px var(--pink);}
  .vapor span:nth-child(3n){background:var(--cyan);box-shadow:0 0 8px var(--cyan);}
  .vapor span:nth-child(4n){background:var(--violet);box-shadow:0 0 8px var(--violet);}
  @keyframes vaporRise{
    0%{transform:translateY(110vh) translateX(0) scale(.7);opacity:0;}
    8%{opacity:.6;}
    50%{transform:translateY(50vh) translateX(20px) scale(1);opacity:.55;}
    92%{opacity:.4;}
    100%{transform:translateY(-12vh) translateX(-30px) scale(.6);opacity:0;}
  }

  .app{
    position:relative;z-index:1;
    height:100dvh;
    display:flex;flex-direction:column;
    padding:max(8px,env(safe-area-inset-top)) 12px max(10px,env(safe-area-inset-bottom));
    gap:8px;
  }

  /* ===== TOP BAR ===== */
  .topbar{
    display:flex;justify-content:space-between;align-items:center;
    flex:0 0 auto;
  }
  .title{
    display:flex;flex-direction:column;line-height:1;
  }
  .title-main{
    font-size:17px;font-weight:900;letter-spacing:.32em;
    background:linear-gradient(90deg,var(--lime),#fff 50%,var(--pink));
    -webkit-background-clip:text;background-clip:text;color:transparent;
    text-shadow:0 0 16px rgba(182,255,26,.35),0 0 22px rgba(255,43,181,.25);
  }
  .title-sub{
    font-size:9px;font-weight:900;letter-spacing:.5em;
    color:var(--lime);
    margin-top:3px;
    text-shadow:0 0 8px var(--toxic-glow);
    opacity:.92;
  }
  .toggles{display:flex;gap:6px;}
  .topbtn{
    appearance:none;border:1px solid var(--line);
    background:rgba(255,255,255,.04);
    color:var(--sub);
    font:inherit;font-size:10px;letter-spacing:.2em;font-weight:700;
    padding:7px 10px;border-radius:999px;
    cursor:pointer;transition:all .15s ease;
  }
  .topbtn[aria-pressed="true"]{
    border-color:var(--cyan);color:#fff;
    background:rgba(61,240,255,.12);
    box-shadow:0 0 10px rgba(61,240,255,.35);
  }

  /* ===== HUD ===== */
  .hud{
    display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;
    flex:0 0 auto;
  }
  .hud-block{
    display:flex;flex-direction:column;align-items:center;
    padding:6px 8px;border-radius:10px;
    background:rgba(255,255,255,.04);
    border:1px solid var(--line);
    backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);
  }
  .hud-lbl{font-size:9px;letter-spacing:.35em;color:var(--sub);}
  .hud-val{
    font-size:18px;font-weight:800;line-height:1.1;
    font-feature-settings:"tnum";margin-top:2px;
  }
  .hud-val.accent{
    background:linear-gradient(90deg,var(--cyan),var(--pink));
    -webkit-background-clip:text;background-clip:text;color:transparent;
    text-shadow:0 0 10px rgba(255,62,181,.4);
  }

  /* ===== STAGE ===== */
  .stage{
    flex:1 1 auto;
    display:flex;align-items:center;justify-content:center;
    min-height:0;
  }
  .board-wrap{
    position:relative;
    /* width/height set by JS for exact 6:12 fit */
  }
  canvas#board{
    display:block;width:100%;height:100%;
    border-radius:18px;
    background:
      radial-gradient(80% 100% at 50% 0%, rgba(182,255,26,.08), transparent 60%),
      radial-gradient(60% 60% at 50% 100%, rgba(255,43,181,.06), transparent 70%),
      linear-gradient(180deg, rgba(2,0,8,.95), rgba(0,0,0,.85) 60%, rgba(0,0,0,.75));
    box-shadow:
      0 0 0 1px rgba(182,255,26,.18),
      0 0 22px rgba(182,255,26,.30),
      0 0 60px rgba(255,43,181,.16),
      inset 0 0 60px rgba(0,0,0,.75),
      inset 0 1px 0 rgba(255,255,255,.12);
    transition:box-shadow .35s ease;
  }
  /* toxic glass frame */
  .board-wrap::before{
    content:"";position:absolute;inset:0;border-radius:18px;pointer-events:none;
    background:linear-gradient(135deg, rgba(182,255,26,.55), rgba(182,255,26,0) 28%, rgba(255,43,181,0) 70%, rgba(255,43,181,.45));
    -webkit-mask:linear-gradient(#000,#000) content-box, linear-gradient(#000,#000);
    -webkit-mask-composite:xor;mask-composite:exclude;
    padding:1.4px;opacity:.85;mix-blend-mode:screen;
  }
  .board-wrap::after{
    content:"";position:absolute;inset:0;border-radius:18px;pointer-events:none;
    box-shadow:inset 0 0 28px rgba(0,0,0,.6),inset 0 0 8px rgba(182,255,26,.18);
  }
  body.danger canvas#board{
    animation:dangerPulse .9s ease-in-out infinite;
  }
  @keyframes dangerPulse{
    0%,100%{
      box-shadow:
        0 0 0 1px rgba(182,255,26,.18),
        0 0 22px rgba(182,255,26,.30),
        inset 0 0 60px rgba(0,0,0,.75),
        inset 0 1px 0 rgba(255,255,255,.12);
    }
    50%{
      box-shadow:
        0 0 0 2px rgba(255,43,181,.85),
        0 0 36px rgba(255,43,181,.70),
        0 0 60px rgba(232,255,58,.40),
        inset 0 0 60px rgba(60,0,40,.55),
        inset 0 1px 0 rgba(255,255,255,.12);
    }
  }
  body.danger .danger-tag{display:block;}
  .danger-tag{
    display:none;
    position:absolute;top:8px;left:50%;transform:translateX(-50%);
    font-size:11px;font-weight:900;letter-spacing:.45em;
    color:#0a0010;
    background:linear-gradient(90deg, var(--lime), var(--acid) 50%, var(--pink));
    padding:5px 14px;border-radius:99px;
    box-shadow:0 0 20px var(--toxic-glow), 0 0 28px var(--venom);
    pointer-events:none;
    animation:dangerTag .55s ease-in-out infinite alternate;
    z-index:3;
  }
  @keyframes dangerTag{
    from{transform:translateX(-50%) scale(.95);}
    to{transform:translateX(-50%) scale(1.05);}
  }
  /* chromatic glitch overlay (5+ chains) */
  .glitch{
    position:absolute;inset:0;border-radius:18px;pointer-events:none;
    mix-blend-mode:screen;opacity:0;z-index:4;
    background:
      linear-gradient(90deg, rgba(255,43,181,.0) 0%, rgba(255,43,181,.18) 50%, rgba(28,244,255,.18) 51%, rgba(28,244,255,.0) 100%);
  }
  .glitch.on{animation:glitchSlice .55s steps(8) 1;}
  @keyframes glitchSlice{
    0%  {opacity:0;transform:translate(0,0);}
    10% {opacity:.9;transform:translate(-3px,2px);clip-path:inset(10% 0 60% 0);}
    25% {opacity:.85;transform:translate(4px,-3px);clip-path:inset(40% 0 30% 0);}
    50% {opacity:.7;transform:translate(-2px,3px);clip-path:inset(70% 0 5% 0);}
    75% {opacity:.6;transform:translate(3px,-1px);clip-path:inset(20% 0 50% 0);}
    100%{opacity:0;transform:translate(0,0);clip-path:inset(0 0 0 0);}
  }
  /* afterglow pulse on the board after big chain */
  .afterglow{
    position:absolute;inset:0;border-radius:18px;pointer-events:none;z-index:2;
    box-shadow:0 0 0 0 rgba(182,255,26,0);
    opacity:0;
  }
  .afterglow.on{animation:afterglowPulse 1.4s cubic-bezier(.2,.8,.2,1) 1;}
  @keyframes afterglowPulse{
    0%  {opacity:0;box-shadow:inset 0 0 0 1px var(--lime),0 0 0 0 var(--toxic-glow);}
    20% {opacity:1;box-shadow:inset 0 0 60px var(--toxic-glow),0 0 60px var(--toxic-glow),0 0 90px var(--venom);}
    100%{opacity:0;box-shadow:inset 0 0 0 0 transparent,0 0 0 0 transparent;}
  }
  /* NEXT preview */
  .next-widget{
    position:absolute;top:8px;right:8px;
    padding:6px 8px 8px;
    border-radius:10px;
    background:rgba(0,0,0,.50);
    border:1px solid rgba(255,255,255,.10);
    backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);
    pointer-events:none;
    display:flex;flex-direction:column;align-items:center;gap:4px;
    z-index:3;
  }
  .next-lbl{font-size:8px;letter-spacing:.35em;color:var(--sub);}
  .next-stack{display:flex;flex-direction:column;gap:3px;align-items:center;}
  .next-blob{
    width:14px;height:14px;border-radius:50%;
    background:radial-gradient(circle at 30% 30%, #ffffff, currentColor 35%, currentColor);
    box-shadow:0 0 8px currentColor, inset -2px -3px 4px rgba(0,0,0,.35), inset 2px 3px 4px rgba(255,255,255,.4);
  }

  .combo-banner{
    position:absolute;left:0;right:0;top:24%;
    text-align:center;pointer-events:none;
    font-size:clamp(28px, 9vmin, 56px);font-weight:900;letter-spacing:.15em;line-height:1;
    background:linear-gradient(180deg,#fff,var(--lime) 50%,var(--pink));
    -webkit-background-clip:text;background-clip:text;color:transparent;
    text-shadow:0 0 24px var(--toxic-glow),0 0 36px var(--venom);
    opacity:0;transform:scale(.6);
    z-index:5;
  }
  .combo-banner .cb-sub{
    display:block;
    font-size:.36em;letter-spacing:.42em;
    margin-top:4px;
    -webkit-text-fill-color:initial;color:#eaffea;
    text-shadow:0 0 12px var(--toxic-glow);
    opacity:.92;
    background:none;
  }
  .combo-banner.on{animation:comboPop .9s cubic-bezier(.2,1.5,.4,1) forwards;}
  @keyframes comboPop{
    0%{opacity:0;transform:scale(.5);}
    20%{opacity:1;transform:scale(1.18);}
    60%{opacity:1;transform:scale(1);}
    100%{opacity:0;transform:scale(1);}
  }

  .popups{position:absolute;inset:0;pointer-events:none;}
  .score-popup{
    position:absolute;
    font-size:14px;font-weight:800;letter-spacing:.04em;
    color:#fff;
    text-shadow:0 0 10px rgba(255,228,77,.7),0 0 18px rgba(255,62,181,.5);
    opacity:0;pointer-events:none;
    animation:popUp .9s ease-out forwards;
    transform:translate(-50%,-50%);
  }
  @keyframes popUp{
    0%{opacity:0;transform:translate(-50%,-50%) scale(.6);}
    20%{opacity:1;transform:translate(-50%,-58%) scale(1.05);}
    100%{opacity:0;transform:translate(-50%,-130%) scale(1);}
  }

  /* shake */
  .shake-small{animation:shakeS .15s ease;}
  .shake-big{animation:shakeB .28s ease;}
  @keyframes shakeS{
    0%,100%{transform:translate(0,0);}
    25%{transform:translate(-3px,1px);}
    60%{transform:translate(2px,-2px);}
  }
  @keyframes shakeB{
    0%,100%{transform:translate(0,0);}
    14%{transform:translate(-7px,3px);}
    34%{transform:translate(6px,-4px);}
    55%{transform:translate(-5px,2px);}
    78%{transform:translate(4px,-1px);}
  }

  /* slowmo flash */
  .slowmo-flash{
    position:absolute;inset:0;border-radius:16px;pointer-events:none;
    background:radial-gradient(closest-side,rgba(255,255,255,.6),rgba(61,240,255,.25) 40%,transparent 80%);
    opacity:0;
  }
  .slowmo-flash.on{animation:slowmoFlash .9s ease-out;}
  @keyframes slowmoFlash{
    0%{opacity:0;}10%{opacity:1;}100%{opacity:0;}
  }

  /* ===== CONTROLS ===== */
  .controls{
    display:grid;grid-template-columns:repeat(4,1fr);gap:8px;
    flex:0 0 auto;
  }
  .ctrl{
    appearance:none;border:0;cursor:pointer;
    min-height:60px;
    border-radius:14px;
    font-family:inherit;font-size:24px;font-weight:900;
    color:#fff;letter-spacing:.04em;
    background:linear-gradient(180deg,rgba(255,255,255,.10),rgba(255,255,255,.04));
    border:1px solid var(--line);
    box-shadow:0 6px 18px rgba(176,124,255,.18),inset 0 1px 0 rgba(255,255,255,.20);
    transition:transform .08s ease,box-shadow .15s ease,background .15s ease;
    touch-action:manipulation;
  }
  .ctrl:active{transform:translateY(2px);box-shadow:0 2px 6px rgba(176,124,255,.18);}
  .ctrl-rotate{
    background:linear-gradient(180deg,rgba(163,113,255,.30),rgba(163,113,255,.10));
    border-color:rgba(163,113,255,.4);
    color:#fff;
    box-shadow:0 6px 18px rgba(163,113,255,.30),inset 0 1px 0 rgba(255,255,255,.25);
  }
  .ctrl-drop{
    background:linear-gradient(135deg,var(--lime) 0%,var(--cyan) 45%,var(--pink) 100%);
    color:#0a0010;
    font-size:14px;letter-spacing:.25em;
    box-shadow:0 8px 24px var(--venom),0 0 18px var(--toxic-glow),inset 0 1px 0 rgba(255,255,255,.4);
  }

  /* ===== GAME OVER ===== */
  .game-over{
    position:fixed;inset:0;z-index:50;
    display:none;align-items:center;justify-content:center;
    padding:24px;
    background:radial-gradient(70% 60% at 50% 50%,rgba(10,4,32,.55),rgba(6,3,15,.96));
    backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);
  }
  .game-over.on{display:flex;animation:fadeIn .35s ease both;}
  @keyframes fadeIn{from{opacity:0;}to{opacity:1;}}
  .go-card{
    position:relative;
    width:100%;max-width:320px;
    border-radius:22px;padding:28px 24px;
    background:linear-gradient(180deg,rgba(255,255,255,.06),rgba(255,255,255,.02));
    border:1px solid var(--line);
    text-align:center;
    box-shadow:0 0 60px rgba(255,62,181,.25);
  }
  .go-card::before{
    content:"";position:absolute;inset:-1px;border-radius:inherit;padding:1px;
    background:linear-gradient(135deg,rgba(61,240,255,.6),rgba(176,124,255,.5),rgba(255,62,181,.5));
    -webkit-mask:linear-gradient(#000 0 0) content-box,linear-gradient(#000 0 0);
    -webkit-mask-composite:xor;mask-composite:exclude;
    pointer-events:none;
  }
  .go-card h2{
    margin:0 0 6px;
    font-size:24px;font-weight:900;letter-spacing:.18em;line-height:1.15;
    background:linear-gradient(90deg,var(--lime),#fff 50%,var(--pink));
    -webkit-background-clip:text;background-clip:text;color:transparent;
    text-shadow:0 0 18px var(--toxic-glow),0 0 26px var(--venom);
  }
  .go-sub{
    margin:0 0 16px;
    font-size:11px;letter-spacing:.4em;color:var(--lime);
    text-shadow:0 0 8px var(--toxic-glow);
    opacity:.92;
  }
  .go-row{
    display:flex;justify-content:space-between;align-items:baseline;
    font-size:11px;letter-spacing:.25em;color:var(--sub);
    padding:10px 0;
    border-bottom:1px dashed var(--line);
  }
  .go-row .val{
    font-size:22px;color:#fff;font-weight:800;
    font-feature-settings:"tnum";letter-spacing:0;
  }
  .restart{
    appearance:none;border:0;cursor:pointer;
    margin:22px 0 12px;width:100%;padding:14px;
    border-radius:12px;
    font:inherit;font-weight:900;font-size:14px;letter-spacing:.35em;
    color:#0a0010;
    background:linear-gradient(135deg,var(--lime),var(--acid) 40%,var(--pink));
    box-shadow:0 8px 28px var(--venom),0 0 18px var(--toxic-glow),inset 0 1px 0 rgba(255,255,255,.4);
  }
  .ss-note{margin:4px 0 0;font-size:11px;color:var(--sub);letter-spacing:.25em;}

  @media (max-height:700px){
    .title{font-size:15px;letter-spacing:.28em;}
    .hud-val{font-size:16px;}
    .ctrl{min-height:56px;font-size:21px;}
  }

  /* ===== START OVERLAY (v3) ===== */
  .start-overlay{
    position:fixed;inset:0;z-index:80;
    display:flex;align-items:center;justify-content:center;
    padding:24px;
    background:radial-gradient(70% 60% at 50% 50%,rgba(10,4,32,.45),rgba(6,3,15,.96));
    backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);
    transition:opacity .4s ease,transform .4s ease;
  }
  .start-overlay.hide{opacity:0;pointer-events:none;transform:scale(1.05);}
  .so-card{
    position:relative;text-align:center;
    padding:38px 30px 32px;border-radius:24px;
    background:linear-gradient(180deg,rgba(255,255,255,.06),rgba(255,255,255,.02));
    border:1px solid var(--line);
    box-shadow:0 0 60px rgba(255,62,181,.25);
    cursor:pointer;
  }
  .so-card::before{
    content:"";position:absolute;inset:-1px;border-radius:inherit;padding:1px;
    background:linear-gradient(135deg,rgba(61,240,255,.6),rgba(176,124,255,.5),rgba(255,62,181,.5));
    -webkit-mask:linear-gradient(#000 0 0) content-box,linear-gradient(#000 0 0);
    -webkit-mask-composite:xor;mask-composite:exclude;
    pointer-events:none;
  }
  .so-title{
    font-size:30px;font-weight:900;letter-spacing:.22em;
    background:linear-gradient(90deg,var(--lime),#fff 50%,var(--pink));
    -webkit-background-clip:text;background-clip:text;color:transparent;
    text-shadow:0 0 28px var(--toxic-glow),0 0 36px var(--venom);
    animation:soTitlePulse 2.4s ease-in-out infinite;
    line-height:1.1;
  }
  .so-tag{
    margin-top:6px;
    font-size:11px;font-weight:900;letter-spacing:.6em;
    color:var(--lime);
    text-shadow:0 0 12px var(--toxic-glow);
  }
  @keyframes soTitlePulse{
    0%,100%{filter:brightness(1);transform:scale(1);}
    50%{filter:brightness(1.18);transform:scale(1.02);}
  }
  .so-sub{
    margin:14px 0 26px;
    font-size:12px;letter-spacing:.4em;color:var(--sub);
  }
  .so-btn{
    appearance:none;border:0;cursor:pointer;
    padding:18px 44px;border-radius:999px;
    font-family:inherit;font-weight:900;font-size:14px;letter-spacing:.4em;
    color:#0a0010;
    background:linear-gradient(135deg,var(--lime),var(--acid) 40%,var(--pink));
    box-shadow:0 12px 40px var(--venom),0 0 18px var(--toxic-glow),inset 0 1px 0 rgba(255,255,255,.5);
    animation:soBtnBreathe 1.5s ease-in-out infinite;
  }
  @keyframes soBtnBreathe{
    0%,100%{transform:scale(1);box-shadow:0 12px 40px var(--venom),0 0 18px var(--toxic-glow),inset 0 1px 0 rgba(255,255,255,.5);}
    50%{transform:scale(1.06);box-shadow:0 14px 50px var(--venom),0 0 28px var(--toxic-glow),0 0 24px rgba(28,244,255,.4),inset 0 1px 0 rgba(255,255,255,.5);}
  }
  @media (max-width:380px){
    .so-title{font-size:28px;letter-spacing:.22em;}
  }

  /* ===== SHOCKWAVE (5+ chain) ===== */
  .shockwave{
    position:absolute;left:50%;top:50%;
    width:0;height:0;
    border:3px solid var(--cyan);
    border-radius:50%;
    transform:translate(-50%,-50%);
    pointer-events:none;
    opacity:0;
    box-shadow:0 0 24px var(--cyan),inset 0 0 24px var(--cyan);
  }
  .shockwave.on{animation:shockwaveExpand .85s cubic-bezier(.2,.7,.2,1) forwards;}
  @keyframes shockwaveExpand{
    0%  {width:30px;height:30px;opacity:1;border-width:4px;border-color:#fff;box-shadow:0 0 30px #fff,inset 0 0 30px var(--cyan);}
    40% {opacity:.9;border-color:var(--cyan);}
    100%{width:120vmin;height:120vmin;opacity:0;border-width:1px;border-color:var(--pink);}
  }

  /* ===== LEGENDARY FLASH (8+ chain) ===== */
  .leg-flash{
    position:fixed;inset:0;z-index:60;pointer-events:none;
    background:
      radial-gradient(60% 50% at 50% 50%, rgba(255,228,77,.55), transparent 70%),
      radial-gradient(80% 70% at 50% 50%, rgba(255,62,181,.30), transparent 75%),
      radial-gradient(100% 90% at 50% 50%, rgba(61,240,255,.25), transparent 80%);
    opacity:0;
  }
  .leg-flash.on{animation:legFlashOnce 1.05s cubic-bezier(.1,.7,.2,1);}
  @keyframes legFlashOnce{
    0%  {opacity:0;}
    14% {opacity:1;}
    100%{opacity:0;}
  }

  /* combo banner tier scaling */
  .combo-banner.tier-strong{font-size:clamp(34px, 11vmin, 70px);}
  .combo-banner.tier-legendary{
    font-size:clamp(40px, 14vmin, 86px);
    background:linear-gradient(180deg,#fff,var(--acid) 35%,var(--pink) 75%,var(--violet));
    -webkit-background-clip:text;background-clip:text;color:transparent;
    text-shadow:0 0 32px var(--toxic-glow),0 0 60px var(--venom);
  }

  /* mega shake for 8+ */
  .shake-mega{animation:shakeM .42s ease;}
  @keyframes shakeM{
    0%,100%{transform:translate(0,0);}
    10%{transform:translate(-10px,4px);}
    25%{transform:translate(8px,-6px);}
    42%{transform:translate(-7px,3px);}
    60%{transform:translate(6px,-2px);}
    78%{transform:translate(-4px,1px);}
  }

  /* share button on game over */
  .share-btn{
    appearance:none;border:1px solid rgba(255,255,255,.18);cursor:pointer;
    margin:6px 0 0;width:100%;padding:13px;
    border-radius:12px;
    font:inherit;font-weight:800;font-size:13px;letter-spacing:.3em;
    color:#fff;
    background:linear-gradient(180deg,rgba(0,0,0,.55),rgba(0,0,0,.35));
    transition:all .15s ease;
  }
  .share-btn:hover{border-color:var(--cyan);box-shadow:0 0 14px rgba(61,240,255,.35);}
  .share-btn:active{transform:translateY(1px);}
  .share-feedback{
    margin:6px 0 0;font-size:11px;letter-spacing:.3em;color:var(--cyan);
    opacity:0;transition:opacity .25s ease;height:14px;
  }
  .share-feedback.on{opacity:1;}
</style>
</head>
<body>

<div class="vapor" aria-hidden="true">
  <span style="left:6%;animation-duration:14s;animation-delay:-2s;"></span>
  <span style="left:18%;animation-duration:18s;animation-delay:-9s;"></span>
  <span style="left:32%;animation-duration:16s;animation-delay:-5s;"></span>
  <span style="left:45%;animation-duration:21s;animation-delay:-13s;"></span>
  <span style="left:58%;animation-duration:13s;animation-delay:-3s;"></span>
  <span style="left:72%;animation-duration:19s;animation-delay:-7s;"></span>
  <span style="left:85%;animation-duration:15s;animation-delay:-11s;"></span>
  <span style="left:92%;animation-duration:22s;animation-delay:-1s;"></span>
</div>

<div class="app">
  <header class="topbar">
    <div class="title">
      <div class="title-main">CHAIN FEVER</div>
      <div class="title-sub">TOXIC MODE</div>
    </div>
    <div class="toggles">
      <button class="topbtn" id="soundToggle" type="button" aria-pressed="true">♪ ON</button>
      <button class="topbtn" id="vibToggle" type="button" aria-pressed="true">⫶ ON</button>
    </div>
  </header>

  <div class="hud">
    <div class="hud-block">
      <span class="hud-lbl">SCORE</span>
      <span class="hud-val" id="scoreVal">0</span>
    </div>
    <div class="hud-block">
      <span class="hud-lbl">MAX</span>
      <span class="hud-val accent" id="chainVal">0</span>
    </div>
    <div class="hud-block">
      <span class="hud-lbl">BEST</span>
      <span class="hud-val" id="bestVal">0</span>
    </div>
  </div>

  <section class="stage">
    <div class="board-wrap" id="boardWrap">
      <canvas id="board" width="240" height="480"></canvas>
      <div class="slowmo-flash" id="slowmoFlash"></div>
      <div class="afterglow" id="afterglow" aria-hidden="true"></div>
      <div class="glitch" id="glitchOverlay" aria-hidden="true"></div>
      <div class="shockwave" id="shockwave" aria-hidden="true"></div>
      <div class="combo-banner" id="comboBanner"></div>
      <div class="popups" id="popups"></div>
      <div class="danger-tag" id="dangerTag">TOXIC LEVEL CRITICAL</div>
      <div class="next-widget" id="nextWidget" aria-label="次のペア">
        <div class="next-lbl">NEXT</div>
        <div class="next-stack" id="nextStack"></div>
      </div>
    </div>
  </section>

  <section class="controls" aria-label="操作">
    <button class="ctrl" id="btnLeft" type="button" aria-label="左">◀</button>
    <button class="ctrl ctrl-rotate" id="btnRotate" type="button" aria-label="回転">↻</button>
    <button class="ctrl ctrl-drop" id="btnDrop" type="button" aria-label="ドロップ">DROP</button>
    <button class="ctrl" id="btnRight" type="button" aria-label="右">▶</button>
  </section>
</div>

<div class="game-over" id="gameOver" aria-hidden="true">
  <div class="go-card">
    <h2>YOU COULDN&#39;T STOP</h2>
    <p class="go-sub">そのスコア、貼って。</p>
    <div class="go-row"><span>SCORE</span><span class="val" id="goScore">0</span></div>
    <div class="go-row"><span>BEST</span><span class="val" id="goBest">0</span></div>
    <div class="go-row" style="border-bottom:0;"><span>MAX CHAIN</span><span class="val" id="goChain">0</span></div>
    <button class="restart" id="restartBtn" type="button">もう一度</button>
    <button class="share-btn" id="shareBtn" type="button">Xでシェア</button>
    <p class="share-feedback" id="shareFeedback">コピーしました</p>
    <p class="ss-note">毒に呑まれた。</p>
  </div>
</div>

<div class="start-overlay" id="startOverlay" aria-label="開始">
  <div class="so-card" id="soCard" role="button" tabindex="0">
    <div class="so-title">CHAIN FEVER<br/>: TOXIC</div>
    <div class="so-tag">TOXIC MODE</div>
    <div class="so-sub">音 あ り 推 奨</div>
    <button class="so-btn" id="soStartBtn" type="button">TAP TO START</button>
  </div>
</div>

<div class="leg-flash" id="legFlash" aria-hidden="true"></div>

<script>
(() => {
  const $ = id => document.getElementById(id);
  const cv = $('board');
  const ctx = cv.getContext('2d');
  const boardWrap = $('boardWrap');

  /* ============== CONSTANTS ============== */
  const COLS = 6, ROWS = 12;
  const COLORS = ['#b6ff1a','#ff2bb5','#1cf4ff','#a366ff']; // toxic lime / magenta / cyan / violet
  const TOXIC_TINT = '#e8ff3a'; // acid yellow accent for special toxic blobs
  const NUM_COLORS = COLORS.length;
  const FALL_INIT_MS = 700;
  const TOXIC_SPAWN_RATE = 0.03; // 3% chance per blob

  /* ============== STATE ============== */
  let bestScore = 0;
  try { bestScore = parseInt(localStorage.getItem('chainFeverBest') || '0', 10) || 0; } catch(_){}
  const state = {
    board: Array.from({length:ROWS}, () => Array(COLS).fill(null)),
    pair: null,
    score: 0,
    chain: 0,
    highChain: 0,
    bestScore,
    fallMs: FALL_INIT_MS,
    lastFallAt: 0,
    isAnimating: false,
    isGameOver: false,
    timeScale: 1.0,
    soundOn: true,
    vibOn: true,
    totalCleared: 0,
    /* polish additions */
    nextA: Math.floor(Math.random() * 4),
    nextB: Math.floor(Math.random() * 4),
    recoveryUntil: 0,
    maxStack: 0,
    danger: false,
    pairCount: 0,
    /* v3 dopamine patch */
    started: false,
    spokenThresholds: new Set(),
  };

  /* ============== AUDIO ============== */
  let audioCtx = null, masterGain = null, noiseBuf = null;
  let bgmGain = null, bgmStarted = false, bgmInterval = null;
  let bgmBassGain = null, bgmLfo = null, bgmFilter = null;
  let bgmIntensity = 0; // 0 calm / 1 mid / 2 high
  function initAudio(){
    if (audioCtx) return;
    try{
      const AC = window.AudioContext || window.webkitAudioContext;
      if (!AC) return;
      audioCtx = new AC();
      masterGain = audioCtx.createGain();
      masterGain.gain.value = state.soundOn ? 1 : 0;
      masterGain.connect(audioCtx.destination);
      const len = audioCtx.sampleRate;
      noiseBuf = audioCtx.createBuffer(1, len, audioCtx.sampleRate);
      const data = noiseBuf.getChannelData(0);
      for (let i = 0; i < len; i++) data[i] = Math.random() * 2 - 1;
    }catch(_){ audioCtx = null; }
  }
  function applySound(){
    if (!masterGain || !audioCtx) return;
    const t = audioCtx.currentTime;
    masterGain.gain.cancelScheduledValues(t);
    masterGain.gain.linearRampToValueAtTime(state.soundOn ? 1 : 0, t + 0.06);
  }
  function setSound(v){
    state.soundOn = !!v;
    $('soundToggle').setAttribute('aria-pressed', String(state.soundOn));
    $('soundToggle').textContent = state.soundOn ? '♪ ON' : '♪ OFF';
    applySound();
    // also gate BGM so toggle visibly mutes everything including BGM
    if (audioCtx && bgmStarted && bgmGain){
      const t = audioCtx.currentTime;
      bgmGain.gain.cancelScheduledValues(t);
      bgmGain.gain.linearRampToValueAtTime(state.soundOn ? 0.55 : 0, t + 0.30);
    }
  }
  function setVib(v){
    state.vibOn = !!v;
    $('vibToggle').setAttribute('aria-pressed', String(state.vibOn));
    $('vibToggle').textContent = state.vibOn ? '⫶ ON' : '⫶ OFF';
  }
  function vibrate(pattern){
    if (!state.vibOn) return;
    if (typeof navigator.vibrate !== 'function') return;
    try { navigator.vibrate(pattern); } catch(_){}
  }
  function jit(b, p){ return b * (1 + (Math.random() - .5) * 2 * p); }

  function playPlace(){
    if (!audioCtx) return;
    const t = audioCtx.currentTime;
    const o = audioCtx.createOscillator(); o.type='triangle';
    o.frequency.setValueAtTime(jit(220,0.05), t);
    o.frequency.exponentialRampToValueAtTime(jit(120,0.05), t + 0.06);
    const g = audioCtx.createGain(); g.gain.value = 0;
    o.connect(g); g.connect(masterGain);
    g.gain.linearRampToValueAtTime(0.30, t + 0.005);
    g.gain.exponentialRampToValueAtTime(0.001, t + 0.10);
    o.start(t); o.stop(t + 0.12);
  }
  function playClear(chainLevel){
    if (!audioCtx) return;
    const baseFreq = 440 * Math.pow(2, (chainLevel - 1) * 2 / 12);
    const t = audioCtx.currentTime;
    const o = audioCtx.createOscillator(); o.type='sine';
    o.frequency.setValueAtTime(baseFreq, t);
    o.frequency.exponentialRampToValueAtTime(baseFreq * 1.8, t + 0.12);
    const g = audioCtx.createGain(); g.gain.value = 0;
    o.connect(g); g.connect(masterGain);
    g.gain.linearRampToValueAtTime(0.40, t + 0.005);
    g.gain.exponentialRampToValueAtTime(0.001, t + 0.25);
    o.start(t); o.stop(t + 0.30);
    // sparkle
    const ns = audioCtx.createBufferSource(); ns.buffer = noiseBuf;
    const nf = audioCtx.createBiquadFilter(); nf.type='highpass'; nf.frequency.value = 4200;
    const ng = audioCtx.createGain(); ng.gain.value = 0;
    ns.connect(nf); nf.connect(ng); ng.connect(masterGain);
    ng.gain.linearRampToValueAtTime(0.16, t + 0.005);
    ng.gain.exponentialRampToValueAtTime(0.001, t + 0.12);
    ns.start(t); ns.stop(t + 0.16);
  }
  function playBigChain(){
    if (!audioCtx) return;
    const t = audioCtx.currentTime;
    const o = audioCtx.createOscillator(); o.type='sawtooth';
    o.frequency.setValueAtTime(160, t);
    o.frequency.exponentialRampToValueAtTime(880, t + 0.4);
    const f = audioCtx.createBiquadFilter(); f.type='lowpass'; f.frequency.value = 1300; f.Q.value = 4;
    const g = audioCtx.createGain(); g.gain.value = 0;
    o.connect(f); f.connect(g); g.connect(masterGain);
    g.gain.linearRampToValueAtTime(0.30, t + 0.01);
    g.gain.exponentialRampToValueAtTime(0.001, t + 0.5);
    o.start(t); o.stop(t + 0.55);
    // boom
    const ns = audioCtx.createBufferSource(); ns.buffer = noiseBuf;
    const nf = audioCtx.createBiquadFilter(); nf.type='lowpass'; nf.frequency.value = 220;
    const ng = audioCtx.createGain(); ng.gain.value = 0;
    ns.connect(nf); nf.connect(ng); ng.connect(masterGain);
    ng.gain.linearRampToValueAtTime(0.40, t + 0.005);
    ng.gain.exponentialRampToValueAtTime(0.001, t + 0.30);
    ns.start(t); ns.stop(t + 0.35);
  }
  function playGameOver(){
    if (!audioCtx) return;
    const t = audioCtx.currentTime;
    const notes = [330, 277, 220, 165];
    notes.forEach((f, i) => {
      const o = audioCtx.createOscillator(); o.type='triangle';
      o.frequency.value = f;
      const g = audioCtx.createGain(); g.gain.value = 0;
      o.connect(g); g.connect(masterGain);
      const start = t + i * 0.18;
      g.gain.linearRampToValueAtTime(0.28, start + 0.02);
      g.gain.exponentialRampToValueAtTime(0.001, start + 0.5);
      o.start(start); o.stop(start + 0.55);
    });
  }

  /* ----- BGM (looping arcade tension) ----- */
  function startBGM(){
    if (!audioCtx || bgmStarted) return;
    bgmStarted = true;
    bgmGain = audioCtx.createGain();
    bgmGain.gain.value = 0;
    bgmGain.connect(masterGain);

    // sub-bass oscillator + LFO
    const o1 = audioCtx.createOscillator(); o1.type='sine'; o1.frequency.value = 65;
    const o2 = audioCtx.createOscillator(); o2.type='sine'; o2.frequency.value = 65.6;
    bgmFilter = audioCtx.createBiquadFilter(); bgmFilter.type='lowpass';
    bgmFilter.frequency.value = 320; bgmFilter.Q.value = 1.0;
    bgmBassGain = audioCtx.createGain(); bgmBassGain.gain.value = 0.16;
    o1.connect(bgmFilter); o2.connect(bgmFilter);
    bgmFilter.connect(bgmBassGain); bgmBassGain.connect(bgmGain);
    o1.start(); o2.start();

    // pulse LFO modulating bass amplitude
    bgmLfo = audioCtx.createOscillator(); bgmLfo.type='sine';
    bgmLfo.frequency.value = 1.6; // 96 BPM-ish pulse
    const lfoGain = audioCtx.createGain(); lfoGain.gain.value = 0.10;
    bgmLfo.connect(lfoGain); lfoGain.connect(bgmBassGain.gain);
    bgmLfo.start();

    // fade in BGM
    const t0 = audioCtx.currentTime;
    bgmGain.gain.linearRampToValueAtTime(0.55, t0 + 1.2);

    // arpeggio + hat scheduler (every 250ms ~ 240 ticks/min, but dense pattern)
    let beat = 0;
    const arpNotes = [220, 277, 330, 277, 220, 277, 330, 440];
    bgmInterval = setInterval(() => {
      if (!audioCtx || !bgmStarted) return;
      const tNow = audioCtx.currentTime;
      // hat
      const ns = audioCtx.createBufferSource(); ns.buffer = noiseBuf;
      const nf = audioCtx.createBiquadFilter(); nf.type='highpass';
      nf.frequency.value = bgmIntensity >= 2 ? 5000 : 6500;
      const ng = audioCtx.createGain(); ng.gain.value = 0;
      ns.connect(nf); nf.connect(ng); ng.connect(bgmGain);
      const hatVol = bgmIntensity >= 2 ? 0.06 : (bgmIntensity === 1 ? 0.045 : 0.035);
      ng.gain.linearRampToValueAtTime(hatVol, tNow + 0.005);
      ng.gain.exponentialRampToValueAtTime(0.001, tNow + 0.05);
      ns.start(tNow); ns.stop(tNow + 0.06);

      // arp tick on certain beats; more frequent at high intensity
      const arpEvery = bgmIntensity >= 2 ? 2 : (bgmIntensity === 1 ? 3 : 4);
      if (beat % arpEvery === 0){
        const o = audioCtx.createOscillator(); o.type='square';
        o.frequency.value = arpNotes[Math.floor(beat / 2) % arpNotes.length];
        const f = audioCtx.createBiquadFilter(); f.type='lowpass';
        f.frequency.value = bgmIntensity >= 2 ? 2400 : 1500;
        const g = audioCtx.createGain(); g.gain.value = 0;
        o.connect(f); f.connect(g); g.connect(bgmGain);
        const arpVol = bgmIntensity >= 2 ? 0.07 : (bgmIntensity === 1 ? 0.05 : 0.038);
        g.gain.linearRampToValueAtTime(arpVol, tNow + 0.005);
        g.gain.exponentialRampToValueAtTime(0.001, tNow + 0.18);
        o.start(tNow); o.stop(tNow + 0.20);
      }
      beat++;
    }, 250);
  }

  function setBgmIntensity(level){
    bgmIntensity = level;
    if (!audioCtx || !bgmLfo) return;
    const t = audioCtx.currentTime;
    const lfoFreq = level === 0 ? 1.6 : level === 1 ? 2.4 : 3.6;
    const filtFreq = level === 0 ? 320 : level === 1 ? 460 : 700;
    bgmLfo.frequency.cancelScheduledValues(t);
    bgmLfo.frequency.linearRampToValueAtTime(lfoFreq, t + 0.5);
    if (bgmFilter){
      bgmFilter.frequency.cancelScheduledValues(t);
      bgmFilter.frequency.linearRampToValueAtTime(filtFreq, t + 0.5);
    }
  }

  function stopBGM(){
    if (bgmInterval){ clearInterval(bgmInterval); bgmInterval = null; }
    if (bgmGain && audioCtx){
      const t = audioCtx.currentTime;
      bgmGain.gain.cancelScheduledValues(t);
      bgmGain.gain.linearRampToValueAtTime(0, t + 0.4);
    }
  }

  /* ----- v3 SFX layers ----- */
  function playBass(){
    if (!audioCtx) return;
    const t = audioCtx.currentTime;
    // sub-sine bass thump
    const o = audioCtx.createOscillator(); o.type='sine';
    o.frequency.setValueAtTime(75, t);
    o.frequency.exponentialRampToValueAtTime(42, t + 0.20);
    const g = audioCtx.createGain(); g.gain.value = 0;
    o.connect(g); g.connect(masterGain);
    g.gain.linearRampToValueAtTime(0.42, t + 0.005);
    g.gain.exponentialRampToValueAtTime(0.001, t + 0.32);
    o.start(t); o.stop(t + 0.36);
    // low-noise click
    const ns = audioCtx.createBufferSource(); ns.buffer = noiseBuf;
    const nf = audioCtx.createBiquadFilter(); nf.type='lowpass'; nf.frequency.value = 180;
    const ng = audioCtx.createGain(); ng.gain.value = 0;
    ns.connect(nf); nf.connect(ng); ng.connect(masterGain);
    ng.gain.linearRampToValueAtTime(0.30, t + 0.005);
    ng.gain.exponentialRampToValueAtTime(0.001, t + 0.10);
    ns.start(t); ns.stop(t + 0.12);
  }
  function playShimmer(){
    if (!audioCtx) return;
    const t = audioCtx.currentTime;
    const notes = [880, 1320, 1760, 2640];
    notes.forEach((f, i) => {
      const o = audioCtx.createOscillator(); o.type='sine';
      o.frequency.value = f;
      const g = audioCtx.createGain(); g.gain.value = 0;
      o.connect(g); g.connect(masterGain);
      const start = t + i * 0.05;
      g.gain.linearRampToValueAtTime(0.16, start + 0.01);
      g.gain.exponentialRampToValueAtTime(0.001, start + 0.55);
      o.start(start); o.stop(start + 0.6);
    });
    const ns = audioCtx.createBufferSource(); ns.buffer = noiseBuf;
    const nf = audioCtx.createBiquadFilter(); nf.type='highpass'; nf.frequency.value = 6500;
    const ng = audioCtx.createGain(); ng.gain.value = 0;
    ns.connect(nf); nf.connect(ng); ng.connect(masterGain);
    ng.gain.linearRampToValueAtTime(0.10, t + 0.05);
    ng.gain.exponentialRampToValueAtTime(0.001, t + 0.7);
    ns.start(t); ns.stop(t + 0.75);
  }
  function playSparkle(){
    if (!audioCtx) return;
    const t = audioCtx.currentTime;
    const notes = [1320, 1760, 2640, 3520, 2960, 2640];
    notes.forEach((f, i) => {
      const o = audioCtx.createOscillator(); o.type='sine';
      o.frequency.value = f;
      const g = audioCtx.createGain(); g.gain.value = 0;
      o.connect(g); g.connect(masterGain);
      const start = t + i * 0.06;
      g.gain.linearRampToValueAtTime(0.15, start + 0.01);
      g.gain.exponentialRampToValueAtTime(0.001, start + 0.7);
      o.start(start); o.stop(start + 0.75);
    });
    // big bass thump for legendary
    const o = audioCtx.createOscillator(); o.type='sine';
    o.frequency.setValueAtTime(50, t);
    o.frequency.exponentialRampToValueAtTime(28, t + 0.30);
    const g = audioCtx.createGain(); g.gain.value = 0;
    o.connect(g); g.connect(masterGain);
    g.gain.linearRampToValueAtTime(0.38, t + 0.005);
    g.gain.exponentialRampToValueAtTime(0.001, t + 0.55);
    o.start(t); o.stop(t + 0.6);
  }

  /* ----- voice praise via Web Speech API ----- */
  const VOICE_LINES = {
    3: 'Toxic',
    4: 'Beautiful damage',
    5: 'Venom chain',
    6: 'You like this',
    8: 'Unholy chain',
  };
  function speakChain(chain){
    if (!state.soundOn) return;
    if (chain < 3) return;
    if (typeof window.speechSynthesis === 'undefined') return;
    let threshold;
    if (chain >= 8) threshold = 8;
    else if (chain >= 6) threshold = 6;
    else if (chain === 5) threshold = 5;
    else if (chain === 4) threshold = 4;
    else if (chain === 3) threshold = 3;
    else return;
    if (state.spokenThresholds.has(threshold)) return;
    state.spokenThresholds.add(threshold);
    const text = VOICE_LINES[threshold];
    if (!text) return;
    try{
      const u = new SpeechSynthesisUtterance(text);
      u.rate = 1.05; u.pitch = 1.05; u.volume = 0.85;
      u.lang = 'en-US';
      const voices = (speechSynthesis.getVoices && speechSynthesis.getVoices()) || [];
      const v = voices.find(x => /^en/i.test(x.lang)) || voices[0];
      if (v) u.voice = v;
      speechSynthesis.cancel();
      speechSynthesis.speak(u);
    }catch(_){ /* graceful */ }
  }

  /* ============== CANVAS ============== */
  let CELL = 64, CAN_W = COLS * CELL, CAN_H = ROWS * CELL;
  function fitCanvas(){
    const stage = document.querySelector('.stage');
    const sw = stage.clientWidth;
    const sh = stage.clientHeight;
    if (sw <= 0 || sh <= 0) return;
    const aspect = COLS / ROWS;
    let w, h;
    if (sw / sh > aspect){ h = sh; w = h * aspect; }
    else { w = sw; h = w / aspect; }
    boardWrap.style.width  = w + 'px';
    boardWrap.style.height = h + 'px';
    const dpr = Math.min(window.devicePixelRatio || 1, 2);
    cv.width  = Math.max(1, Math.round(w * dpr));
    cv.height = Math.max(1, Math.round(h * dpr));
    CELL = cv.width / COLS;
    CAN_W = cv.width;
    CAN_H = cv.height;
  }
  window.addEventListener('resize', fitCanvas);
  window.addEventListener('orientationchange', fitCanvas);

  /* ============== DRAWING ============== */
  function shade(hex, amt){
    // amt in [-1,1]; -1 black, +1 white
    const m = /^#([0-9a-f]{6})$/i.exec(hex);
    if (!m) return hex;
    const v = parseInt(m[1], 16);
    let r = (v >> 16) & 0xff, g = (v >> 8) & 0xff, b = v & 0xff;
    if (amt >= 0){ r += (255 - r) * amt; g += (255 - g) * amt; b += (255 - b) * amt; }
    else        { r += r * amt;          g += g * amt;          b += b * amt; }
    r = Math.max(0, Math.min(255, r|0));
    g = Math.max(0, Math.min(255, g|0));
    b = Math.max(0, Math.min(255, b|0));
    return '#' + ((1<<24) | (r<<16) | (g<<8) | b).toString(16).slice(1);
  }
  function drawBlob(x, y, r, color, opacity, sx, sy, seed, toxic){
    if (opacity <= 0) return;
    sx = sx == null ? 1 : sx;
    sy = sy == null ? 1 : sy;
    seed = seed == null ? 0 : seed;
    toxic = !!toxic;
    ctx.globalAlpha = opacity;

    // moving liquid highlight + asymmetric per-blob ovality (slightly stronger asymmetry)
    const tt = performance.now() * 0.001;
    const ovalSx = 1 + Math.sin(seed * 1.7) * 0.06 + Math.cos(tt * 0.7 + seed) * 0.025;
    const ovalSy = 1 + Math.cos(seed * 2.3) * 0.06 + Math.sin(tt * 0.6 + seed * 1.3) * 0.025;
    const rx = r * sx * ovalSx;
    const ry = r * sy * ovalSy;

    // drop shadow under blob
    ctx.fillStyle = 'rgba(0,0,0,.55)';
    ctx.beginPath();
    ctx.ellipse(x + r*0.06, y + r*0.62, r*0.78*sx, r*0.22, 0, 0, Math.PI*2);
    ctx.fill();

    // smoky aura — wide poisonous halo
    const gAura = ctx.createRadialGradient(x, y, r*0.35, x, y, r * 2.0);
    gAura.addColorStop(0, color + 'aa');
    gAura.addColorStop(0.40, color + '55');
    gAura.addColorStop(1, color + '00');
    ctx.fillStyle = gAura;
    ctx.beginPath(); ctx.arc(x, y, r * 2.0, 0, Math.PI*2); ctx.fill();

    // outer color halo
    const g0 = ctx.createRadialGradient(x, y, r*0.30, x, y, r * 1.65);
    g0.addColorStop(0, color + 'cc');
    g0.addColorStop(0.50, color + '44');
    g0.addColorStop(1, color + '00');
    ctx.fillStyle = g0;
    ctx.beginPath(); ctx.arc(x, y, r * 1.65, 0, Math.PI*2); ctx.fill();

    // body — toxic jelly gradient: bright core + dark venom rim
    const hlOffX = -rx*0.32 + Math.sin(tt * 1.15 + seed) * rx*0.06;
    const hlOffY = -ry*0.42 + Math.cos(tt * 0.95 + seed * 1.3) * ry*0.05;
    const g1 = ctx.createRadialGradient(x + hlOffX, y + hlOffY, 0, x, y, Math.max(rx, ry));
    g1.addColorStop(0,    '#ffffff');
    g1.addColorStop(0.14, color);
    g1.addColorStop(0.55, color);
    g1.addColorStop(0.92, shade(color, -.45));
    g1.addColorStop(1,    shade(color, -.65));
    ctx.fillStyle = g1;
    // gooey shape: render asymmetric ellipse, then a small drip below
    ctx.beginPath(); ctx.ellipse(x, y, rx, ry, 0, 0, Math.PI*2); ctx.fill();
    // melting drip illusion
    const drop = Math.abs(Math.sin(tt * 0.9 + seed * 2.1)) * 0.35 + 0.15;
    ctx.beginPath();
    ctx.ellipse(x + Math.sin(seed)*rx*0.18, y + ry * (0.55 + drop * 0.25), rx*0.32, ry*0.22*drop, 0, 0, Math.PI*2);
    ctx.fill();

    // inner rim glow (subtle white edge)
    const g2 = ctx.createRadialGradient(x, y, Math.max(rx, ry) * 0.72, x, y, Math.max(rx, ry));
    g2.addColorStop(0, color + '00');
    g2.addColorStop(0.55, color + '00');
    g2.addColorStop(1,   'rgba(255,255,255,.42)');
    ctx.fillStyle = g2;
    ctx.beginPath(); ctx.ellipse(x, y, rx, ry, 0, 0, Math.PI*2); ctx.fill();

    // primary highlight — moves with the liquid feel
    const hpx = -rx*0.30 + Math.sin(tt * 1.4 + seed * 0.8) * rx*0.06;
    const hpy = -ry*0.46 + Math.cos(tt * 1.1 + seed * 1.7) * ry*0.04;
    ctx.fillStyle = 'rgba(255,255,255,.78)';
    ctx.beginPath();
    ctx.ellipse(x + hpx, y + hpy, rx*0.22, ry*0.13, -0.30, 0, Math.PI*2);
    ctx.fill();

    // tiny moving sub-highlight (bottom-right shine)
    ctx.fillStyle = 'rgba(255,255,255,.30)';
    ctx.beginPath();
    ctx.ellipse(x + rx*0.32, y + ry*0.20 + Math.sin(tt*1.6+seed)*ry*0.03, rx*0.10, ry*0.06, 0.4, 0, Math.PI*2);
    ctx.fill();

    // poisonous core — tiny inner glow showing through
    const gCore = ctx.createRadialGradient(x, y + ry*0.05, 0, x, y + ry*0.05, rx*0.5);
    gCore.addColorStop(0, 'rgba(255,255,255,.35)');
    gCore.addColorStop(0.6, color + '00');
    ctx.fillStyle = gCore;
    ctx.beginPath();
    ctx.ellipse(x, y + ry*0.05, rx*0.5, ry*0.45, 0, 0, Math.PI*2);
    ctx.fill();

    // toxic blob ring + extra glow + small drip mark
    if (toxic){
      const pulse = 0.8 + Math.sin(tt * 4 + seed) * 0.2;
      ctx.lineWidth = Math.max(1.4, rx * 0.10);
      ctx.strokeStyle = TOXIC_TINT;
      ctx.shadowColor = TOXIC_TINT;
      ctx.shadowBlur = 10 * pulse;
      ctx.beginPath();
      ctx.ellipse(x, y, rx * 0.96, ry * 0.96, 0, 0, Math.PI * 2);
      ctx.stroke();
      ctx.shadowBlur = 0;
      // tiny acid drop mark on top
      ctx.fillStyle = TOXIC_TINT;
      ctx.beginPath();
      ctx.arc(x + rx*0.08, y - ry*0.55, rx * 0.10, 0, Math.PI*2);
      ctx.fill();
    }

    // eyes with subtle blink
    const blinkPhase = (tt * 0.55 + seed * 1.7) % 1;
    const blinkScale = blinkPhase > 0.96 ? Math.max(0.10, 1 - (blinkPhase - 0.96) * 24) : 1;
    ctx.fillStyle = 'rgba(20,8,40,.78)';
    ctx.beginPath();
    ctx.ellipse(x - rx*0.22, y - ry*0.04, rx*0.085, ry*0.115 * blinkScale, 0, 0, Math.PI*2);
    ctx.fill();
    ctx.beginPath();
    ctx.ellipse(x + rx*0.22, y - ry*0.04, rx*0.085, ry*0.115 * blinkScale, 0, 0, Math.PI*2);
    ctx.fill();
    // eye shine (only when not mid-blink)
    if (blinkScale > 0.5){
      ctx.fillStyle = 'rgba(255,255,255,.95)';
      ctx.beginPath();
      ctx.arc(x - rx*0.20, y - ry*0.07, Math.max(0.6, rx*0.030), 0, Math.PI*2); ctx.fill();
      ctx.beginPath();
      ctx.arc(x + rx*0.24, y - ry*0.07, Math.max(0.6, rx*0.030), 0, Math.PI*2); ctx.fill();
    }

    ctx.globalAlpha = 1;
  }

  function render(){
    ctx.clearRect(0, 0, CAN_W, CAN_H);
    // checker bg
    ctx.fillStyle = 'rgba(255,255,255,.022)';
    for (let r = 0; r < ROWS; r++){
      for (let c = 0; c < COLS; c++){
        if ((r+c) & 1) ctx.fillRect(c*CELL, r*CELL, CELL, CELL);
      }
    }
    // grid lines
    ctx.strokeStyle = 'rgba(255,255,255,.05)';
    ctx.lineWidth = 1;
    for (let c = 1; c < COLS; c++){
      ctx.beginPath(); ctx.moveTo(c*CELL, 0); ctx.lineTo(c*CELL, CAN_H); ctx.stroke();
    }

    // landed blobs — stronger jelly deformation
    const baseR = CELL * 0.36;
    const tNow = performance.now() * 0.001;
    for (let r = 0; r < ROWS; r++){
      for (let c = 0; c < COLS; c++){
        const cell = state.board[r][c];
        if (cell === null) continue;
        let scale = 1, opacity = 1, offY = 0;
        let sx = 1, sy = 1;
        const seed = (r * 7 + c * 13) * 0.41;
        if (cell.anim === 'wobble'){
          // damped bouncy oscillation: wide squash → recovery → settle
          const k = cell.t;
          const damp = Math.exp(-k * 3.2);
          const wave = Math.sin(k * Math.PI * 4) * damp;
          sy = 1 - wave * 0.30;
          sx = 1 + wave * 0.22;
          // tiny upward bounce on initial squash
          offY = -Math.exp(-k * 5) * Math.sin(k * Math.PI * 3) * baseR * 0.08;
        } else if (cell.anim === 'pull'){
          // bend inward with vertical stretch before burst
          const p = Math.sin(cell.t * Math.PI);
          scale = 1 + p * 0.28;
          sx = 1 - p * 0.14;
          sy = 1 + p * 0.20;
        } else if (cell.anim === 'burst'){
          scale = 1 + cell.t * 0.85;
          opacity = Math.pow(1 - cell.t, 1.4);
          const wob = Math.sin(cell.t * Math.PI * 6) * 0.06;
          sx = 1 + wob; sy = 1 - wob;
        } else {
          // idle breathing — asymmetric per-cell phase
          const breathe = Math.sin(tNow * 1.4 + seed);
          sx = 1 + breathe * 0.024;
          sy = 1 - breathe * 0.022;
        }
        const x = c * CELL + CELL/2;
        const y = r * CELL + CELL/2 + offY;
        drawBlob(x, y, baseR * scale, COLORS[cell.color], opacity, sx, sy, seed, !!cell.toxic);
      }
    }

    // falling pair — vertical stretch (fall) + lively wobble + per-blob seed for unique highlights
    if (state.pair && !state.isAnimating && !state.isGameOver){
      const { pivot, partner } = state.pair;
      const t = performance.now() * 0.001;
      const stretch = 1.05; // gentle vertical elongation while airborne
      const wob = Math.sin(t * 4.6) * 0.05;
      const wsx = (1 - wob) / stretch;
      const wsy = (1 + wob) * stretch;
      const psd = (pivot.r * 7 + pivot.c * 13) * 0.41;
      const qsd = (partner.r * 7 + partner.c * 13) * 0.41;
      drawBlob(pivot.c   * CELL + CELL/2, pivot.r   * CELL + CELL/2, baseR, COLORS[pivot.color],   1, wsx, wsy, psd, !!pivot.toxic);
      drawBlob(partner.c * CELL + CELL/2, partner.r * CELL + CELL/2, baseR, COLORS[partner.color], 1, wsx, wsy, qsd, !!partner.toxic);
    }

    // particles
    for (const p of particles){
      const k = Math.max(0, 1 - p.age / p.life);
      ctx.globalAlpha = k;
      ctx.fillStyle = p.color;
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.r * (0.5 + 0.5*k), 0, Math.PI*2);
      ctx.fill();
    }
    ctx.globalAlpha = 1;
  }

  /* ============== PARTICLES ============== */
  let particles = [];
  const MAX_PARTICLES = 220;
  function spawnParticles(boardR, boardC, colorIdx, count){
    if (particles.length + count > MAX_PARTICLES){
      particles.splice(0, particles.length + count - MAX_PARTICLES);
    }
    const x = boardC * CELL + CELL/2;
    const y = boardR * CELL + CELL/2;
    const color = COLORS[colorIdx];
    const speedScale = CELL / 64;
    for (let i = 0; i < count; i++){
      const ang = Math.random() * Math.PI * 2;
      const sp = (60 + Math.random() * 200) * speedScale;
      particles.push({
        x, y,
        vx: Math.cos(ang) * sp,
        vy: Math.sin(ang) * sp - 50 * speedScale,
        life: 0.5 + Math.random() * 0.4,
        age: 0,
        r: (2 + Math.random() * 3) * speedScale,
        color,
        gravity: 240 * speedScale,
      });
    }
  }
  function spawnToxicBurst(boardR, boardC){
    if (particles.length + 14 > MAX_PARTICLES){
      particles.splice(0, particles.length + 14 - MAX_PARTICLES);
    }
    const x = boardC * CELL + CELL/2;
    const y = boardR * CELL + CELL/2;
    const speedScale = CELL / 64;
    for (let i = 0; i < 14; i++){
      const ang = (i / 14) * Math.PI * 2;
      const sp = (140 + Math.random() * 220) * speedScale;
      particles.push({
        x, y,
        vx: Math.cos(ang) * sp,
        vy: Math.sin(ang) * sp - 80 * speedScale,
        life: 0.7 + Math.random() * 0.5,
        age: 0,
        r: (2.4 + Math.random() * 3.6) * speedScale,
        color: i % 2 ? TOXIC_TINT : '#b6ff1a',
        gravity: 220 * speedScale,
      });
    }
  }
  /* extra toxic vapor on big chains — slow drifting acid mist */
  function spawnToxicVapor(count){
    if (particles.length + count > MAX_PARTICLES){
      particles.splice(0, particles.length + count - MAX_PARTICLES);
    }
    const speedScale = CELL / 64;
    for (let i = 0; i < count; i++){
      const x = Math.random() * CAN_W;
      const y = CAN_H + 20 + Math.random() * 40;
      particles.push({
        x, y,
        vx: (Math.random() - 0.5) * 60 * speedScale,
        vy: -(80 + Math.random() * 120) * speedScale,
        life: 0.9 + Math.random() * 0.6,
        age: 0,
        r: (3 + Math.random() * 4) * speedScale,
        color: Math.random() < .5 ? '#b6ff1a' : '#ff2bb5',
        gravity: -20 * speedScale, // floats up
      });
    }
  }

  /* ============== GAMEPLAY ============== */
  function isFree(r, c){
    return r >= 0 && r < ROWS && c >= 0 && c < COLS && state.board[r][c] === null;
  }
  function partnerOffset(orient){
    return [[-1,0],[0,1],[1,0],[0,-1]][orient];
  }
  function partnerPos(pivot, orient){
    const [dr, dc] = partnerOffset(orient);
    return { r: pivot.r + dr, c: pivot.c + dc };
  }
  function pairFits(pivot, orient){
    if (!isFree(pivot.r, pivot.c)) return false;
    const p = partnerPos(pivot, orient);
    return isFree(p.r, p.c);
  }

  function spawnPair(){
    // last guard — never spawn over a floating board
    ensureNoFloating('spawnPair-entry');
    if (!isFree(0, 2) || !isFree(1, 2)){
      gameOver();
      return;
    }
    // use NEXT preview, then refresh next
    const a = (state.nextA ?? Math.floor(Math.random() * NUM_COLORS));
    const b = (state.nextB ?? Math.floor(Math.random() * NUM_COLORS));
    const aTox = !!state.nextAToxic;
    const bTox = !!state.nextBToxic;
    state.nextA = Math.floor(Math.random() * NUM_COLORS);
    state.nextB = Math.floor(Math.random() * NUM_COLORS);
    state.nextAToxic = Math.random() < TOXIC_SPAWN_RATE;
    state.nextBToxic = Math.random() < TOXIC_SPAWN_RATE;
    state.pair = {
      pivot:   { r:1, c:2, color:a, toxic:aTox },
      partner: { r:0, c:2, color:b, toxic:bTox },
      orient: 0,
    };
    state.lastFallAt = performance.now();
    state.chain = 0;
    state.pairCount++;
    updateNextPreview();
  }

  function updateNextPreview(){
    const stack = $('nextStack');
    if (!stack) return;
    stack.innerHTML = '';
    // partner on top, pivot below (matches initial orient=0 visual)
    const top = document.createElement('div');
    top.className = 'next-blob';
    top.style.color = COLORS[state.nextB];
    stack.appendChild(top);
    const bot = document.createElement('div');
    bot.className = 'next-blob';
    bot.style.color = COLORS[state.nextA];
    stack.appendChild(bot);
  }

  function syncPartner(){
    const { pivot, orient, partner } = state.pair;
    const p = partnerPos(pivot, orient);
    partner.r = p.r; partner.c = p.c;
  }

  function moveLeft(){
    if (!state.pair || state.isAnimating || state.isGameOver) return;
    const { pivot, orient } = state.pair;
    const np = { ...pivot, c: pivot.c - 1 };
    if (pairFits(np, orient)){
      state.pair.pivot = np;
      syncPartner();
      vibrate([8]);
    }
  }
  function moveRight(){
    if (!state.pair || state.isAnimating || state.isGameOver) return;
    const { pivot, orient } = state.pair;
    const np = { ...pivot, c: pivot.c + 1 };
    if (pairFits(np, orient)){
      state.pair.pivot = np;
      syncPartner();
      vibrate([8]);
    }
  }
  function rotate(){
    if (!state.pair || state.isAnimating || state.isGameOver) return;
    const { pivot, orient } = state.pair;
    const newOrient = (orient + 1) % 4;
    if (pairFits(pivot, newOrient)){
      state.pair.orient = newOrient;
      syncPartner();
      vibrate([8]);
      return;
    }
    // wall-kick: try ±1, ±2 horizontal
    for (const dc of [-1, 1, -2, 2]){
      const np = { ...pivot, c: pivot.c + dc };
      if (pairFits(np, newOrient)){
        state.pair.pivot = np;
        state.pair.orient = newOrient;
        syncPartner();
        vibrate([8]);
        return;
      }
    }
    // vertical kick (push up if rotation tight at floor)
    const np = { ...pivot, r: pivot.r - 1 };
    if (pairFits(np, newOrient)){
      state.pair.pivot = np;
      state.pair.orient = newOrient;
      syncPartner();
      vibrate([8]);
    }
  }
  function tryFall(){
    if (!state.pair) return false;
    const { pivot, orient } = state.pair;
    const np = { ...pivot, r: pivot.r + 1 };
    if (pairFits(np, orient)){
      state.pair.pivot = np;
      syncPartner();
      return true;
    }
    return false;
  }
  function hardDrop(){
    if (!state.pair || state.isAnimating || state.isGameOver) return;
    while (tryFall()){}
    lockPair();
  }

  function lockPair(){
    if (!state.pair) return;
    const { pivot, partner } = state.pair;
    state.board[pivot.r][pivot.c]   = { color: pivot.color,   anim: 'wobble', t: 0, toxic: !!pivot.toxic };
    state.board[partner.r][partner.c] = { color: partner.color, anim: 'wobble', t: 0, toxic: !!partner.toxic };
    state.pair = null;
    playPlace();
    vibrate([10]);
    /* CRITICAL: apply gravity right after locking. The previous version skipped
       this, so a horizontal pair could lock with the partner over an empty
       column and stay floating until a future chain happened to clear it. */
    forceCompactBoard('post-lockPair');
    ensureNoFloating('post-lockPair-verify');
    processChains();
  }

  function findGroups(){
    const visited = Array.from({length:ROWS}, () => Array(COLS).fill(false));
    const groups = [];
    for (let r = 0; r < ROWS; r++){
      for (let c = 0; c < COLS; c++){
        if (visited[r][c]) continue;
        const cell = state.board[r][c];
        if (cell === null) continue;
        const color = cell.color;
        const stack = [[r,c]];
        const group = [];
        while (stack.length){
          const [cr, cc] = stack.pop();
          if (cr<0||cr>=ROWS||cc<0||cc>=COLS) continue;
          if (visited[cr][cc]) continue;
          const cell2 = state.board[cr][cc];
          if (cell2 === null || cell2.color !== color) continue;
          visited[cr][cc] = true;
          group.push([cr, cc]);
          stack.push([cr+1,cc],[cr-1,cc],[cr,cc+1],[cr,cc-1]);
        }
        if (group.length >= 4) groups.push({color, cells: group});
      }
    }
    return groups;
  }

  /* Hardened gravity: per column, collect non-null cells bottom-up, then rewrite the
     column from the bottom. Always produces a fully bottom-compacted column. */
  function applyGravity(){
    let moved = false;
    for (let c = 0; c < COLS; c++){
      const stack = []; // bottom-most cells go first
      for (let r = ROWS - 1; r >= 0; r--){
        const cell = state.board[r][c];
        if (cell !== null) stack.push(cell);
      }
      // rewrite bottom-up
      for (let i = 0; i < ROWS; i++){
        const targetRow = ROWS - 1 - i;
        const newCell = i < stack.length ? stack[i] : null;
        if (state.board[targetRow][c] !== newCell){
          // detect any actual reordering
          if (newCell === null && state.board[targetRow][c] !== null) moved = true;
          else if (newCell !== null && state.board[targetRow][c] === null) moved = true;
          else if (newCell !== state.board[targetRow][c]) moved = true;
        }
        state.board[targetRow][c] = newCell;
      }
    }
    return moved;
  }

  /* Invariant: in every column, no filled cell may exist above an empty cell.
     Returns the number of violating columns found, plus details for debug. */
  function findFloatingViolations(){
    const violations = [];
    for (let c = 0; c < COLS; c++){
      let seenNull = false;
      for (let r = ROWS - 1; r >= 0; r--){
        if (state.board[r][c] === null) seenNull = true;
        else if (seenNull){ violations.push({ col:c, row:r }); break; }
      }
    }
    return violations;
  }

  /* Force compaction with optional jelly settle on cells that moved.
     Always idempotent: after this call, findFloatingViolations() === []. */
  function forceCompactBoard(reason){
    const before = state.board.map(row => row.slice());
    let changed = false;
    let safety = 0;
    while (applyGravity()){ changed = true; if (++safety > ROWS) break; }
    if (changed){
      // mark every cell that ended up at a different row with a brief settle wobble
      for (let c = 0; c < COLS; c++){
        for (let r = 0; r < ROWS; r++){
          const now = state.board[r][c];
          const was = before[r][c];
          if (now !== was && now !== null){
            // only settle cells that aren't mid-burst/pull (those have own anim)
            if (now.anim !== 'burst' && now.anim !== 'pull'){
              now.anim = 'wobble'; now.t = 0;
            }
          }
        }
      }
      try { window.__cfDebug && console && console.warn && console.warn('[CHAIN_FEVER] forceCompactBoard:', reason || ''); } catch(_){}
    }
    return changed;
  }

  /* Master gravity check: detects any floating cell and compacts.
     Cheap when no violation; safe to call frequently. */
  function ensureNoFloating(reason){
    const v = findFloatingViolations();
    if (v.length > 0){
      forceCompactBoard(reason || 'invariant-violation');
      return true;
    }
    return false;
  }

  const wait = (ms) => new Promise(r => setTimeout(r, Math.max(8, ms / state.timeScale)));

  async function processChains(){
    state.isAnimating = true;
    state.spokenThresholds.clear(); // reset voice gate per cascade
    let chain = 0;
    while (true){
      // brief wait so wobble can play before chain check
      await wait(160);
      const groups = findGroups();
      if (groups.length === 0) break;
      chain++;
      state.chain = chain;
      state.highChain = Math.max(state.highChain, chain);

      // pull-in (stronger with chain tier)
      for (const g of groups){
        for (const [r, c] of g.cells){
          state.board[r][c] = { color: g.color, anim: 'pull', t: 0 };
        }
      }
      await animatePhase('pull', 200);

      // burst + sound + shake + vibe + score + popup + combo
      const cleared = groups.reduce((s, g) => s + g.cells.length, 0);
      const partsPerCell = chain >= 8 ? 16 : (chain >= 5 ? 13 : (chain >= 3 ? 11 : 9));
      let toxicCount = 0;
      for (const g of groups){
        for (const [r, c] of g.cells){
          const wasToxic = !!(state.board[r][c] && state.board[r][c].toxic);
          if (wasToxic) toxicCount++;
          state.board[r][c] = { color: g.color, anim: 'burst', t: 0, toxic: wasToxic };
          spawnParticles(r, c, g.color, partsPerCell + (wasToxic ? 12 : 0));
          // extra acid burst for toxic blobs
          if (wasToxic) spawnToxicBurst(r, c);
        }
      }

      // tier-based audio stack
      if (chain >= 3) playBigChain(); else playClear(chain);
      if (chain >= 3) playBass();
      if (chain >= 5) playShimmer();
      if (chain >= 8) playSparkle();

      // tier-based shake + vibe
      let shakeLevel = 'small', vibPattern = [15];
      if (chain >= 8){ shakeLevel = 'mega';  vibPattern = [40, 25, 40, 25, 40]; }
      else if (chain >= 5){ shakeLevel = 'big';  vibPattern = [30, 20, 30]; }
      else if (chain >= 3){ shakeLevel = 'big';  vibPattern = [25, 18, 25]; }
      shake(shakeLevel);
      vibrate(vibPattern);

      // shockwave on 5+, legendary flash on 8+
      if (chain >= 5) fireShockwave();
      if (chain >= 8) fireLegendaryFlash();
      // chromatic glitch slice on 5+
      if (chain >= 5) fireGlitch();
      // toxic afterglow on 4+, vapor mist on 3+
      if (chain >= 4) fireAfterglow();
      if (chain >= 3) spawnToxicVapor(chain >= 5 ? 18 : 10);

      // voice praise
      speakChain(chain);

      state.totalCleared += cleared;
      const chainBonus = Math.pow(2, chain - 1);
      const colorBonus = groups.length;
      const toxicBonus = toxicCount > 0 ? (1 + toxicCount * 0.5) : 1;
      const points = Math.round(cleared * 10 * chainBonus * colorBonus * toxicBonus);
      state.score += points;

      // popup at the cleared group's centroid
      let cx = 0, cy = 0, n = 0;
      for (const g of groups) for (const [r, c] of g.cells){ cx += c; cy += r; n++; }
      cx /= n; cy /= n;
      showScorePopup(cx, cy, points);
      showComboBanner(chain);

      // hit-stop / freeze-frame on 3+
      if (chain >= 3){
        const freezeMs = chain >= 8 ? 180 : (chain >= 5 ? 140 : 110);
        freezeFrame(freezeMs);
        await wait(freezeMs + 20);
      }

      // slowmo on 5+ (longer for legendary)
      if (chain >= 5){
        state.timeScale = chain >= 8 ? 0.30 : 0.40;
        const sf = $('slowmoFlash');
        sf.classList.remove('on'); void sf.offsetWidth; sf.classList.add('on');
        const slowDur = chain >= 8 ? 950 : 750;
        setTimeout(() => { state.timeScale = 1.0; }, slowDur);
      }

      await animatePhase('burst', 220);

      // remove cleared cells
      for (const g of groups){
        for (const [r, c] of g.cells){
          state.board[r][c] = null;
        }
      }

      // hardened gravity — fully compact every column, then verify invariant
      const movedAny = forceCompactBoard('post-clear');
      ensureNoFloating('post-clear-verify');
      if (movedAny){
        await wait(160);
      }
    }
    // FINAL invariant check after the cascade ends — no cell may float over a hole
    forceCompactBoard('post-cascade');
    ensureNoFloating('post-cascade-verify');
    // After any cascade(s), give a brief recovery window so the player can plan the next move.
    if (chain >= 1) state.recoveryUntil = performance.now() + 1100;
    state.chain = 0;
    state.isAnimating = false;
    // bump fall speed based on cleared total (base only; per-frame variation handled in main loop)
    const level = Math.floor(state.totalCleared / 30);
    state.fallMs = Math.max(180, FALL_INIT_MS - level * 50);
    if (!state.isGameOver){
      // last-line defence right before spawning the next pair
      ensureNoFloating('pre-spawnPair');
      spawnPair();
    }
  }

  async function animatePhase(animType, durMs){
    const start = performance.now();
    const dur = durMs / state.timeScale;
    return new Promise(resolve => {
      let resolved = false;
      const finish = () => {
        if (resolved) return;
        resolved = true;
        // ensure final t=1 is written so the visible state reflects completion
        for (let r = 0; r < ROWS; r++){
          for (let c = 0; c < COLS; c++){
            const cell = state.board[r][c];
            if (cell !== null && cell.anim === animType) cell.t = 1;
          }
        }
        resolve();
      };
      // setTimeout guarantees resolution even when rAF is throttled (hidden tabs / background iframes)
      const timer = setTimeout(finish, Math.max(20, dur));
      function step(){
        if (resolved) return;
        const t = performance.now();
        const k = Math.min(1, (t - start) / dur);
        for (let r = 0; r < ROWS; r++){
          for (let c = 0; c < COLS; c++){
            const cell = state.board[r][c];
            if (cell !== null && cell.anim === animType) cell.t = k;
          }
        }
        if (k >= 1){ clearTimeout(timer); finish(); }
        else requestAnimationFrame(step);
      }
      requestAnimationFrame(step);
    });
  }

    state.nextBToxic = Math.random() < TOXIC_SPAWN_RATE;
    state.spokenThresholds.clear();
    document.body.classList.remove('danger');
    try { if (window.speechSynthesis) speechSynthesis.cancel(); } catch(_){}
    particles = [];
    $('gameOver').classList.remove('on');
    $('gameOver').setAttribute('aria-hidden','true');
    if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
    if (masterGain && audioCtx){
      const t = audioCtx.currentTime;
      masterGain.gain.cancelScheduledValues(t);
      masterGain.gain.setValueAtTime(state.soundOn ? 1 : 0, t);
    }
    if (audioCtx && !bgmStarted && state.soundOn){
      // BGM was stopped (e.g., game over) — restart for the new run
      startBGM();
    } else if (audioCtx && bgmStarted && bgmGain){
      const t = audioCtx.currentTime;
      bgmGain.gain.cancelScheduledValues(t);
      bgmGain.gain.linearRampToValueAtTime(state.soundOn ? 0.55 : 0, t + 0.40);

  /* ============== MAIN LOOP ============== */
  let lastT = performance.now();
  let stackTick = 0;
  function loop(t){
    const dtRaw = (t - lastT) / 1000;
    const dt = Math.min(0.05, dtRaw) * state.timeScale;
    lastT = t;

    // particles
    for (const p of particles){
      p.age += dt;
      p.x += p.vx * dt;
      p.y += p.vy * dt;
      p.vy += p.gravity * dt;
      p.vx *= 0.96; p.vy *= 0.96;
    }
    particles = particles.filter(p => p.age < p.life);

    // variable falling speed: long-term base + sine wave + post-clear recovery
    const level = Math.floor(state.totalCleared / 30);
    const baseFall = Math.max(180, FALL_INIT_MS - level * 50);
    let fallMult = 1.0;
    if (state.recoveryUntil && t < state.recoveryUntil) fallMult *= 1.45; // ease-up after clear
    fallMult *= (1 + Math.sin(t * 0.00045) * 0.18);                       // gentle sine variation ±18%
    if (state.danger) fallMult *= 0.92;                                   // pressure when stack is high
    state.fallMs = Math.max(120, baseFall * fallMult);

    // gravity tick for pair
    if (state.pair && !state.isAnimating && !state.isGameOver){
      if (t - state.lastFallAt >= state.fallMs / state.timeScale){
        state.lastFallAt = t;
        if (!tryFall()) lockPair();
      }
    }

    // lightweight gravity invariant check every ~8 frames (only when idle, no pair settling)
    if ((stackTick & 7) === 0 && !state.isAnimating && !state.isGameOver && state.pair){
      ensureNoFloating('main-loop');
    }

    // stack height + danger update (every 4 frames for perf)
    if ((stackTick++ & 3) === 0){
      let max = 0;
      for (let c = 0; c < COLS; c++){
        for (let r = 0; r < ROWS; r++){
          if (state.board[r][c] !== null){
            const h = ROWS - r;
            if (h > max) max = h;
            break;
          }
        }
      }
      state.maxStack = max;
      const newDanger = max >= 9;
      if (newDanger !== state.danger){
        state.danger = newDanger;
        document.body.classList.toggle('danger', newDanger);
      }
      // update BGM intensity based on chain or danger
      if (audioCtx && bgmStarted){
        let want = 0;
        if (state.chain > 0) want = 2;
        else if (state.danger) want = 2;
        else if (max >= 6) want = 1;
        if (want !== bgmIntensity) setBgmIntensity(want);
      }
    }

    // wobble update
    for (let r = 0; r < ROWS; r++){
      for (let c = 0; c < COLS; c++){
        const cell = state.board[r][c];
        if (cell !== null && cell.anim === 'wobble'){
          cell.t += dt / 0.30;
          if (cell.t >= 1){ cell.anim = null; cell.t = 0; }
        }
      }
    }

    render();
    updateHUD();
    requestAnimationFrame(loop);
  }

  /* ============== INPUT ============== */
  function bindCtrl(btn, action, allowRepeat){

  /* ----- board-area gesture controls (swipe / tap) ----- */
  let bg = null; // active gesture
  const BG_STEP = 28;       // px per horizontal step
  const BG_TAP_DIST = 12;   // max move for tap
  const BG_TAP_TIME = 320;  // max ms for tap
  function bgDown(e){
    if (state.isAnimating || state.isGameOver || !state.started) return;
    if (e.target.closest('button, .next-widget, .danger-tag')) return;
    bg = { sx: e.clientX, sy: e.clientY, t: performance.now(),
           accumX: 0, axis: null, pid: e.pointerId };
    if (e.cancelable) e.preventDefault();
    if (boardWrap.setPointerCapture && e.pointerId != null){
      try { boardWrap.setPointerCapture(e.pointerId); } catch(_){}
    }
  }
  function bgMove(e){
    if (!bg) return;
    if (e.cancelable) e.preventDefault();
    const dx = e.clientX - bg.sx;
    const dy = e.clientY - bg.sy;
    if (!bg.axis){
      if (Math.abs(dx) > 14 || Math.abs(dy) > 14){
        bg.axis = Math.abs(dx) > Math.abs(dy) ? 'h' : 'v';
      }
    }
    if (bg.axis === 'h'){
      while (dx - bg.accumX >= BG_STEP){ moveRight(); bg.accumX += BG_STEP; }
      while (bg.accumX - dx >= BG_STEP){ moveLeft();  bg.accumX -= BG_STEP; }
    }
  }
  function bgUp(e){
    if (!bg) return;
    if (e.cancelable) e.preventDefault();
    const dx = e.clientX - bg.sx;
    const dy = e.clientY - bg.sy;
    const ax = Math.abs(dx), ay = Math.abs(dy);
    const dt = performance.now() - bg.t;
    if (bg.axis === 'v'){
      if (dy > BG_STEP * 1.4) hardDrop();
      else if (dy < -BG_STEP * 0.8) rotate();
    } else if (bg.axis == null && ax < BG_TAP_DIST && ay < BG_TAP_DIST && dt < BG_TAP_TIME){
      // tap = rotate

    }
    if (boardWrap.releasePointerCapture && bg.pid != null){
      try { boardWrap.releasePointerCapture(bg.pid); } catch(_){}
    }
    bg = null;
  }

    state, COLORS, NUM_COLORS, ROWS, COLS,
    moveLeft, moveRight, rotate, hardDrop,
    spawnPair, gameOver, reset,
    findGroups, applyGravity,
    audioReady: () => !!audioCtx,
    audioContextState: () => audioCtx ? audioCtx.state : null,
    masterGain: () => masterGain ? masterGain.gain.value : null,
    setSound, setVib,
    getBoard: () => state.board.map(row => row.map(c => c === null ? null : c.color)),
    setBoardForTest: (b) => {
      state.board = b.map(row => row.map(v => v === null ? null : { color: v, anim: null, t: 0 }));
    },
    setPair: (pivotR, pivotC, orient, pColor, qColor) => {
      state.pair = {
        pivot:   { r: pivotR, c: pivotC, color: pColor },
        partner: { r: pivotR, c: pivotC, color: qColor },
        orient,
      };
      syncPartner();
    },
    triggerLockNow: () => { if (state.pair) lockPair(); },
    waitProcessChain: async () => {
      while (state.isAnimating){ await new Promise(r => setTimeout(r, 30)); }
    },
    particleCount: () => particles.length,
    isAnimating: () => state.isAnimating,
    canvasNonZeroPixels: () => {
      const t = document.createElement('canvas');
      t.width = cv.width; t.height = cv.height;
      t.getContext('2d').drawImage(cv, 0, 0);
      const d = t.getContext('2d').getImageData(0, 0, cv.width, cv.height).data;
      let n = 0;
      for (let i = 3; i < d.length; i += 4) if (d[i] > 0) n++;
      return n;
    },
    /* gravity invariant: scanning bottom→top in every column, no non-null cell
       may appear AFTER a null cell. Returns {ok:true} on success or {col,row,error}. */
    verifyNoFloating: () => {
      for (let c = 0; c < COLS; c++){
        let seenNull = false;
        for (let r = ROWS - 1; r >= 0; r--){
          if (state.board[r][c] === null) seenNull = true;
          else if (seenNull) return { ok:false, col:c, row:r, error:'non-null above null' };
        }
      }
      return { ok: true };
    },
    runGravity: () => applyGravity(),
    forceCompactBoard: (reason) => forceCompactBoard(reason || 'test'),
    findFloatingViolations: () => findFloatingViolations(),
    ensureNoFloating: (reason) => ensureNoFloating(reason || 'test'),
    setupFloatingTest: () => {
      // floating fixture: gaps below blobs in multiple columns
      state.board = Array.from({length:ROWS}, () => Array(COLS).fill(null));
      state.board[5][0]  = { color:0, anim:null, t:0, toxic:false };
      state.board[7][0]  = { color:1, anim:null, t:0, toxic:false };
      state.board[2][3]  = { color:2, anim:null, t:0, toxic:false };
      state.board[8][3]  = { color:3, anim:null, t:0, toxic:false };
      state.board[1][5]  = { color:0, anim:null, t:0, toxic:false };
      state.board[6][5]  = { color:1, anim:null, t:0, toxic:false };
      state.board[10][5] = { color:2, anim:null, t:0, toxic:false };
    },
    /* Gameplay-shaped horizontal-pair float repro:
       column 2 has a blob at row 11 (the floor blob), column 3 is empty.
       A horizontal pair (orient=1) with pivot at (10,2) and partner at (10,3)
       can't fall further because pivot is blocked, so without the lockPair
       gravity fix the partner stays floating at (10,3). */
    setupHorizontalLockRepro: () => {
      state.board = Array.from({length:ROWS}, () => Array(COLS).fill(null));
      state.board[11][2] = { color:0, anim:null, t:0, toxic:false };
      // pair sits horizontally at row 10, pivot c=2, partner c=3
      state.pair = {
        pivot:   { r: 10, c: 2, color: 1, toxic: false },
        partner: { r: 10, c: 3, color: 2, toxic: false },
        orient: 1,
      };
    },
    /* Run a deterministic-ish sequence of N pair lock cycles, each with random
       moves before drop. Returns array of any floating violations found
       AT ANY POINT (post-lock, post-cascade, pre-spawn). */
    simulatePlay: async (n) => {
      const violations = [];
      for (let i = 0; i < (n|0); i++){
        if (!state.pair){
          if (state.isGameOver) break;
          spawnPair();
        }
        // random horizontal moves
        const moves = (i * 7 + 3) % 5;
        for (let m = 0; m < moves; m++){
          if ((i * 11 + m) & 1) moveLeft(); else moveRight();
        }
        // sometimes rotate
        if (((i * 13) % 3) === 0) rotate();
        if (((i * 17) % 4) === 0) rotate();
        hardDrop();
        // wait for processChains() to settle
        let guard = 0;
        while (state.isAnimating && guard++ < 4000){
          await new Promise(r => setTimeout(r, 8));
        }
        const v = findFloatingViolations();
        if (v.length){ violations.push({ iteration:i, v }); }
        if (state.isGameOver) break;
      }
      return violations;
    },
  };
})();
</script>
