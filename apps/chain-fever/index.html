<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no,maximum-scale=1" />
<meta name="theme-color" content="#06020f" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="mobile-web-app-capable" content="yes" />
<title>CHAIN FEVER</title>
<style>
  :root{
    --bg-0:#06020f;
    --bg-1:#0a0420;
    --bg-2:#15082c;
    --ink:#f0e9ff;
    --sub:#8a94c7;
    --line:rgba(255,255,255,.10);
    --cyan:#3df0ff;
    --pink:#ff3eb5;
    --hot:#ff6ad6;
    --violet:#a371ff;
    --lime:#aaff5e;
    --gold:#ffe44d;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;user-select:none;-webkit-user-select:none;touch-action:manipulation;}
  html,body{margin:0;padding:0;height:100%;overscroll-behavior:none;}
  body{
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Hiragino Sans","Noto Sans JP","Yu Gothic UI",system-ui,sans-serif;
    color:var(--ink);
    background:
      radial-gradient(45% 30% at 18% 12%, rgba(255,62,181,.30), transparent 60%),
      radial-gradient(45% 35% at 92% 22%, rgba(61,240,255,.25), transparent 60%),
      radial-gradient(60% 50% at 50% 110%, rgba(176,124,255,.30), transparent 60%),
      linear-gradient(180deg, var(--bg-0) 0%, var(--bg-1) 50%, var(--bg-2) 100%);
    background-attachment:fixed;
    height:100dvh;width:100%;
    overflow:hidden;
    position:fixed;
  }
  body::before{
    content:"";position:fixed;inset:0;pointer-events:none;z-index:0;
    background-image:radial-gradient(rgba(255,255,255,.04) 1px, transparent 1.2px);
    background-size:6px 6px;
  }

  .app{
    position:relative;z-index:1;
    height:100dvh;
    display:flex;flex-direction:column;
    padding:max(8px,env(safe-area-inset-top)) 12px max(10px,env(safe-area-inset-bottom));
    gap:8px;
  }

  /* ===== TOP BAR ===== */
  .topbar{
    display:flex;justify-content:space-between;align-items:center;
    flex:0 0 auto;
  }
  .title{
    font-size:18px;font-weight:900;letter-spacing:.35em;
    background:linear-gradient(90deg,var(--cyan),#fff 50%,var(--pink));
    -webkit-background-clip:text;background-clip:text;color:transparent;
    text-shadow:0 0 16px rgba(255,62,181,.35);
  }
  .toggles{display:flex;gap:6px;}
  .topbtn{
    appearance:none;border:1px solid var(--line);
    background:rgba(255,255,255,.04);
    color:var(--sub);
    font:inherit;font-size:10px;letter-spacing:.2em;font-weight:700;
    padding:7px 10px;border-radius:999px;
    cursor:pointer;transition:all .15s ease;
  }
  .topbtn[aria-pressed="true"]{
    border-color:var(--cyan);color:#fff;
    background:rgba(61,240,255,.12);
    box-shadow:0 0 10px rgba(61,240,255,.35);
  }

  /* ===== HUD ===== */
  .hud{
    display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;
    flex:0 0 auto;
  }
  .hud-block{
    display:flex;flex-direction:column;align-items:center;
    padding:6px 8px;border-radius:10px;
    background:rgba(255,255,255,.04);
    border:1px solid var(--line);
    backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);
  }
  .hud-lbl{font-size:9px;letter-spacing:.35em;color:var(--sub);}
  .hud-val{
    font-size:18px;font-weight:800;line-height:1.1;
    font-feature-settings:"tnum";margin-top:2px;
  }
  .hud-val.accent{
    background:linear-gradient(90deg,var(--cyan),var(--pink));
    -webkit-background-clip:text;background-clip:text;color:transparent;
    text-shadow:0 0 10px rgba(255,62,181,.4);
  }

  /* ===== STAGE ===== */
  .stage{
    flex:1 1 auto;
    display:flex;align-items:center;justify-content:center;
    min-height:0;
  }
  .board-wrap{
    position:relative;
    /* width/height set by JS for exact 6:12 fit */
  }
  canvas#board{
    display:block;width:100%;height:100%;
    border-radius:16px;
    background:linear-gradient(180deg,rgba(0,0,0,.55),rgba(0,0,0,.40));
    box-shadow:
      0 0 0 1px rgba(255,255,255,.08),
      0 0 28px rgba(176,124,255,.20),
      inset 0 0 36px rgba(0,0,0,.4);
  }

  .combo-banner{
    position:absolute;left:0;right:0;top:24%;
    text-align:center;pointer-events:none;
    font-size:clamp(28px, 9vmin, 56px);font-weight:900;letter-spacing:.15em;
    background:linear-gradient(180deg,#fff,var(--gold) 60%,var(--pink));
    -webkit-background-clip:text;background-clip:text;color:transparent;
    text-shadow:0 0 24px rgba(255,228,77,.6),0 0 36px rgba(255,62,181,.35);
    opacity:0;transform:scale(.6);
  }
  .combo-banner.on{animation:comboPop .9s cubic-bezier(.2,1.5,.4,1) forwards;}
  @keyframes comboPop{
    0%{opacity:0;transform:scale(.5);}
    20%{opacity:1;transform:scale(1.18);}
    60%{opacity:1;transform:scale(1);}
    100%{opacity:0;transform:scale(1);}
  }

  .popups{position:absolute;inset:0;pointer-events:none;}
  .score-popup{
    position:absolute;
    font-size:14px;font-weight:800;letter-spacing:.04em;
    color:#fff;
    text-shadow:0 0 10px rgba(255,228,77,.7),0 0 18px rgba(255,62,181,.5);
    opacity:0;pointer-events:none;
    animation:popUp .9s ease-out forwards;
    transform:translate(-50%,-50%);
  }
  @keyframes popUp{
    0%{opacity:0;transform:translate(-50%,-50%) scale(.6);}
    20%{opacity:1;transform:translate(-50%,-58%) scale(1.05);}
    100%{opacity:0;transform:translate(-50%,-130%) scale(1);}
  }

  /* shake */
  .shake-small{animation:shakeS .15s ease;}
  .shake-big{animation:shakeB .28s ease;}
  @keyframes shakeS{
    0%,100%{transform:translate(0,0);}
    25%{transform:translate(-3px,1px);}
    60%{transform:translate(2px,-2px);}
  }
  @keyframes shakeB{
    0%,100%{transform:translate(0,0);}
    14%{transform:translate(-7px,3px);}
    34%{transform:translate(6px,-4px);}
    55%{transform:translate(-5px,2px);}
    78%{transform:translate(4px,-1px);}
  }

  /* slowmo flash */
  .slowmo-flash{
    position:absolute;inset:0;border-radius:16px;pointer-events:none;
    background:radial-gradient(closest-side,rgba(255,255,255,.6),rgba(61,240,255,.25) 40%,transparent 80%);
    opacity:0;
  }
  .slowmo-flash.on{animation:slowmoFlash .9s ease-out;}
  @keyframes slowmoFlash{
    0%{opacity:0;}10%{opacity:1;}100%{opacity:0;}
  }

  /* ===== CONTROLS ===== */
  .controls{
    display:grid;grid-template-columns:repeat(4,1fr);gap:8px;
    flex:0 0 auto;
  }
  .ctrl{
    appearance:none;border:0;cursor:pointer;
    min-height:60px;
    border-radius:14px;
    font-family:inherit;font-size:24px;font-weight:900;
    color:#fff;letter-spacing:.04em;
    background:linear-gradient(180deg,rgba(255,255,255,.10),rgba(255,255,255,.04));
    border:1px solid var(--line);
    box-shadow:0 6px 18px rgba(176,124,255,.18),inset 0 1px 0 rgba(255,255,255,.20);
    transition:transform .08s ease,box-shadow .15s ease,background .15s ease;
    touch-action:manipulation;
  }
  .ctrl:active{transform:translateY(2px);box-shadow:0 2px 6px rgba(176,124,255,.18);}
  .ctrl-rotate{
    background:linear-gradient(180deg,rgba(163,113,255,.30),rgba(163,113,255,.10));
    border-color:rgba(163,113,255,.4);
    color:#fff;
    box-shadow:0 6px 18px rgba(163,113,255,.30),inset 0 1px 0 rgba(255,255,255,.25);
  }
  .ctrl-drop{
    background:linear-gradient(135deg,var(--cyan) 0%,var(--violet) 50%,var(--pink) 100%);
    color:#06020f;
    font-size:14px;letter-spacing:.25em;
    box-shadow:0 8px 24px rgba(255,62,181,.40),inset 0 1px 0 rgba(255,255,255,.4);
  }

  /* ===== GAME OVER ===== */
  .game-over{
    position:fixed;inset:0;z-index:50;
    display:none;align-items:center;justify-content:center;
    padding:24px;
    background:radial-gradient(70% 60% at 50% 50%,rgba(10,4,32,.55),rgba(6,3,15,.96));
    backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);
  }
  .game-over.on{display:flex;animation:fadeIn .35s ease both;}
  @keyframes fadeIn{from{opacity:0;}to{opacity:1;}}
  .go-card{
    position:relative;
    width:100%;max-width:320px;
    border-radius:22px;padding:28px 24px;
    background:linear-gradient(180deg,rgba(255,255,255,.06),rgba(255,255,255,.02));
    border:1px solid var(--line);
    text-align:center;
    box-shadow:0 0 60px rgba(255,62,181,.25);
  }
  .go-card::before{
    content:"";position:absolute;inset:-1px;border-radius:inherit;padding:1px;
    background:linear-gradient(135deg,rgba(61,240,255,.6),rgba(176,124,255,.5),rgba(255,62,181,.5));
    -webkit-mask:linear-gradient(#000 0 0) content-box,linear-gradient(#000 0 0);
    -webkit-mask-composite:xor;mask-composite:exclude;
    pointer-events:none;
  }
  .go-card h2{
    margin:0 0 18px;
    font-size:30px;font-weight:900;letter-spacing:.25em;
    background:linear-gradient(90deg,var(--cyan),#fff 50%,var(--pink));
    -webkit-background-clip:text;background-clip:text;color:transparent;
    text-shadow:0 0 18px rgba(255,62,181,.4);
  }
  .go-row{
    display:flex;justify-content:space-between;align-items:baseline;
    font-size:11px;letter-spacing:.25em;color:var(--sub);
    padding:10px 0;
    border-bottom:1px dashed var(--line);
  }
  .go-row .val{
    font-size:22px;color:#fff;font-weight:800;
    font-feature-settings:"tnum";letter-spacing:0;
  }
  .restart{
    appearance:none;border:0;cursor:pointer;
    margin:22px 0 12px;width:100%;padding:14px;
    border-radius:12px;
    font:inherit;font-weight:900;font-size:14px;letter-spacing:.35em;
    color:#06020f;
    background:linear-gradient(135deg,var(--cyan),var(--violet) 50%,var(--pink));
    box-shadow:0 8px 28px rgba(255,62,181,.35),inset 0 1px 0 rgba(255,255,255,.4);
  }
  .ss-note{margin:4px 0 0;font-size:11px;color:var(--sub);letter-spacing:.25em;}

  @media (max-height:700px){
    .title{font-size:15px;letter-spacing:.28em;}
    .hud-val{font-size:16px;}
    .ctrl{min-height:56px;font-size:21px;}
  }
</style>
</head>
<body>

<div class="app">
  <header class="topbar">
    <div class="title">CHAIN FEVER</div>
    <div class="toggles">
      <button class="topbtn" id="soundToggle" type="button" aria-pressed="true">♪ ON</button>
      <button class="topbtn" id="vibToggle" type="button" aria-pressed="true">⫶ ON</button>
    </div>
  </header>

  <div class="hud">
    <div class="hud-block">
      <span class="hud-lbl">SCORE</span>
      <span class="hud-val" id="scoreVal">0</span>
    </div>
    <div class="hud-block">
      <span class="hud-lbl">CHAIN</span>
      <span class="hud-val accent" id="chainVal">0</span>
    </div>
    <div class="hud-block">
      <span class="hud-lbl">BEST</span>
      <span class="hud-val" id="bestVal">0</span>
    </div>
  </div>

  <section class="stage">
    <div class="board-wrap" id="boardWrap">
      <canvas id="board" width="240" height="480"></canvas>
      <div class="slowmo-flash" id="slowmoFlash"></div>
      <div class="combo-banner" id="comboBanner"></div>
      <div class="popups" id="popups"></div>
    </div>
  </section>

  <section class="controls" aria-label="操作">
    <button class="ctrl" id="btnLeft" type="button" aria-label="左">◀</button>
    <button class="ctrl ctrl-rotate" id="btnRotate" type="button" aria-label="回転">↻</button>
    <button class="ctrl ctrl-drop" id="btnDrop" type="button" aria-label="ドロップ">DROP</button>
    <button class="ctrl" id="btnRight" type="button" aria-label="右">▶</button>
  </section>
</div>

<div class="game-over" id="gameOver" aria-hidden="true">
  <div class="go-card">
    <h2>GAME OVER</h2>
    <div class="go-row"><span>SCORE</span><span class="val" id="goScore">0</span></div>
    <div class="go-row"><span>BEST</span><span class="val" id="goBest">0</span></div>
    <div class="go-row" style="border-bottom:0;"><span>HIGH CHAIN</span><span class="val" id="goChain">0</span></div>
    <button class="restart" id="restartBtn" type="button">もう一度</button>
    <p class="ss-note">スクショして結果見せて</p>
  </div>
</div>

<script>
(() => {
  const $ = id => document.getElementById(id);
  const cv = $('board');
  const ctx = cv.getContext('2d');
  const boardWrap = $('boardWrap');

  /* ============== CONSTANTS ============== */
  const COLS = 6, ROWS = 12;
  const COLORS = ['#3df0ff','#ff3eb5','#a371ff','#aaff5e']; // cyan / pink / violet / lime
  const NUM_COLORS = COLORS.length;
  const FALL_INIT_MS = 700;

  /* ============== STATE ============== */
  let bestScore = 0;
  try { bestScore = parseInt(localStorage.getItem('chainFeverBest') || '0', 10) || 0; } catch(_){}
  const state = {
    board: Array.from({length:ROWS}, () => Array(COLS).fill(null)),
    pair: null,
    score: 0,
    chain: 0,
    highChain: 0,
    bestScore,
    fallMs: FALL_INIT_MS,
    lastFallAt: 0,
    isAnimating: false,
    isGameOver: false,
    timeScale: 1.0,
    soundOn: true,
    vibOn: true,
    totalCleared: 0,
  };

  /* ============== AUDIO ============== */
  let audioCtx = null, masterGain = null, noiseBuf = null;
  function initAudio(){
    if (audioCtx) return;
    try{
      const AC = window.AudioContext || window.webkitAudioContext;
      if (!AC) return;
      audioCtx = new AC();
      masterGain = audioCtx.createGain();
      masterGain.gain.value = state.soundOn ? 1 : 0;
      masterGain.connect(audioCtx.destination);
      const len = audioCtx.sampleRate;
      noiseBuf = audioCtx.createBuffer(1, len, audioCtx.sampleRate);
      const data = noiseBuf.getChannelData(0);
      for (let i = 0; i < len; i++) data[i] = Math.random() * 2 - 1;
    }catch(_){ audioCtx = null; }
  }
  function applySound(){
    if (!masterGain || !audioCtx) return;
    const t = audioCtx.currentTime;
    masterGain.gain.cancelScheduledValues(t);
    masterGain.gain.linearRampToValueAtTime(state.soundOn ? 1 : 0, t + 0.06);
  }
  function setSound(v){
    state.soundOn = !!v;
    $('soundToggle').setAttribute('aria-pressed', String(state.soundOn));
    $('soundToggle').textContent = state.soundOn ? '♪ ON' : '♪ OFF';
    applySound();
  }
  function setVib(v){
    state.vibOn = !!v;
    $('vibToggle').setAttribute('aria-pressed', String(state.vibOn));
    $('vibToggle').textContent = state.vibOn ? '⫶ ON' : '⫶ OFF';
  }
  function vibrate(pattern){
    if (!state.vibOn) return;
    if (typeof navigator.vibrate !== 'function') return;
    try { navigator.vibrate(pattern); } catch(_){}
  }
  function jit(b, p){ return b * (1 + (Math.random() - .5) * 2 * p); }

  function playPlace(){
    if (!audioCtx) return;
    const t = audioCtx.currentTime;
    const o = audioCtx.createOscillator(); o.type='triangle';
    o.frequency.setValueAtTime(jit(220,0.05), t);
    o.frequency.exponentialRampToValueAtTime(jit(120,0.05), t + 0.06);
    const g = audioCtx.createGain(); g.gain.value = 0;
    o.connect(g); g.connect(masterGain);
    g.gain.linearRampToValueAtTime(0.30, t + 0.005);
    g.gain.exponentialRampToValueAtTime(0.001, t + 0.10);
    o.start(t); o.stop(t + 0.12);
  }
  function playClear(chainLevel){
    if (!audioCtx) return;
    const baseFreq = 440 * Math.pow(2, (chainLevel - 1) * 2 / 12);
    const t = audioCtx.currentTime;
    const o = audioCtx.createOscillator(); o.type='sine';
    o.frequency.setValueAtTime(baseFreq, t);
    o.frequency.exponentialRampToValueAtTime(baseFreq * 1.8, t + 0.12);
    const g = audioCtx.createGain(); g.gain.value = 0;
    o.connect(g); g.connect(masterGain);
    g.gain.linearRampToValueAtTime(0.40, t + 0.005);
    g.gain.exponentialRampToValueAtTime(0.001, t + 0.25);
    o.start(t); o.stop(t + 0.30);
    // sparkle
    const ns = audioCtx.createBufferSource(); ns.buffer = noiseBuf;
    const nf = audioCtx.createBiquadFilter(); nf.type='highpass'; nf.frequency.value = 4200;
    const ng = audioCtx.createGain(); ng.gain.value = 0;
    ns.connect(nf); nf.connect(ng); ng.connect(masterGain);
    ng.gain.linearRampToValueAtTime(0.16, t + 0.005);
    ng.gain.exponentialRampToValueAtTime(0.001, t + 0.12);
    ns.start(t); ns.stop(t + 0.16);
  }
  function playBigChain(){
    if (!audioCtx) return;
    const t = audioCtx.currentTime;
    const o = audioCtx.createOscillator(); o.type='sawtooth';
    o.frequency.setValueAtTime(160, t);
    o.frequency.exponentialRampToValueAtTime(880, t + 0.4);
    const f = audioCtx.createBiquadFilter(); f.type='lowpass'; f.frequency.value = 1300; f.Q.value = 4;
    const g = audioCtx.createGain(); g.gain.value = 0;
    o.connect(f); f.connect(g); g.connect(masterGain);
    g.gain.linearRampToValueAtTime(0.30, t + 0.01);
    g.gain.exponentialRampToValueAtTime(0.001, t + 0.5);
    o.start(t); o.stop(t + 0.55);
    // boom
    const ns = audioCtx.createBufferSource(); ns.buffer = noiseBuf;
    const nf = audioCtx.createBiquadFilter(); nf.type='lowpass'; nf.frequency.value = 220;
    const ng = audioCtx.createGain(); ng.gain.value = 0;
    ns.connect(nf); nf.connect(ng); ng.connect(masterGain);
    ng.gain.linearRampToValueAtTime(0.40, t + 0.005);
    ng.gain.exponentialRampToValueAtTime(0.001, t + 0.30);
    ns.start(t); ns.stop(t + 0.35);
  }
  function playGameOver(){
    if (!audioCtx) return;
    const t = audioCtx.currentTime;
    const notes = [330, 277, 220, 165];
    notes.forEach((f, i) => {
      const o = audioCtx.createOscillator(); o.type='triangle';
      o.frequency.value = f;
      const g = audioCtx.createGain(); g.gain.value = 0;
      o.connect(g); g.connect(masterGain);
      const start = t + i * 0.18;
      g.gain.linearRampToValueAtTime(0.28, start + 0.02);
      g.gain.exponentialRampToValueAtTime(0.001, start + 0.5);
      o.start(start); o.stop(start + 0.55);
    });
  }

  /* ============== CANVAS ============== */
  let CELL = 64, CAN_W = COLS * CELL, CAN_H = ROWS * CELL;
  function fitCanvas(){
    const stage = document.querySelector('.stage');
    const sw = stage.clientWidth;
    const sh = stage.clientHeight;
    if (sw <= 0 || sh <= 0) return;
    const aspect = COLS / ROWS;
    let w, h;
    if (sw / sh > aspect){ h = sh; w = h * aspect; }
    else { w = sw; h = w / aspect; }
    boardWrap.style.width  = w + 'px';
    boardWrap.style.height = h + 'px';
    const dpr = Math.min(window.devicePixelRatio || 1, 2);
    cv.width  = Math.max(1, Math.round(w * dpr));
    cv.height = Math.max(1, Math.round(h * dpr));
    CELL = cv.width / COLS;
    CAN_W = cv.width;
    CAN_H = cv.height;
  }
  window.addEventListener('resize', fitCanvas);
  window.addEventListener('orientationchange', fitCanvas);

  /* ============== DRAWING ============== */
  function drawBlob(x, y, r, color, opacity){
    if (opacity <= 0) return;
    ctx.globalAlpha = opacity;
    // halo
    const g0 = ctx.createRadialGradient(x, y, 0, x, y, r * 1.55);
    g0.addColorStop(0, color + 'aa');
    g0.addColorStop(0.55, color + '33');
    g0.addColorStop(1, color + '00');
    ctx.fillStyle = g0;
    ctx.beginPath(); ctx.arc(x, y, r * 1.55, 0, Math.PI*2); ctx.fill();
    // body
    const g1 = ctx.createRadialGradient(x - r*0.35, y - r*0.40, 0, x, y, r);
    g1.addColorStop(0, '#ffffff');
    g1.addColorStop(0.30, color);
    g1.addColorStop(1, color + 'cc');
    ctx.fillStyle = g1;
    ctx.beginPath(); ctx.arc(x, y, r, 0, Math.PI*2); ctx.fill();
    // highlight
    ctx.fillStyle = 'rgba(255,255,255,.55)';
    ctx.beginPath(); ctx.ellipse(x - r*0.30, y - r*0.45, r*0.18, r*0.10, -.3, 0, Math.PI*2); ctx.fill();
    ctx.globalAlpha = 1;
  }

  function render(){
    ctx.clearRect(0, 0, CAN_W, CAN_H);
    // checker bg
    ctx.fillStyle = 'rgba(255,255,255,.022)';
    for (let r = 0; r < ROWS; r++){
      for (let c = 0; c < COLS; c++){
        if ((r+c) & 1) ctx.fillRect(c*CELL, r*CELL, CELL, CELL);
      }
    }
    // grid lines
    ctx.strokeStyle = 'rgba(255,255,255,.05)';
    ctx.lineWidth = 1;
    for (let c = 1; c < COLS; c++){
      ctx.beginPath(); ctx.moveTo(c*CELL, 0); ctx.lineTo(c*CELL, CAN_H); ctx.stroke();
    }

    // landed blobs
    for (let r = 0; r < ROWS; r++){
      for (let c = 0; c < COLS; c++){
        const cell = state.board[r][c];
        if (cell === null) continue;
        let scale = 1, opacity = 1, offY = 0;
        if (cell.anim === 'wobble'){
          scale = 1 - Math.sin(cell.t * Math.PI * 2) * 0.07;
        } else if (cell.anim === 'pull'){
          scale = 1 + Math.sin(cell.t * Math.PI) * 0.18;
        } else if (cell.anim === 'burst'){
          scale = 1 + cell.t * 0.55;
          opacity = 1 - cell.t;
        }
        const x = c * CELL + CELL/2;
        const y = r * CELL + CELL/2 + offY;
        drawBlob(x, y, CELL * 0.42 * scale, COLORS[cell.color], opacity);
      }
    }

    // falling pair
    if (state.pair && !state.isAnimating && !state.isGameOver){
      const { pivot, partner } = state.pair;
      drawBlob(pivot.c * CELL + CELL/2, pivot.r * CELL + CELL/2, CELL * 0.42, COLORS[pivot.color], 1);
      drawBlob(partner.c * CELL + CELL/2, partner.r * CELL + CELL/2, CELL * 0.42, COLORS[partner.color], 1);
    }

    // particles
    for (const p of particles){
      const k = Math.max(0, 1 - p.age / p.life);
      ctx.globalAlpha = k;
      ctx.fillStyle = p.color;
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.r * (0.5 + 0.5*k), 0, Math.PI*2);
      ctx.fill();
    }
    ctx.globalAlpha = 1;
  }

  /* ============== PARTICLES ============== */
  let particles = [];
  const MAX_PARTICLES = 220;
  function spawnParticles(boardR, boardC, colorIdx, count){
    if (particles.length + count > MAX_PARTICLES){
      particles.splice(0, particles.length + count - MAX_PARTICLES);
    }
    const x = boardC * CELL + CELL/2;
    const y = boardR * CELL + CELL/2;
    const color = COLORS[colorIdx];
    const speedScale = CELL / 64;
    for (let i = 0; i < count; i++){
      const ang = Math.random() * Math.PI * 2;
      const sp = (60 + Math.random() * 200) * speedScale;
      particles.push({
        x, y,
        vx: Math.cos(ang) * sp,
        vy: Math.sin(ang) * sp - 50 * speedScale,
        life: 0.5 + Math.random() * 0.4,
        age: 0,
        r: (2 + Math.random() * 3) * speedScale,
        color,
        gravity: 240 * speedScale,
      });
    }
  }

  /* ============== GAMEPLAY ============== */
  function isFree(r, c){
    return r >= 0 && r < ROWS && c >= 0 && c < COLS && state.board[r][c] === null;
  }
  function partnerOffset(orient){
    return [[-1,0],[0,1],[1,0],[0,-1]][orient];
  }
  function partnerPos(pivot, orient){
    const [dr, dc] = partnerOffset(orient);
    return { r: pivot.r + dr, c: pivot.c + dc };
  }
  function pairFits(pivot, orient){
    if (!isFree(pivot.r, pivot.c)) return false;
    const p = partnerPos(pivot, orient);
    return isFree(p.r, p.c);
  }

  function spawnPair(){
    if (!isFree(0, 2) || !isFree(1, 2)){
      gameOver();
      return;
    }
    const a = Math.floor(Math.random() * NUM_COLORS);
    const b = Math.floor(Math.random() * NUM_COLORS);
    state.pair = {
      pivot:   { r:1, c:2, color:a },
      partner: { r:0, c:2, color:b },
      orient: 0,
    };
    state.lastFallAt = performance.now();
    state.chain = 0;
  }

  function syncPartner(){
    const { pivot, orient, partner } = state.pair;
    const p = partnerPos(pivot, orient);
    partner.r = p.r; partner.c = p.c;
  }

  function moveLeft(){
    if (!state.pair || state.isAnimating || state.isGameOver) return;
    const { pivot, orient } = state.pair;
    const np = { ...pivot, c: pivot.c - 1 };
    if (pairFits(np, orient)){
      state.pair.pivot = np;
      syncPartner();
      vibrate([8]);
    }
  }
  function moveRight(){
    if (!state.pair || state.isAnimating || state.isGameOver) return;
    const { pivot, orient } = state.pair;
    const np = { ...pivot, c: pivot.c + 1 };
    if (pairFits(np, orient)){
      state.pair.pivot = np;
      syncPartner();
      vibrate([8]);
    }
  }
  function rotate(){
    if (!state.pair || state.isAnimating || state.isGameOver) return;
    const { pivot, orient } = state.pair;
    const newOrient = (orient + 1) % 4;
    if (pairFits(pivot, newOrient)){
      state.pair.orient = newOrient;
      syncPartner();
      vibrate([8]);
      return;
    }
    // wall-kick: try ±1, ±2 horizontal
    for (const dc of [-1, 1, -2, 2]){
      const np = { ...pivot, c: pivot.c + dc };
      if (pairFits(np, newOrient)){
        state.pair.pivot = np;
        state.pair.orient = newOrient;
        syncPartner();
        vibrate([8]);
        return;
      }
    }
    // vertical kick (push up if rotation tight at floor)
    const np = { ...pivot, r: pivot.r - 1 };
    if (pairFits(np, newOrient)){
      state.pair.pivot = np;
      state.pair.orient = newOrient;
      syncPartner();
      vibrate([8]);
    }
  }
  function tryFall(){
    if (!state.pair) return false;
    const { pivot, orient } = state.pair;
    const np = { ...pivot, r: pivot.r + 1 };
    if (pairFits(np, orient)){
      state.pair.pivot = np;
      syncPartner();
      return true;
    }
    return false;
  }
  function hardDrop(){
    if (!state.pair || state.isAnimating || state.isGameOver) return;
    while (tryFall()){}
    lockPair();
  }

  function lockPair(){
    if (!state.pair) return;
    const { pivot, partner } = state.pair;
    state.board[pivot.r][pivot.c]   = { color: pivot.color,   anim: 'wobble', t: 0 };
    state.board[partner.r][partner.c] = { color: partner.color, anim: 'wobble', t: 0 };
    state.pair = null;
    playPlace();
    vibrate([10]);
    processChains();
  }

  function findGroups(){
    const visited = Array.from({length:ROWS}, () => Array(COLS).fill(false));
    const groups = [];
    for (let r = 0; r < ROWS; r++){
      for (let c = 0; c < COLS; c++){
        if (visited[r][c]) continue;
        const cell = state.board[r][c];
        if (cell === null) continue;
        const color = cell.color;
        const stack = [[r,c]];
        const group = [];
        while (stack.length){
          const [cr, cc] = stack.pop();
          if (cr<0||cr>=ROWS||cc<0||cc>=COLS) continue;
          if (visited[cr][cc]) continue;
          const cell2 = state.board[cr][cc];
          if (cell2 === null || cell2.color !== color) continue;
          visited[cr][cc] = true;
          group.push([cr, cc]);
          stack.push([cr+1,cc],[cr-1,cc],[cr,cc+1],[cr,cc-1]);
        }
        if (group.length >= 4) groups.push({color, cells: group});
      }
    }
    return groups;
  }

  function applyGravity(){
    let moved = false;
    for (let c = 0; c < COLS; c++){
      let writeRow = ROWS - 1;
      for (let r = ROWS - 1; r >= 0; r--){
        const cell = state.board[r][c];
        if (cell !== null){
          if (writeRow !== r){
            state.board[writeRow][c] = cell;
            state.board[r][c] = null;
            moved = true;
          }
          writeRow--;
        }
      }
    }
    return moved;
  }

  const wait = (ms) => new Promise(r => setTimeout(r, Math.max(8, ms / state.timeScale)));

  async function processChains(){
    state.isAnimating = true;
    let chain = 0;
    while (true){
      // brief wait so wobble can play before chain check
      await wait(160);
      const groups = findGroups();
      if (groups.length === 0) break;
      chain++;
      state.chain = chain;
      state.highChain = Math.max(state.highChain, chain);

      // pull-in
      for (const g of groups){
        for (const [r, c] of g.cells){
          state.board[r][c] = { color: g.color, anim: 'pull', t: 0 };
        }
      }
      await animatePhase('pull', 200);

      // burst + sound + shake + vibe + score + popup + combo
      for (const g of groups){
        for (const [r, c] of g.cells){
          state.board[r][c] = { color: g.color, anim: 'burst', t: 0 };
          spawnParticles(r, c, g.color, 9);
        }
      }
      if (chain >= 3) playBigChain(); else playClear(chain);
      shake(chain >= 3 ? 'big' : 'small');
      vibrate(chain >= 3 ? [25, 30, 25] : [15]);

      const cleared = groups.reduce((s, g) => s + g.cells.length, 0);
      state.totalCleared += cleared;
      const chainBonus = Math.pow(2, chain - 1);
      const colorBonus = groups.length;
      const points = cleared * 10 * chainBonus * colorBonus;
      state.score += points;

      // popup at the cleared group's centroid
      let cx = 0, cy = 0, n = 0;
      for (const g of groups) for (const [r, c] of g.cells){ cx += c; cy += r; n++; }
      cx /= n; cy /= n;
      showScorePopup(cx, cy, points);
      showComboBanner(chain);

      if (chain >= 5){
        state.timeScale = 0.4;
        const sf = $('slowmoFlash');
        sf.classList.remove('on'); void sf.offsetWidth; sf.classList.add('on');
        setTimeout(() => { state.timeScale = 1.0; }, 700);
      }

      await animatePhase('burst', 220);

      // remove cleared cells
      for (const g of groups){
        for (const [r, c] of g.cells){
          state.board[r][c] = null;
        }
      }

      // gravity
      const moved = applyGravity();
      if (moved){
        // small settle delay so the visual catches up
        await wait(160);
      }
    }
    state.chain = 0;
    state.isAnimating = false;
    // bump fall speed based on cleared total
    const level = Math.floor(state.totalCleared / 30);
    state.fallMs = Math.max(180, FALL_INIT_MS - level * 50);
    if (!state.isGameOver) spawnPair();
  }

  async function animatePhase(animType, durMs){
    const start = performance.now();
    const dur = durMs / state.timeScale;
    return new Promise(resolve => {
      function step(){
        const t = performance.now();
        const k = Math.min(1, (t - start) / dur);
        for (let r = 0; r < ROWS; r++){
          for (let c = 0; c < COLS; c++){
            const cell = state.board[r][c];
            if (cell !== null && cell.anim === animType) cell.t = k;
          }
        }
        if (k >= 1) resolve();
        else requestAnimationFrame(step);
      }
      requestAnimationFrame(step);
    });
  }

  /* ============== UI ============== */
  function shake(level){
    boardWrap.classList.remove('shake-small','shake-big');
    void boardWrap.offsetWidth;
    boardWrap.classList.add(level === 'big' ? 'shake-big' : 'shake-small');
  }
  function showComboBanner(chain){
    if (chain < 2) return;
    const banner = $('comboBanner');
    let text;
    if      (chain === 2) text = '2 CHAIN';
    else if (chain === 3) text = '3 CHAIN';
    else if (chain === 4) text = '4 CHAIN';
    else if (chain === 5) text = '5 CHAIN';
    else if (chain <= 7)  text = 'INSANE';
    else if (chain <= 9)  text = 'MONSTER';
    else                  text = 'GODLIKE';
    banner.textContent = text;
    banner.classList.remove('on');
    void banner.offsetWidth;
    banner.classList.add('on');
  }
  function showScorePopup(boardC, boardR, points){
    const wrap = boardWrap.getBoundingClientRect();
    const x = (boardC + 0.5) * (wrap.width  / COLS);
    const y = (boardR + 0.5) * (wrap.height / ROWS);
    const p = document.createElement('div');
    p.className = 'score-popup';
    p.textContent = '+' + points;
    p.style.left = x + 'px';
    p.style.top  = y + 'px';
    $('popups').appendChild(p);
    setTimeout(() => p.remove(), 950);
  }
  function updateHUD(){
    $('scoreVal').textContent = state.score;
    $('chainVal').textContent = state.chain;
    $('bestVal').textContent  = Math.max(state.bestScore, state.score);
  }
  function gameOver(){
    if (state.isGameOver) return;
    state.isGameOver = true;
    state.pair = null;
    if (state.score > state.bestScore){
      state.bestScore = state.score;
      try { localStorage.setItem('chainFeverBest', String(state.bestScore)); } catch(_){}
    }
    $('goScore').textContent = state.score;
    $('goBest').textContent  = state.bestScore;
    $('goChain').textContent = state.highChain;
    playGameOver();
    vibrate([100, 50, 100, 50, 200]);
    $('gameOver').classList.add('on');
    $('gameOver').setAttribute('aria-hidden','false');
  }
  function reset(){
    state.board = Array.from({length:ROWS}, () => Array(COLS).fill(null));
    state.pair = null;
    state.score = 0;
    state.chain = 0;
    state.highChain = 0;
    state.fallMs = FALL_INIT_MS;
    state.totalCleared = 0;
    state.isAnimating = false;
    state.isGameOver = false;
    state.timeScale = 1.0;
    particles = [];
    $('gameOver').classList.remove('on');
    $('gameOver').setAttribute('aria-hidden','true');
    if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
    if (masterGain && audioCtx){
      const t = audioCtx.currentTime;
      masterGain.gain.cancelScheduledValues(t);
      masterGain.gain.setValueAtTime(state.soundOn ? 1 : 0, t);
    }
    spawnPair();
  }

  /* ============== MAIN LOOP ============== */
  let lastT = performance.now();
  function loop(t){
    const dtRaw = (t - lastT) / 1000;
    const dt = Math.min(0.05, dtRaw) * state.timeScale;
    lastT = t;

    // particles
    for (const p of particles){
      p.age += dt;
      p.x += p.vx * dt;
      p.y += p.vy * dt;
      p.vy += p.gravity * dt;
      p.vx *= 0.96; p.vy *= 0.96;
    }
    particles = particles.filter(p => p.age < p.life);

    // gravity tick for pair
    if (state.pair && !state.isAnimating && !state.isGameOver){
      if (t - state.lastFallAt >= state.fallMs / state.timeScale){
        state.lastFallAt = t;
        if (!tryFall()) lockPair();
      }
    }

    // wobble update
    for (let r = 0; r < ROWS; r++){
      for (let c = 0; c < COLS; c++){
        const cell = state.board[r][c];
        if (cell !== null && cell.anim === 'wobble'){
          cell.t += dt / 0.30;
          if (cell.t >= 1){ cell.anim = null; cell.t = 0; }
        }
      }
    }

    render();
    updateHUD();
    requestAnimationFrame(loop);
  }

  /* ============== INPUT ============== */
  function bindCtrl(btn, action, allowRepeat){
    let holdTimer = null, repeatTimer = null;
    const start = (e) => {
      if (e) e.preventDefault();
      action();
      if (allowRepeat){
        holdTimer = setTimeout(() => {
          repeatTimer = setInterval(action, 90);
        }, 250);
      }
    };
    const end = () => {
      if (holdTimer) clearTimeout(holdTimer);
      if (repeatTimer) clearInterval(repeatTimer);
      holdTimer = null; repeatTimer = null;
    };
    btn.addEventListener('pointerdown', start, { passive: false });
    btn.addEventListener('pointerup', end);
    btn.addEventListener('pointercancel', end);
    btn.addEventListener('pointerleave', end);
  }
  bindCtrl($('btnLeft'),   moveLeft,  true);
  bindCtrl($('btnRight'),  moveRight, true);
  bindCtrl($('btnRotate'), rotate,    false);
  bindCtrl($('btnDrop'),   hardDrop,  false);

  // first-tap audio init
  function firstTapInit(){
    initAudio();
    if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
    document.removeEventListener('pointerdown', firstTapInit, true);
    document.removeEventListener('touchstart',   firstTapInit, true);
  }
  document.addEventListener('pointerdown', firstTapInit, true);
  document.addEventListener('touchstart',   firstTapInit, true);

  // keyboard for desktop
  document.addEventListener('keydown', e => {
    if (state.isGameOver){
      if (e.code === 'Space' || e.code === 'Enter'){ reset(); e.preventDefault(); }
      return;
    }
    switch (e.code){
      case 'ArrowLeft':  moveLeft();  e.preventDefault(); break;
      case 'ArrowRight': moveRight(); e.preventDefault(); break;
      case 'ArrowUp':
      case 'KeyZ':
      case 'KeyX':       rotate();    e.preventDefault(); break;
      case 'ArrowDown':
      case 'Space':      hardDrop();  e.preventDefault(); break;
    }
  });

  // toggles + restart
  $('soundToggle').addEventListener('click', () => setSound(!state.soundOn));
  $('vibToggle').addEventListener('click',   () => setVib(!state.vibOn));
  $('restartBtn').addEventListener('click',  reset);

  // prevent scroll/zoom while playing
  document.addEventListener('touchmove',    e => { e.preventDefault(); }, { passive: false });
  document.addEventListener('gesturestart', e => { e.preventDefault(); });
  // double-tap zoom guard for older Safari
  let lastTouchEnd = 0;
  document.addEventListener('touchend', e => {
    const now = Date.now();
    if (now - lastTouchEnd < 320){ e.preventDefault(); }
    lastTouchEnd = now;
  }, { passive: false });

  /* ============== INIT ============== */
  function init(){
    fitCanvas();
    setSound(true);
    setVib(true);
    updateHUD();
    reset();
    requestAnimationFrame(loop);
  }
  // wait one frame so layout settles before sizing canvas
  requestAnimationFrame(() => {
    fitCanvas();
    init();
  });

  /* ============== TEST SURFACE ============== */
  window.__chainFever = {
    state, COLORS, NUM_COLORS, ROWS, COLS,
    moveLeft, moveRight, rotate, hardDrop,
    spawnPair, gameOver, reset,
    findGroups, applyGravity,
    audioReady: () => !!audioCtx,
    audioContextState: () => audioCtx ? audioCtx.state : null,
    masterGain: () => masterGain ? masterGain.gain.value : null,
    setSound, setVib,
    getBoard: () => state.board.map(row => row.map(c => c === null ? null : c.color)),
    setBoardForTest: (b) => {
      state.board = b.map(row => row.map(v => v === null ? null : { color: v, anim: null, t: 0 }));
    },
    setPair: (pivotR, pivotC, orient, pColor, qColor) => {
      state.pair = {
        pivot:   { r: pivotR, c: pivotC, color: pColor },
        partner: { r: pivotR, c: pivotC, color: qColor },
        orient,
      };
      syncPartner();
    },
    triggerLockNow: () => { if (state.pair) lockPair(); },
    waitProcessChain: async () => {
      while (state.isAnimating){ await new Promise(r => setTimeout(r, 30)); }
    },
    particleCount: () => particles.length,
    isAnimating: () => state.isAnimating,
    canvasNonZeroPixels: () => {
      const t = document.createElement('canvas');
      t.width = cv.width; t.height = cv.height;
      t.getContext('2d').drawImage(cv, 0, 0);
      const d = t.getContext('2d').getImageData(0, 0, cv.width, cv.height).data;
      let n = 0;
      for (let i = 3; i < d.length; i += 4) if (d[i] > 0) n++;
      return n;
    },
  };
})();
</script>
</body>
</html>
