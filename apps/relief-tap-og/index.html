<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no" />
<meta name="theme-color" content="#0a0420" />
<title>RELIEF TAP — 押すだけで、抜ける。</title>
<style>
  :root{
    --bg-0:#06021a;
    --bg-1:#0a0420;
    --bg-2:#15082c;
    --pink:#ff3eb5;
    --hot:#ff6ad6;
    --cyan:#3df0ff;
    --violet:#b07cff;
    --lime:#aaff5e;
    --gold:#ffe44d;
    --ink:#ffffff;
    --sub:#c2c8e8;
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-user-select:none;user-select:none;}
  html,body{height:100%;}
  body{
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Hiragino Sans","Noto Sans JP","Yu Gothic UI",system-ui,sans-serif;
    background:#000;
    min-height:100dvh;
    display:flex;align-items:center;justify-content:center;
    overflow:hidden;
    color:var(--ink);
  }

  /* 1:1 frame — fills the smaller viewport dimension; black letterbox on the longer one */
  .frame{
    position:relative;
    width:min(100vw,100dvh);
    height:min(100vw,100dvh);
    background:
      radial-gradient(45% 30% at 18% 10%, rgba(255,62,181,.36), transparent 60%),
      radial-gradient(45% 38% at 92% 22%, rgba(61,240,255,.30), transparent 60%),
      radial-gradient(60% 50% at 50% 110%, rgba(176,124,255,.36), transparent 60%),
      linear-gradient(180deg, var(--bg-0) 0%, var(--bg-1) 50%, var(--bg-2) 100%);
    overflow:hidden;
  }
  .frame::before{
    content:"";position:absolute;inset:0;pointer-events:none;
    background-image:radial-gradient(rgba(255,255,255,.05) 1px,transparent 1.2px);
    background-size:6px 6px;
    -webkit-mask-image:radial-gradient(circle at 50% 45%, #000 35%, transparent 90%);
            mask-image:radial-gradient(circle at 50% 45%, #000 35%, transparent 90%);
  }
  .frame::after{
    content:"";position:absolute;inset:0;pointer-events:none;
    background:repeating-linear-gradient(180deg,rgba(61,240,255,.04) 0,rgba(61,240,255,.04) 1px,transparent 1px,transparent 4px);
    mix-blend-mode:screen;opacity:.4;
  }

  /* ============ TOP HEADLINE ============ */
  .top{
    position:absolute;left:0;right:0;top:8.6%;
    text-align:center;
    z-index:3;
  }
  .head{
    font-size:min(7.4vmin,86px);font-weight:900;letter-spacing:.16em;line-height:1;
    background:linear-gradient(90deg,var(--cyan) 0%,var(--ink) 50%,var(--pink) 100%);
    -webkit-background-clip:text;background-clip:text;color:transparent;
    text-shadow:0 0 28px rgba(176,124,255,.42);
  }
  .head-sub{
    margin-top:1.4vmin;
    font-size:min(1.6vmin,17px);font-weight:800;letter-spacing:.55em;
    color:var(--cyan);
    text-shadow:0 0 10px rgba(61,240,255,.55);
  }

  /* ============ ORB STAGE ============ */
  .orb-stage{
    position:absolute;left:50%;top:51%;
    transform:translate(-50%,-50%);
    width:46%;height:46%;
    z-index:2;
  }
  .orb-glow{
    position:absolute;inset:-30%;
    background:radial-gradient(closest-side,rgba(255,62,181,.40),rgba(176,124,255,.20) 40%,transparent 72%);
    filter:blur(10px);
    animation:glowPulse 3.4s ease-in-out infinite;
  }
  @keyframes glowPulse{50%{transform:scale(1.04);opacity:.85;}}
  .orb{
    position:relative;width:100%;height:100%;border-radius:50%;
    background:
      radial-gradient(circle at 30% 28%, rgba(255,255,255,.95) 0%, rgba(255,255,255,0) 22%),
      radial-gradient(circle at 70% 70%, var(--violet) 0%, transparent 50%),
      radial-gradient(circle at 50% 50%, var(--pink) 0%, color-mix(in srgb, var(--pink) 32%, var(--violet)) 60%, transparent 95%);
    box-shadow:
      0 12px 80px rgba(255,62,181,.55),
      0 0 120px rgba(176,124,255,.4),
      0 0 160px rgba(61,240,255,.28),
      inset -12px -28px 60px rgba(0,0,0,.45),
      inset 16px 28px 70px rgba(255,255,255,.5);
    animation:orbBreathe 3.6s ease-in-out infinite;
  }
  @keyframes orbBreathe{0%,100%{transform:scale(1);}50%{transform:scale(1.018);}}
  .orb-ring{
    position:absolute;inset:-9%;border-radius:50%;
    border:1px solid rgba(61,240,255,.45);
    box-shadow:0 0 28px rgba(61,240,255,.32),inset 0 0 28px rgba(61,240,255,.18);
    pointer-events:none;
    animation:ringSpin 12s linear infinite;
  }
  .orb-ring::after{
    content:"";position:absolute;left:50%;top:-3px;width:6px;height:6px;border-radius:50%;
    background:var(--cyan);box-shadow:0 0 12px var(--cyan),0 0 24px var(--cyan);
    transform:translateX(-50%);
  }
  @keyframes ringSpin{to{transform:rotate(360deg);}}

  /* ============ PARTICLES ============ */
  .particles{position:absolute;inset:0;pointer-events:none;z-index:2;}
  .particles span{
    position:absolute;
    transform:translate(-50%,-50%) rotate(var(--rot,0deg));
    border-radius:50%;
    box-shadow:0 0 8px currentColor,0 0 16px currentColor;
  }
  .particles span.shard{
    border-radius:0;clip-path:polygon(50% 0,100% 100%,0 100%);
    background:currentColor;
  }
  .particles span.square{border-radius:2px;}
  .particles span.streak{
    border-radius:99px;
    background:linear-gradient(90deg,transparent,currentColor 40%,currentColor 60%,transparent);
    box-shadow:0 0 12px currentColor;
  }

  /* ============ BOTTOM CARD ============ */
  .bottom{
    position:absolute;left:7%;right:7%;bottom:6.4%;z-index:3;
  }
  .card{
    position:relative;
    border-radius:min(2.6vmin,28px);
    padding:min(3.4vmin,34px) min(3.4vmin,34px) min(3.0vmin,30px);
    background:linear-gradient(180deg,rgba(255,255,255,.10),rgba(255,255,255,.04));
    border:1px solid rgba(255,255,255,.18);
    backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);
    box-shadow:
      0 8px 40px rgba(255,62,181,.25),
      0 0 30px rgba(176,124,255,.18),
      inset 0 1px 0 rgba(255,255,255,.18);
  }
  .card::before{
    content:"";position:absolute;inset:-1px;border-radius:inherit;padding:1px;
    background:linear-gradient(135deg,rgba(255,62,181,.6),rgba(61,240,255,.5),rgba(176,124,255,.5));
    -webkit-mask:linear-gradient(#000 0 0) content-box,linear-gradient(#000 0 0);
    -webkit-mask-composite:xor;mask-composite:exclude;
    pointer-events:none;opacity:.55;
  }
  .label{
    font-size:min(1.5vmin,15px);letter-spacing:.5em;color:var(--cyan);
    text-shadow:0 0 8px rgba(61,240,255,.55);
    margin-bottom:1.4vmin;
  }
  .stress-row{
    display:flex;align-items:baseline;gap:min(2vmin,20px);
    font-feature-settings:"tnum";line-height:1;
    flex-wrap:nowrap;
  }
  .stress-from{
    font-size:min(5.6vmin,60px);font-weight:900;
    color:#ff7a8e;
    text-shadow:0 0 14px rgba(255,62,181,.45);
    text-decoration:line-through;text-decoration-color:rgba(255,122,142,.6);text-decoration-thickness:.16em;
    opacity:.85;
  }
  .arrow{
    font-size:min(4.4vmin,46px);font-weight:900;color:var(--violet);
    text-shadow:0 0 10px rgba(176,124,255,.6);
  }
  .stress-to{
    font-size:min(8.4vmin,90px);font-weight:900;
    background:linear-gradient(180deg,var(--cyan) 0%,var(--lime) 100%);
    -webkit-background-clip:text;background-clip:text;color:transparent;
    text-shadow:0 0 30px rgba(61,240,255,.5);
  }
  .stress-to small{
    font-size:.45em;font-weight:800;color:var(--cyan);margin-left:.15em;
    -webkit-text-fill-color:var(--cyan);
  }
  .bar{
    margin-top:min(2.2vmin,22px);
    height:min(1.4vmin,14px);border-radius:99px;
    background:rgba(255,255,255,.06);
    border:1px solid rgba(255,255,255,.10);
    position:relative;overflow:visible;
    box-shadow:inset 0 1px 0 rgba(0,0,0,.35);
  }
  .bar > .fill{
    position:absolute;left:0;top:0;height:100%;width:12%;
    background:linear-gradient(90deg,var(--cyan),var(--lime));
    box-shadow:0 0 14px rgba(61,240,255,.65);
    border-radius:99px;
  }
  .bar > .ghost{
    position:absolute;left:12%;top:0;height:100%;width:66%;
    background:linear-gradient(90deg,rgba(255,62,181,.30),rgba(255,62,181,.04));
    border-radius:0 99px 99px 0;
  }
  .bar > .mark{
    position:absolute;left:78%;top:-4px;bottom:-4px;
    border-left:2px dashed rgba(255,122,142,.65);
  }
  .combo-row{
    display:flex;justify-content:space-between;align-items:center;
    margin-top:min(2.6vmin,26px);gap:8px;
  }
  .combo-tag{
    font-size:min(2vmin,20px);font-weight:900;letter-spacing:.18em;
    color:var(--cyan);
    text-shadow:0 0 10px rgba(61,240,255,.6);
    white-space:nowrap;
  }
  .combo-tag .x{
    font-size:1.7em;color:#fff;margin-left:.2em;letter-spacing:.04em;
    text-shadow:0 0 14px rgba(255,255,255,.6),0 0 24px rgba(176,124,255,.55);
  }
  .badge{
    font-size:min(1.2vmin,12px);letter-spacing:.4em;color:var(--sub);opacity:.75;
    white-space:nowrap;
  }

  /* footer mark */
  .mark-foot{
    position:absolute;left:0;right:0;bottom:1.8%;
    text-align:center;
    font-size:min(1.0vmin,11px);letter-spacing:.45em;color:var(--sub);
    opacity:.4;
  }

  /* On very narrow viewports, scale type a touch down */
  @media (max-width:380px){
    .head{font-size:min(7.0vmin,52px);}
  }
</style>
</head>
<body>
<div class="frame" id="frame" aria-label="RELIEF TAP promo 1:1">

  <header class="top">
    <div class="head">押すだけで、抜ける</div>
    <div class="head-sub">RELIEF ・ TAP</div>
  </header>

  <div class="orb-stage" aria-hidden="true">
    <div class="orb-glow"></div>
    <div class="orb"></div>
    <div class="orb-ring"></div>
  </div>

  <div class="particles" id="particles" aria-hidden="true"></div>

  <section class="bottom">
    <div class="card">
      <div class="label">▣ STRESS</div>
      <div class="stress-row">
        <span class="stress-from">78%</span>
        <span class="arrow">→</span>
        <span class="stress-to">12<small>%</small></span>
      </div>
      <div class="bar" aria-hidden="true">
        <div class="fill"></div>
        <div class="ghost"></div>
        <div class="mark"></div>
      </div>
      <div class="combo-row">
        <span class="combo-tag">RELIEF COMBO<span class="x">×12</span></span>
        <span class="badge">#RELIEFTAP</span>
      </div>
    </div>
  </section>

  <div class="mark-foot">x-mini-apps ・ relief-tap</div>
</div>

<script>
(() => {
  const layer = document.getElementById('particles');
  const frame = document.getElementById('frame');
  const palette = ['#ff3eb5','#ff7ad6','#3df0ff','#b07cff','#ffffff','#aaff5e','#ffe44d'];
  const shapes  = ['dot','dot','dot','square','shard','streak'];

  function spawn(N){
    const fw = frame.clientWidth;
    const fh = frame.clientHeight;
    const cx = fw / 2;
    const cy = fh * 0.51;
    const orbR = fw * 0.23;          // matches .orb-stage 46% width / 2
    const minR = orbR * 1.05;
    const maxR = orbR * 2.55;
    const frag = document.createDocumentFragment();
    for (let i = 0; i < N; i++){
      const ang = Math.random() * Math.PI * 2;
      const t = Math.pow(Math.random(), 0.65);  // bias outward
      const r = minR + t * (maxR - minR);
      const x = cx + Math.cos(ang) * r;
      const y = cy + Math.sin(ang) * r;
      // skip particles overlapping the bottom card area
      if (y > fh * 0.74 && Math.abs(x - cx) < fw * 0.46) continue;
      // skip those that would land off-frame
      if (x < 6 || x > fw - 6 || y < 6 || y > fh - 6) continue;
      const s = document.createElement('span');
      const shape = shapes[(Math.random() * shapes.length) | 0];
      if (shape !== 'dot') s.classList.add(shape);
      let w, h;
      if (shape === 'dot'){
        w = h = 4 + Math.random() * 9;
      } else if (shape === 'square'){
        w = h = 4 + Math.random() * 7;
      } else if (shape === 'shard'){
        w = 6 + Math.random() * 8;
        h = w * (1.4 + Math.random() * 0.5);
      } else { // streak
        w = 14 + Math.random() * 30;
        h = 2 + Math.random() * 1.4;
      }
      const color = palette[(Math.random() * palette.length) | 0];
      s.style.left = x + 'px';
      s.style.top  = y + 'px';
      s.style.width  = w + 'px';
      s.style.height = h + 'px';
      s.style.color  = color;
      if (shape === 'dot' || shape === 'square') s.style.background = color;
      const motion = (r - minR) / (maxR - minR);
      s.style.opacity = (0.55 + Math.random() * 0.45) * (1 - motion * 0.45);
      // streak rotates along its trajectory; others random
      const rot = shape === 'streak' ? (ang * 180 / Math.PI) : (Math.random() * 360);
      s.style.setProperty('--rot', rot.toFixed(0) + 'deg');
      frag.appendChild(s);
    }
    layer.appendChild(frag);
  }
  function regen(){
    layer.innerHTML = '';
    spawn(140);
  }
  regen();
  let resizeT = null;
  window.addEventListener('resize', () => {
    clearTimeout(resizeT);
    resizeT = setTimeout(regen, 120);
  });
})();
</script>
</body>
</html>
