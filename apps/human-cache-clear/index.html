<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no" />
<meta name="theme-color" content="#04050d" />
<title>HUMAN CACHE CLEAR — いらない感情ファイルを削除するだけ。</title>
<style>
  :root{
    --bg-0:#04050d;
    --bg-1:#0a0820;
    --bg-2:#120a2c;
    --ink:#e8eeff;
    --sub:#8a98c7;
    --cyan:#6cf5ff;
    --pink:#ff6cd1;
    --violet:#b07cff;
    --line:rgba(255,255,255,.07);
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;height:100%;}
  body{
    font-family:ui-monospace,"SF Mono","Menlo","Consolas","Liberation Mono","Hiragino Sans","Noto Sans JP","Yu Gothic UI",monospace,sans-serif;
    color:var(--ink);
    background:
      radial-gradient(60% 50% at 30% 0%, rgba(108,245,255,.18), transparent 60%),
      radial-gradient(60% 50% at 90% 110%, rgba(255,108,209,.18), transparent 60%),
      linear-gradient(180deg,var(--bg-0) 0%,var(--bg-1) 60%,var(--bg-2) 100%);
    background-attachment:fixed;
    min-height:100dvh;
    overflow-x:hidden;
  }
  body::before{
    content:"";position:fixed;inset:0;
    background-image:
      linear-gradient(rgba(255,255,255,.04) 1px,transparent 1px),
      linear-gradient(90deg,rgba(255,255,255,.04) 1px,transparent 1px);
    background-size:32px 32px;
    mask-image:radial-gradient(circle at 50% 35%,#000 30%,transparent 80%);
    -webkit-mask-image:radial-gradient(circle at 50% 35%,#000 30%,transparent 80%);
    pointer-events:none;z-index:0;
  }
  body::after{
    content:"";position:fixed;inset:0;
    background:repeating-linear-gradient(
      180deg,
      rgba(108,245,255,.06) 0,
      rgba(108,245,255,.06) 1px,
      transparent 1px,
      transparent 3px);
    mix-blend-mode:screen;
    pointer-events:none;z-index:0;
    opacity:.5;
  }
  .wrap{
    max-width:480px;margin:0 auto;
    padding:max(18px,env(safe-area-inset-top)) 18px max(20px,env(safe-area-inset-bottom));
    min-height:100dvh;
    display:flex;flex-direction:column;
    position:relative;z-index:1;
  }

  header{text-align:center;}
  .brand{
    font-size:11px;letter-spacing:.5em;color:var(--cyan);
    text-shadow:0 0 10px rgba(108,245,255,.7);
    margin-bottom:6px;
  }
  h1{
    margin:0;font-size:26px;line-height:1.15;font-weight:800;letter-spacing:.04em;
    background:linear-gradient(90deg,var(--cyan) 0%,var(--violet) 50%,var(--pink) 100%);
    -webkit-background-clip:text;background-clip:text;color:transparent;
    text-shadow:0 0 28px rgba(176,124,255,.18);
    position:relative;
  }
  h1::before,h1::after{
    content:"HUMAN CACHE CLEAR";
    position:absolute;left:0;right:0;top:0;
    -webkit-background-clip:text;background-clip:text;color:transparent;
    background:linear-gradient(90deg,var(--cyan),var(--pink));
    mix-blend-mode:screen;opacity:.4;pointer-events:none;
  }
  h1::before{transform:translate(-1.2px,0);filter:hue-rotate(15deg);}
  h1::after{transform:translate(1.2px,0);filter:hue-rotate(-15deg);}
  .sub{margin:8px 0 0;color:var(--sub);font-size:12px;letter-spacing:.18em;}

  .panel{
    margin-top:18px;
    border:1px solid var(--line);
    border-radius:18px;
    padding:16px;
    background:linear-gradient(180deg,rgba(255,255,255,.04),rgba(255,255,255,0));
    position:relative;
  }
  .panel::before{
    content:"";position:absolute;inset:-1px;border-radius:inherit;padding:1px;
    background:linear-gradient(135deg,rgba(108,245,255,.5),rgba(255,108,209,.4));
    -webkit-mask:linear-gradient(#000 0 0) content-box,linear-gradient(#000 0 0);
    -webkit-mask-composite:xor;mask-composite:exclude;
    pointer-events:none;opacity:.55;
  }
  .lbl{
    font-size:10px;letter-spacing:.35em;color:var(--cyan);
    display:block;margin-bottom:8px;
  }
  textarea{
    width:100%;min-height:90px;resize:vertical;
    background:rgba(0,0,0,.35);
    border:1px solid rgba(108,245,255,.25);
    border-radius:10px;padding:12px;
    color:var(--ink);font:inherit;font-size:14px;line-height:1.6;
    outline:none;
    transition:border-color .2s ease,box-shadow .2s ease;
  }
  textarea:focus{
    border-color:var(--cyan);
    box-shadow:0 0 0 3px rgba(108,245,255,.15);
  }
  textarea::placeholder{color:rgba(232,238,255,.32);}
  .chips{
    display:flex;flex-wrap:wrap;gap:8px;margin-top:14px;
  }
  .chip{
    appearance:none;
    border:1px solid rgba(176,124,255,.35);
    background:rgba(176,124,255,.08);
    color:var(--ink);
    font:inherit;font-size:12px;
    padding:8px 14px;border-radius:999px;
    cursor:pointer;letter-spacing:.1em;
    transition:all .15s ease;
  }
  .chip[aria-pressed="true"]{
    border-color:var(--cyan);
    background:rgba(108,245,255,.18);
    color:#fff;
    box-shadow:0 0 16px rgba(108,245,255,.5),inset 0 0 8px rgba(108,245,255,.3);
  }
  .btn-clear{
    display:block;width:100%;margin-top:18px;
    appearance:none;border:0;
    padding:16px;border-radius:12px;
    font:inherit;font-weight:800;font-size:17px;letter-spacing:.4em;
    color:#04050d;
    background:linear-gradient(135deg,var(--cyan),var(--violet) 50%,var(--pink));
    box-shadow:
      0 0 24px rgba(108,245,255,.5),
      0 0 48px rgba(255,108,209,.25),
      inset 0 1px 0 rgba(255,255,255,.5);
    cursor:pointer;position:relative;overflow:hidden;
    transition:transform .12s ease,box-shadow .2s ease;
  }
  .btn-clear:disabled{opacity:.45;cursor:not-allowed;}
  .btn-clear:not(:disabled):active{transform:translateY(1px);}
  .btn-clear::before{
    content:"";position:absolute;inset:0;
    background:linear-gradient(90deg,transparent,rgba(255,255,255,.35),transparent);
    transform:translateX(-100%);
    animation:sweep 2.6s ease-in-out infinite;
  }
  @keyframes sweep{50%,100%{transform:translateX(100%);}}

  .tip{
    margin:12px 0 0;text-align:center;
    font-size:10px;letter-spacing:.35em;color:var(--sub);opacity:.7;
  }

  /* ========== STAGE (overlay) ========== */
  .stage{
    position:fixed;inset:0;z-index:100;
    display:none;align-items:center;justify-content:center;
    padding:24px;
    background:radial-gradient(70% 60% at 50% 50%,rgba(10,8,32,.55),rgba(4,5,13,.96));
    backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);
    overflow:hidden;
  }
  .stage.on{display:flex;animation:stageIn .3s ease both;}
  @keyframes stageIn{from{opacity:0;}to{opacity:1;}}

  .scanlines-stage{
    position:absolute;inset:0;
    background:repeating-linear-gradient(
      180deg,
      rgba(108,245,255,.13) 0,
      rgba(108,245,255,.13) 1px,
      transparent 1px,
      transparent 4px);
    mix-blend-mode:screen;
    animation:scanmove 1.6s linear infinite;
    pointer-events:none;
  }
  @keyframes scanmove{to{background-position:0 8px;}}

  .stage-inner{
    position:relative;
    width:100%;max-width:340px;
    min-height:280px;
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    text-align:center;gap:14px;
    z-index:2;
  }
  .files{
    display:flex;flex-direction:column;gap:6px;align-items:center;
    transform-origin:50% 50%;
  }
  .file-card{
    font-size:12px;letter-spacing:.16em;
    border:1px solid rgba(108,245,255,.5);
    background:rgba(108,245,255,.08);
    color:var(--cyan);
    padding:5px 12px;border-radius:4px;
    text-shadow:0 0 6px rgba(108,245,255,.7);
    position:relative;
    animation:glitchTwitch 1.4s steps(8) infinite;
    opacity:0;
    animation:fadeIn .25s ease both,glitchTwitch 1.4s steps(8) infinite .25s;
  }
  .file-card:nth-child(2){animation-delay:.12s,.37s;}
  .file-card:nth-child(3){animation-delay:.24s,.49s;}
  @keyframes fadeIn{from{opacity:0;transform:translateY(-4px);}to{opacity:1;transform:translateY(0);}}
  @keyframes glitchTwitch{
    0%{transform:translate(0);}
    20%{transform:translate(-1px,.5px);}
    40%{transform:translate(1px,-.5px);}
    60%{transform:translate(0,0);}
    80%{transform:translate(-.5px,1px);filter:hue-rotate(15deg);}
    100%{transform:translate(0);}
  }
  .rawtext{
    font-size:14px;line-height:1.55;
    color:var(--ink);
    max-width:300px;padding:0 8px;
    text-shadow:0 0 8px rgba(108,245,255,.35);
    transform-origin:50% 50%;
    word-break:break-word;
    opacity:0;animation:fadeIn .35s ease .3s both;
  }
  .rawtext::before,.rawtext::after{content:"\"";color:var(--cyan);opacity:.7;}

  /* COMPRESS phase */
  .stage.compressing .files,
  .stage.compressing .rawtext{
    animation:compress .9s cubic-bezier(.5,0,.7,.2) forwards;
  }
  @keyframes compress{
    0%{transform:scale(1) translateY(0);opacity:1;filter:blur(0);}
    50%{transform:scale(.55) translateY(0);opacity:.85;filter:blur(.5px);letter-spacing:-.5px;}
    100%{transform:scale(.04) translateY(0);opacity:0;filter:blur(2.5px);}
  }

  /* CLEAR phase: vortex + ring */
  .vortex,.ring{
    position:absolute;left:50%;top:50%;
    transform:translate(-50%,-50%) scale(0);
    width:240px;height:240px;border-radius:50%;
    pointer-events:none;opacity:0;z-index:1;
  }
  .vortex{
    background:conic-gradient(from 0deg,
      transparent 0%,
      var(--cyan) 12%,
      transparent 30%,
      var(--violet) 50%,
      transparent 70%,
      var(--pink) 88%,
      transparent 100%);
    filter:blur(2px);
  }
  .ring{
    border:2px solid var(--cyan);
    box-shadow:0 0 36px var(--cyan),inset 0 0 28px rgba(108,245,255,.6);
  }
  .stage.vortexing .vortex{animation:vortexSpin 1.1s ease-out forwards;}
  .stage.vortexing .ring{animation:ringExpand 1.1s ease-out forwards;}
  @keyframes vortexSpin{
    0%{opacity:0;transform:translate(-50%,-50%) scale(0) rotate(0);}
    35%{opacity:1;transform:translate(-50%,-50%) scale(1.05) rotate(360deg);}
    100%{opacity:0;transform:translate(-50%,-50%) scale(.05) rotate(900deg);}
  }
  @keyframes ringExpand{
    0%{opacity:0;transform:translate(-50%,-50%) scale(.1);}
    25%{opacity:1;}
    100%{opacity:0;transform:translate(-50%,-50%) scale(2.4);}
  }

  /* RELEASE phase: flash + particles */
  .flash{
    position:absolute;inset:0;
    background:radial-gradient(closest-side,rgba(255,255,255,.95),rgba(108,245,255,.55) 38%,transparent 72%);
    opacity:0;pointer-events:none;z-index:3;
  }
  .stage.releasing .flash{animation:flashOut .85s ease-out forwards;}
  @keyframes flashOut{
    0%{opacity:0;}
    18%{opacity:1;}
    100%{opacity:0;}
  }
  .particles{position:absolute;inset:0;pointer-events:none;overflow:hidden;z-index:4;}
  .particles span{
    position:absolute;left:50%;top:50%;
    font-size:18px;
    transform:translate(-50%,-50%) scale(0);
    text-shadow:0 0 12px rgba(108,245,255,.7);
    animation:particleOut 1.3s cubic-bezier(.2,.7,.2,1) forwards;
  }
  @keyframes particleOut{
    0%{transform:translate(-50%,-50%) scale(0) rotate(0);opacity:0;}
    18%{opacity:1;}
    100%{
      transform:
        translate(calc(-50% + var(--dx,0px)), calc(-50% + var(--dy,0px)))
        scale(var(--s,1)) rotate(var(--rot,0deg));
      opacity:0;
    }
  }

  /* SILENCE phase */
  .silence{
    position:absolute;inset:0;
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    text-align:center;padding:24px;gap:18px;
    opacity:0;pointer-events:none;
    transition:opacity .6s ease;z-index:5;
  }
  .stage.silencing .silence{opacity:1;pointer-events:auto;}
  .silence-meta{
    font-size:10px;letter-spacing:.55em;color:var(--cyan);
    text-shadow:0 0 12px var(--cyan);
  }
  .silence-msg{
    margin:0;
    font-size:18px;line-height:1.75;font-weight:600;
    color:var(--ink);max-width:320px;letter-spacing:.02em;
    text-shadow:0 0 16px rgba(176,124,255,.45),0 1px 0 rgba(0,0,0,.3);
  }
  .silence-tag{
    font-size:10px;letter-spacing:.35em;color:var(--sub);opacity:.8;
  }
  .btn-restart{
    appearance:none;border:1px solid rgba(108,245,255,.45);
    background:rgba(0,0,0,.45);color:var(--ink);
    padding:13px 26px;border-radius:999px;
    font:inherit;font-size:12px;letter-spacing:.4em;
    cursor:pointer;transition:all .15s ease;
    margin-top:6px;
  }
  .btn-restart:hover{background:rgba(108,245,255,.18);border-color:var(--cyan);box-shadow:0 0 20px rgba(108,245,255,.4);}
  .btn-restart:active{transform:translateY(1px);}

  @media (max-width:380px){
    h1{font-size:22px;}
    .silence-msg{font-size:16px;}
    .stage-inner{max-width:300px;}
    .vortex,.ring{width:200px;height:200px;}
  }
</style>
</head>
<body>
<main class="wrap">
  <header>
    <div class="brand">SYS ・ HUMAN ・ CACHE</div>
    <h1 data-text="HUMAN CACHE CLEAR">HUMAN CACHE CLEAR</h1>
    <p class="sub">いらない感情ファイルを削除するだけ。</p>
  </header>

  <section class="panel" aria-labelledby="panelLbl">
    <span id="panelLbl" class="lbl">INPUT ・ 今日のモヤモヤ</span>
    <textarea id="input" rows="3" maxlength="200"
      placeholder="今日ため込んだモヤモヤを書く。&#10;怒り、不安、疲れ、見栄、なんでもOK。"></textarea>
    <div class="chips" role="radiogroup" aria-label="カテゴリ">
      <button class="chip" type="button" data-cat="anger"   aria-pressed="false">怒り</button>
      <button class="chip" type="button" data-cat="anxiety" aria-pressed="false">不安</button>
      <button class="chip" type="button" data-cat="fatigue" aria-pressed="false">疲れ</button>
      <button class="chip" type="button" data-cat="vanity"  aria-pressed="false">見栄</button>
      <button class="chip" type="button" data-cat="other"   aria-pressed="true">その他</button>
    </div>
    <button id="clearBtn" class="btn-clear" type="button">CLEAR</button>
  </section>

  <p class="tip">#HumanCacheClear で晒すべし</p>
</main>

<div class="stage" id="stage" aria-hidden="true">
  <div class="scanlines-stage" aria-hidden="true"></div>
  <div class="vortex" aria-hidden="true"></div>
  <div class="ring" aria-hidden="true"></div>
  <div class="flash" aria-hidden="true"></div>
  <div class="particles" id="particles" aria-hidden="true"></div>
  <div class="stage-inner">
    <div class="files" id="files" aria-live="polite"></div>
    <div class="rawtext" id="rawtext"></div>
    <div class="silence" id="silence">
      <div class="silence-meta">SYS ・ CACHE_CLEARED</div>
      <p class="silence-msg" id="silenceMsg"></p>
      <div class="silence-tag" id="silenceTag"></div>
      <button id="restartBtn" class="btn-restart" type="button">もう一度</button>
    </div>
  </div>
</div>

<script>
(() => {
  const $ = (id) => document.getElementById(id);
  const stage = $('stage');
  const inputEl = $('input');
  const filesEl = $('files');
  const rawEl = $('rawtext');
  const silenceMsg = $('silenceMsg');
  const silenceTag = $('silenceTag');
  const clearBtn = $('clearBtn');
  const restartBtn = $('restartBtn');
  const particles = $('particles');
  const chipBtns = Array.from(document.querySelectorAll('.chip'));

  const CATEGORY_LABEL = {
    anger:'怒り', anxiety:'不安', fatigue:'疲れ', vanity:'見栄', other:'その他',
  };
  const FILE_NAMES = {
    anger:   ['anger.cache','flame.tmp','rage.log'],
    anxiety: ['anxiety.cache','future.tmp','panic.log'],
    fatigue: ['fatigue.cache','battery.tmp','exhaust.log'],
    vanity:  ['vanity.cache','image.tmp','facade.log'],
    other:   ['noise.cache','memory.tmp','overhead.log'],
  };
  const FALLBACK_TEXT = [
    'なんか疲れた',
    '小さなイライラ',
    '言えなかった言葉',
    '余計な不安',
    '見えないプレッシャー',
  ];
  const MESSAGES = {
    anger:[
      'その怒り、今日はもう持たなくていい。',
      '反応しなかった分だけ、勝ち。',
      '火は消した。もう大丈夫。',
    ],
    anxiety:[
      'まだ起きてないことは、今は閉じていい。',
      'その不安、いったん保存しなくていい。',
      '未来の通知をミュートしました。',
    ],
    fatigue:[
      '休むのも、ちゃんと前進。',
      '今日の電池、無理に使い切らなくていい。',
      '少し止まれば、また動ける。',
    ],
    vanity:[
      'よく見せるためのファイルを削除しました。',
      '誰か用の自分、いったん閉じました。',
      'そのままの方が、軽い。',
    ],
    other:[
      'それ、持ってなくていい。',
      '一旦、手放していい。',
      '不要な感情ファイルを削除しました。',
    ],
  };
  const PARTICLE_GLYPHS = ['💠','✨','🫧','◇','✦','・'];

  let busy = false;
  let category = 'other';

  function pick(arr){ return arr[(Math.random()*arr.length)|0]; }
  function wait(ms){ return new Promise(r => setTimeout(r, ms)); }

  function setCategory(cat){
    if (!CATEGORY_LABEL[cat]) cat = 'other';
    category = cat;
    chipBtns.forEach(b => b.setAttribute('aria-pressed', String(b.dataset.cat === cat)));
  }

  chipBtns.forEach(b => {
    b.addEventListener('click', () => { if (!busy) setCategory(b.dataset.cat); });
  });

  function buildScanContent(text, cat){
    filesEl.innerHTML = '';
    const names = FILE_NAMES[cat] || FILE_NAMES.other;
    for (const n of names){
      const d = document.createElement('div');
      d.className = 'file-card';
      d.textContent = '[ ' + n + ' ]';
      filesEl.appendChild(d);
    }
    rawEl.textContent = text;
  }

  function spawnReleaseParticles(){
    particles.innerHTML = '';
    const N = 38;
    const frag = document.createDocumentFragment();
    for (let i = 0; i < N; i++){
      const ang = Math.random() * Math.PI * 2;
      const dist = 110 + Math.random() * 200;
      const dx = Math.cos(ang) * dist;
      const dy = Math.sin(ang) * dist;
      const s = 0.6 + Math.random() * 1.0;
      const rot = (Math.random() - 0.5) * 360;
      const e = document.createElement('span');
      e.textContent = pick(PARTICLE_GLYPHS);
      e.style.setProperty('--dx', dx.toFixed(1) + 'px');
      e.style.setProperty('--dy', dy.toFixed(1) + 'px');
      e.style.setProperty('--s', s.toFixed(2));
      e.style.setProperty('--rot', rot.toFixed(0) + 'deg');
      e.style.animationDelay = (Math.random() * 0.18).toFixed(2) + 's';
      frag.appendChild(e);
    }
    particles.appendChild(frag);
  }

  function resetStage(){
    stage.classList.remove('on','compressing','vortexing','releasing','silencing');
    filesEl.innerHTML = '';
    rawEl.textContent = '';
    particles.innerHTML = '';
    silenceMsg.textContent = '';
    silenceTag.textContent = '';
  }

  async function runClear(rawInput){
    if (busy) return;
    busy = true;
    clearBtn.disabled = true;

    const userText = (rawInput == null ? inputEl.value : rawInput).trim();
    const text = userText || pick(FALLBACK_TEXT);
    const cat = category;

    // setup content for SCAN
    buildScanContent(text, cat);

    // Phase 1: SCAN
    stage.classList.add('on');
    stage.setAttribute('aria-hidden', 'false');
    await wait(1200);

    // Phase 2: COMPRESS
    stage.classList.add('compressing');
    await wait(900);

    // Phase 3: CLEAR (vortex)
    stage.classList.add('vortexing');
    await wait(1100);

    // Phase 4: RELEASE
    spawnReleaseParticles();
    stage.classList.add('releasing');
    await wait(850);

    // Phase 5: SILENCE
    silenceMsg.textContent = pick(MESSAGES[cat] || MESSAGES.other);
    silenceTag.textContent = '— ' + CATEGORY_LABEL[cat] + ' deleted —';
    stage.classList.add('silencing');
    // restart available; clearBtn stays disabled until restart fires
  }

  function restart(){
    resetStage();
    stage.setAttribute('aria-hidden', 'true');
    busy = false;
    clearBtn.disabled = false;
    inputEl.focus({preventScroll:true});
  }

  clearBtn.addEventListener('click', () => runClear());
  restartBtn.addEventListener('click', restart);

  // Ctrl/Cmd + Enter inside textarea triggers CLEAR
  inputEl.addEventListener('keydown', (e) => {
    if ((e.ctrlKey || e.metaKey) && (e.key === 'Enter' || e.code === 'Enter')){
      e.preventDefault();
      runClear();
    }
  });

  // ensure default category visual
  setCategory('other');

  // tiny test surface (no UI side-effects when unused)
  window.__hcc = {
    runClear: (text, cat) => { if (cat) setCategory(cat); return runClear(text == null ? null : String(text)); },
    setCategory,
    restart,
    state: () => ({
      busy,
      category,
      stageClasses: Array.from(stage.classList),
      stageOn: stage.classList.contains('on'),
      fileCount: filesEl.children.length,
      particleCount: particles.children.length,
      silenceMsg: silenceMsg.textContent,
      silenceTag: silenceTag.textContent,
      rawText: rawEl.textContent,
      pressedCategory: (chipBtns.find(b => b.getAttribute('aria-pressed') === 'true') || {}).dataset?.cat,
    }),
  };
})();
</script>
</body>
</html>
